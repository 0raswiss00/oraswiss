<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { font-family: Arial; background: #000; color: #fff; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-sell { background: gold; color: #000; font-weight: bold; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        ul { list-style: none; padding: 0; }
        li { background: #111; margin: 10px 0; padding: 15px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        li:hover { background: #222; }
        .watch-name { font-weight: bold; font-size: 16px; }
        .watch-price { color: gold; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>Orët e mia</h1>
        <button class="btn-sell" onclick="window.location.href='sellnow.html'">+ Sell Now</button>
    </div>

    <ul id="myWatchesList"></ul>

<script>
    // Variabla globale për galeri
    let images = [];
    let currentImgIndex = 0;
    const BASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co/storage/v1/object/public/or-images/";

    if (typeof window.supabaseClient === 'undefined') {
        window.supabaseClient = window.supabase.createClient(
            "https://gnwsrmelmeqduhhmfmoa.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ"
        );
    }
    const supabase = window.supabaseClient;

    function getImgSrc(path) {
        return path.startsWith('http') ? path : BASE_URL + path;
    }

    function updateImageDisplay() {
        const imgEl = document.getElementById("main-product-img");
        if (imgEl && images.length > 0) {
            imgEl.src = getImgSrc(images[currentImgIndex]);
        }
    }

    function changeImage(step) {
        currentImgIndex += step;
        if (currentImgIndex >= images.length) currentImgIndex = 0;
        if (currentImgIndex < 0) currentImgIndex = images.length - 1;
        updateImageDisplay();
    }

    async function loadProduct() {
        const id = new URLSearchParams(window.location.search).get('id');
        const container = document.getElementById("container");

        if (!id) { container.innerHTML = "Asnjë ID u gjet."; return; }

        try {
            const { data, error } = await supabase.from('oras').select('*').eq('id', id).single();
            if (error) throw error;

            // Inicializo galerin
            images = Array.isArray(data.image_url) ? data.image_url : (data.image_url ? [data.image_url] : []);
            currentImgIndex = 0;

            const firstImg = images.length > 0 
                ? getImgSrc(images[0]) 
                : "https://placehold.co/600x400/222/fff?text=No+Image";

            const navBtns = images.length > 1 ? `
                <button class="nav-btn prev" onclick="changeImage(-1)">&#10094;</button>
                <button class="nav-btn next" onclick="changeImage(1)">&#10095;</button>
            ` : '';

            const paypalButton = (data.price && data.paypal_link)
                ? `<a href="${data.paypal_link}" target="_blank" class="btn btn-paypal">🛒 BUY NOW (PayPal)</a>`
                : '';

            container.innerHTML = `
                <div class="product-card">
                    <div class="gallery-container">
                        <img id="main-product-img" class="product-img" src="${firstImg}" alt="${data.brand}">
                        ${navBtns}
                    </div>
                    <h1>${data.brand} - ${data.model}</h1>
                    <div class="price">Price: ${data.price ? data.price + ' €' : 'Contact'}</div>
                    <hr>
                    <p><strong>Reference:</strong> ${data.reference || 'N/A'}</p>
                    <p><strong>Case Size:</strong> ${data.case_size || 'N/A'}</p>
                    <p><strong>Movement:</strong> ${data.movement || 'N/A'}</p>
                    <p><strong>Function:</strong> ${data.function || 'N/A'}</p>
                    <p><strong>Service:</strong> ${data.service ? 'Yes (Serviced)' : 'No'}</p>
                    <p><strong>Box & Papers:</strong> ${data.box_papers ? 'Full Set' : 'Watch Only'}</p>
                    <p><strong>Description:</strong> ${data.description || 'N/A'}</p>
                    <br>
                    <a href="https://wa.me/35569XXXXXXX?text=I%20am%20interested%20in:%20${encodeURIComponent(data.brand + ' ' + data.model)}" 
                       class="btn btn-whatsapp">💬 ORDER ON WHATSAPP</a>
                    ${paypalButton}
                    <div class="admin-actions" style="margin-top:20px; padding:15px; border:1px solid #444; border-radius:8px;">
                        <h4 style="margin:0 0 10px 0;">Admin Controls</h4>
                        <button onclick="deleteProduct(${data.id})">Fshi Produktin</button>
                        <button onclick="editProduct(${data.id})">Modifiko</button>
                    </div>
                </div>
            `;

        } catch (err) {
            container.innerHTML = "GABIM: " + err.message;
        }
    }

    async function deleteProduct(id) {
        if (!confirm("A jeni i sigurt?")) return;
        const { error } = await supabase.from('oras').delete().eq('id', id);
        if (error) { alert("Gabim: " + error.message); }
        else { alert("Produkti u fshi!"); window.location.href = 'index.html'; }
    }

    function editProduct(id) {
        window.location.href = 'edit.html?id=' + id;
    }

    loadProduct();
</script>

</body>
</html>
