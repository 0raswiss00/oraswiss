<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Vintage Collection</title>
    <style>
        body { font-family: sans-serif; background: #0b0b0b; color: #fff; margin: 0; padding: 20px; }
        .nav-bar { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 20px; }
        .nav-link { color: #ccc; text-decoration: none; font-weight: bold; }
        .nav-link.active { color: #fff; border-bottom: 2px solid #2a2a8e; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 10px; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="luxury.html" class="nav-link" id="count-luxury">Luxury 0</a>
        <a href="vintage.html" class="nav-link active" id="count-vintage">Vintage 0</a>
        <a href="parts.html" class="nav-link" id="count-parts">Parts 0</a>
    </div>

    <h1>Vintage Collection</h1>
    <div id="oras-container" class="grid">Duke ngarkuar...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
<script>
  console.log("Skripti ka filluar...");
  const supabase = window.supabase.createClient(
    "https://gnwsrmelmeqduhhmfmoa.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ"
  );

  async function start() {
    try {
      const container = document.getElementById("oras-container");
      container.innerHTML = "Po lidhem me bazën...";
      
      const { data, error } = await supabase.from('oras').select('*');
      
      if (error) throw error;
      
      console.log("Te dhenat e marra:", data);
      
      // Numerimi
      document.getElementById('count-luxury').innerText = Luxury ${data.filter(i => i.category === 'luxury').length};
      document.getElementById('count-vintage').innerText = Vintage ${data.filter(i => i.category === 'vintage').length};
      document.getElementById('count-parts').innerText = Parts ${data.filter(i => i.category === 'parts').length};

      // Shfaqja
      container.innerHTML = "";
      const filtered = data.filter(i => i.category === 'vintage');
      
      filtered.forEach(ora => {
        container.innerHTML += `
          <div class="card">
            <img src="${ora.image_url || 'placeholder.png'}" style="width:100%">
            <h3>${ora.brand}</h3>
            <p>${ora.price} €</p>
          </div>
        `;
      });
    } catch (e) {
      console.error("Gabim:", e);
      document.getElementById("oras-container").innerHTML = "Gabim: " + e.message;
    }
  }

  start();
</script>

</body>
</html>
