<!DOCTYPE html>
<html lang="sq">
<head>
    <title>Dashboard-i Im</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="wrap">
    <h1>Mirë se erdhe!</h1>
    
    <!-- Butoni që kërkove për të shitur -->
    <button onclick="window.location.href='sellnow.html'" style="background: gold; width: 100%; padding: 15px;">
      + Sell Now
    </button>
    
    <h3>Orët e mia:</h3>
    <ul id="myWatchesList"></ul>
  </div>
</body>
    
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  // Përditësoni rreshtin 25 si më poshtë:
  const supabase = createClient('https://xyunmtvysqwonelecudf.supabase.co', 'sb_publishable_tk6dO6UWVIRrVWOfx4m_w_ZAoduHhx');

  // Funksioni që merr artikujt nga baza e të dhënave
  async function fetchWatches(userId) {
    const { data, error } = await supabase
      .from('watches') // Sigurohu që emri i tabelës është i saktë
      .select('*')
      .eq('user_id', userId);

    if (error) {
      console.error("Gabim:", error.message);
      return;
    }

    const listElement = document.getElementById("myWatchesList");
    listElement.innerHTML = ""; // Pastro listën para se të shtosh elementet e reja

    data.forEach(watch => {
      const li = document.createElement("li");
      li.textContent = ${watch.name} - ${watch.price}€; // Përshtati emrat e kolonave
      listElement.appendChild(li);
    });
  }

// Monitorimi i gjendjes së logimit
supabase.auth.onAuthStateChange((event, session) => {
    if (session) {
        console.log("Përdoruesi i loguar:", session.user.id);
        
        // Ky është funksioni që tërheq dhe shfaq orët
        fetchWatches(session.user.id);
    } else {
        console.log("Përdoruesi nuk është loguar");
        window.location.href = "login.html";
    }
});

// Funksioni për të tërhequr orët nga baza
async function fetchWatches(userId) {
    let { data, error } = await supabase
        .from('watches') // Sigurohu që emri i tabelës është saktësisht 'watches'
        .select('*')
        .eq('user_id', userId); // Filtrimi sipas ID-së së përdoruesit

    if (error) {
        console.error("Gabim:", error.message);
        return;
    }

    const listElement = document.getElementById("myWatchesList");
    if (!listElement) return; // Sigurohu që HTML-ja jote ka një element me këtë ID

    listElement.innerHTML = ""; // Pastro listën para se të shtosh elementet e reja

    data.forEach(watch => {
        const li = document.createElement("li");
        li.textContent = ${watch.name} - ${watch.price}€;
        listElement.appendChild(li);
    });
}

</script>    
</body>    
</html>
