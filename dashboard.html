<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>Orët e mia</h1>
    <ul id="myWatchesList"></ul>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        // 1. Inicializimi i Supabase (bëhet vetëm një herë)
        const supabase = createClient(
            'https://xyunmtvysqwonelecudf.supabase.co',
            'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx'
        );

        // 2. Funksioni për të marrë dhe shfaqur të dhënat
        async function ngarkoOrët() {
            try {
                const { data, error } = await supabase.from('watches').select('*');
                
                if (error) throw error;

                const lista = document.getElementById("myWatchesList");
                lista.innerHTML = ""; // Pastro listën

                if (data.length === 0) {
                    lista.innerHTML = "<li>Nuk ka orë për momentin.</li>";
                } else {
                    data.forEach(watch => {
                        const li = document.createElement("li");
                        // Këtu ndrysho 'name' me emrin e saktë të kolonës në Supabase
                        li.textContent = watch.name || "Orë pa emër"; 
                        lista.appendChild(li);
                    });
                }
            } catch (err) {
                console.error("Gabim gjatë ngarkimit:", err);
            }
        }

        // 3. Thirrja e funksionit
        ngarkoOrët();
    </script>
</body>
</html>
