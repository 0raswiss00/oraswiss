<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>myOraSwiss - Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: #000; color: #fff; padding: 20px; }
        .profile-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .dashboard-menu { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .menu-item { background: #111; padding: 15px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .menu-item:hover { background: #222; }
        .btn-sell { background: gold; color: #000; font-weight: bold; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 20px; }
        #myWatchesList { list-style: none; padding: 0; }
        .watch-card { background: #111; margin-bottom: 10px; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 15px; }
    </style>
</head>
<body>

<div class="dashboard-content">
    <h2>Artikujt e mi në shitje</h2>
    <!-- Kontejneri ku do të shfaqen orët pa butona lart -->
    <ul id="myWatchesList" class="grid"></ul>
</div>

<!-- Navigimi i poshtëm (i modifikuar) -->
<nav class="bottom-nav">
    <a href="index.html" class="nav-item">🏠 Home</a>
    <a href="favorites.html" class="nav-item">❤️ Favorites</a>
    
    <!-- Butoni që kërkove në navigim -->
    <a href="#" onclick="ngarkoArtikujt()" class="nav-item">⌚ Artikujt</a>
    
    <a href="sellnow.html" class="nav-item">➕ Sell</a>
    <a href="profile.html" class="nav-item">👤 Account</a>
</nav>

<!-- Skripti (JavaScript) -->
<script>
window.ngarkoArtikujt = async function() {
    const lista = document.getElementById('myWatchesList');
    // Supozojmë se ke supabase të inicializuar
    const { data, error } = await supabase.from('watches').select('*'); 

    if (!data || data.length === 0) {
        lista.innerHTML = "<li>Nuk keni asnjë orë në listë.</li>";
    } else {
        lista.innerHTML = ""; // Pastro listën para se të shtosh të rejat
        data.forEach(watch => {
            const li = document.createElement("li");
            li.className = "watch-card";
            const imgUrl = (watch.image_url && watch.image_url.length > 0) ? watch.image_url[0] : 'placeholder.jpg';

            // Logjika me etiketën e re
            li.innerHTML = `
                <div style="position: relative; display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #333;">
                    <div style="position: absolute; top: 10px; left: 10px; background: gold; color: black; padding: 2px 6px; font-size: 10px; font-weight: bold; border-radius: 4px; z-index: 10;">
                        NË SHITJE
                    </div>
                    <img src="${imgUrl}" style="width:80px;height:80px;object-fit:cover;border-radius:5px;">
                    <div style="margin-left: 15px;">
                        <strong>${watch.brand} ${watch.model}</strong><br>
                        <span style="color:gold;">${watch.price} €</span>
                    </div>
                </div>
            `;
            lista.appendChild(li);
        });
    }
};
</script>    
</body>
</html>
