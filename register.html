<body>
  <div class="auth-page">
    <div class="auth-card register-form">
      <button class="back-btn" onclick="history.back()">← Back</button>

      <h2>Sign Up</h2>
      <input id="fullName" placeholder="Full Name" autocomplete="name" />
      <input id="phone" placeholder="Phone" autocomplete="tel" />
      <input id="country" placeholder="Country" autocomplete="country-name" />
      <input id="email" type="email" placeholder="Email" autocomplete="email" autocapitalize="none" />
      <input id="password" type="password" placeholder="Password" autocomplete="new-password" />
      <button id="btnRegister" type="button" class="auth-btn">Register</button>

      <div class="auth-sep"></div>

      <h2>Login</h2>
      <input id="loginEmail" type="email" placeholder="Email" autocomplete="email" autocapitalize="none" />
      <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="btnLogin" type="button" class="auth-btn">Login</button>
    </div>
  </div>

<script type="module">
  // Importimi i bibliotekës së Supabase
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

  // Vendos këtu të dhënat e tua nga Supabase (Project API Settings)
  const supabaseUrl = 'https://xyunmtvysqwonelecudf.supabase.co'; // VENDOS URL-NË E RE
  // Rreshti 14-17 duhet të duket ekzaktësisht kështu:
  const supabase = createClient(
    'https://xyunmtvysqwonelecudf.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpcc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dW5tdHZ5c3F3b25lbGVjdWRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTg5MTk2NTh9.K7_...' // (këtu vendos çelësin TË PLOTË që kopjove nga Supabase, pa asnjë shkronjë tjetër para)
  );

  const supabase = createClient(supabaseUrl, supabaseKey);

  window.addEventListener("DOMContentLoaded", () => {

    // REGISTER
    document.getElementById("btnRegister").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const fullName = document.getElementById("fullName").value;

      if (!email || !password) {
        alert("Plotëso email dhe password");
        return;
      }

      try {
        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: password,
          options: {
            data: { full_name: fullName } // Shton emrin në profil
          }
        });

        if (error) throw error;
        alert("Regjistrimi u krye! Konfirmo emailin.");
      } catch (e) {
        alert(e.message);
      }
    });

    // LOGIN
    document.getElementById("btnLogin").addEventListener("click", async () => {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password,
        });

        if (error) throw error;
        window.location.href = "dashboard.html";
      } catch (e) {
        alert(e.message);
      }
    });
  });
</script>
