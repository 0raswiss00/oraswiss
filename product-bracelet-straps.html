<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Product Details - Ora Swiss</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial, sans-serif; padding: 20px; }
        .details-container { max-width: 600px; margin: auto; }
        img { width: 100%; border-radius: 8px; }
        .price { color: #25D366; font-size: 24px; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

<div class="details-container" id="product-details">
    <p>Po ngarkojmë detajet...</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db-connect.js"></script> <!-- Sigurohu që e ke këtë skedar për klientin -->
<script>
    async function showProduct() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        // Marrim të dhënat nga tabela ku sapo publikove produktin
        const { data, error } = await window.supabaseClient
            .from('bracelets_straps')
            .select('*')
            .eq('id', id)
            .single();

        if (error || !data) {
            document.getElementById('product-details').innerHTML = "Ky produkt nuk u gjet.";
            return;
        }

        document.getElementById('product-details').innerHTML = `
               <img src="${Array.isArray(data.image_url) ? data.image_url[0] : (data.image_url || '')}" style="width:100%; border-radius:8px;">
               <h1>${data.brand}</h1>
               <p>${data.description || 'Nuk ka përshkrim.'}</p>
               <div class="price" style="font-size: 24px; color: #4CAF50; font-weight: bold; margin: 15px 0;">${data.price} €</div>
        
               <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 10px;">
                   <button onclick="alert('Duke u lidhur me pagesën...')" style="width: 100%; padding: 15px; background: gold; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">Buy Now</button>
                   <button onclick="window.history.back()" style="width: 100%; padding: 15px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer;">Kthehu mbrapa</button>
               </div>
         `;
        }

    showProduct();
</script>
</body>
</html>
