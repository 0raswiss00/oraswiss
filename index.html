<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ora Swiss</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #000; color: #fff; }
    .site-header { position: sticky; top: 0; z-index: 9999; background: #111; padding: 10px; }
    .nav-scroll { display: flex; gap: 15px; overflow-x: auto; padding: 10px; }
    .nav-scroll a { color: #fff; text-decoration: none; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
    .card { background: #111; padding: 10px; border-radius: 8px; border: 1px solid #333; text-align: center; }
    .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; }
    h2 { padding: 20px 20px 0; margin: 0; color: gold; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="site-header">
  <nav class="nav-scroll">
    <strong>ORA SWISS</strong>
    <a href="home.html">Home</a>
    <a href="luxury.html">Luxury</a>
    <a href="vintage.html">Vintage</a>
    <a href="parts.html">Parts</a>
  </nav>
</header>

<h2>Luxury Collection</h2>
<div id="luxury-container" class="grid">Duke u lidhur...</div>

<h2>Vintage Collection</h2>
<div id="vintage-container" class="grid">Duke u lidhur...</div>

<h2>Parts Collection</h2>
<div id="parts-container" class="grid">Duke u lidhur...</div>

<script>
  // Inicializimi
  const supabase = window.supabase.createClient(
    "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ"
  );

  async function loadCategory(cat, containerId) {
    const container = document.getElementById(containerId);
    try {
      const { data, error } = await supabase
        .from('oras')
        .select('*')
        .eq('category', cat);

      if (error) {
        container.innerHTML = "Gabim Supabase: " + error.message;
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = "No items in " + cat;
        return;
      }

      container.innerHTML = data.map(ora => `
        <div class="card">
            <img src="https://gnwsrmelmeqduhhmfmoa.supabase.co/storage/v1/object/public/images/${ora.image_url}" 
                 onerror="this.src='https://via.placeholder.com/150'">
            <div style="font-size:14px; margin-top:10px;">${ora.brand} ${ora.model}</div>
            <div style="color:gold; font-weight:bold;">${ora.price} €</div>
        </div>
      `).join('');
    } catch (e) {
      container.innerHTML = "Error: " + e.message;
    }
  }

  // Thirrjet per te gjitha kategorite
  loadCategory('luxury', 'luxury-container');
  loadCategory('vintage', 'vintage-container');
  loadCategory('parts', 'parts-container');
</script>

</body>
</html>
