<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>My Sales - Ora Swiss</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #000; color: #fff; }
        table { width: 100%; border-collapse: collapse; background: #111; margin-top: 20px; border: 1px solid #333; }
        th, td { padding: 12px; border: 1px solid #333; text-align: left; }
        th { background-color: gold; color: black; }
        .btn-cancel { background: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
    </style>
    <!-- Vendos skriptin e Supabase si tek faqja kryesore -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
</head>
<body>

    <h1>Menaxhimi i Porosive (My Sales)</h1>

    <table>
        <thead>
            <tr>
                <th>Ora (Produkti)</th>
                <th>Statusi</th>
                <th>Nr. Dërgimi</th>
                <th>Veprime</th>
            </tr>
        </thead>
        <tbody id="sales-body">
            <tr><td colspan="4">Duke ngarkuar të dhënat...</td></tr>
        </tbody>
    </table>

<script>
    // Inicializimi i Supabase (Saktësisht si tek faqja e parë)
    const supabase = window.supabase.createClient(
        "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
        "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"
    );

    // Funksioni që ngarkon porositë e lidhura me produktet
    async function loadMySales() {
        const tableBody = document.getElementById('sales-body');
        if (!tableBody) return;

        // 1. Marrim ID-në e përdoruesit të loguar
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
            tableBody.innerHTML = <tr><td colspan="4">Ju lutem <a href="login.html" style="color:gold;">lohuni</a> për të parë shitjet.</td></tr>;
            return;
        }

        // 2. Marrim të dhënat nga 'orders' dhe bëjmë lidhjen (join) me tabelën 'oras'
        const { data, error } = await supabase
            .from('orders')
            .select('*, oras(brand, model, price)') // Kjo merr automatikisht brand-in dhe modelin nga tabela oras
            .eq('user_id', user.id); // Shfaq vetëm porositë e këtij user-i

        if (error) {
            console.error("Gabim gjatë marrjes së të dhënave:", error);
            tableBody.innerHTML = <tr><td colspan="4">Gabim në ngarkim.</td></tr>;
            return;
        }

        if (data.length === 0) {
            tableBody.innerHTML = <tr><td colspan="4">Nuk keni asnjë porosi ende.</td></tr>;
            return;
        }

        // 3. Shfaqja e të dhënave të lidhura në tabelë
        tableBody.innerHTML = data.map(order => {
            // Kontrollojmë nëse ekziston ora e lidhur në databazë
            const emriOres = order.oras ? ${order.oras.brand} ${order.oras.model} : Ora #${order.product_id};
            
            return `
                <tr>
                    <td><b>${emriOres}</b></td>
                    <td style="color: ${order.status === 'pending' ? 'gold' : order.status === 'cancelled' ? 'red' : 'green'}">
                        ${order.status.toUpperCase()}
                    </td>
                    <td>${order.tracing_number || 'Nuk ka'}</td>
                    <td>
                        ${order.status === 'pending' 
                            ? <button class="btn-cancel" onclick="anulloPorosine('${order.id}')">Anullo</button> 
                            : order.status === 'completed' ? 'Kthim' : '-'}
                    </td>
                </tr>
            `;
        }).join('');
    }

    // Funksioni për anullimin e porosisë (përditëson statusin në Supabase)
    async function anulloPorosine(orderId) {
        if(!confirm("A jeni i sigurt që dëshironi të anulloni këtë porosi?")) return;

        const { error } = await supabase
            .from('orders')
            .update({ status: 'cancelled' })
            .eq('id', orderId);

        if (error) {
            alert("Gabim gjatë anullimit: " + error.message);
        } else {
            alert("Porosia u anullua me sukses!");
            loadMySales(); // Rifreskon tabelën automatikisht
        }
    }

    // Ekzekutohet sapo hapet faqja mysales.html
    document.addEventListener('DOMContentLoaded', loadMySales);
</script>

</body>
</html>
