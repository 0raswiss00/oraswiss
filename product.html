<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Detajet e Orës</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #product-details { max-width: 600px; margin: auto; }
        img { width: 100%; border-radius: 8px; }
        .btn-buy { background: green; color: white; padding: 10px 20px; border: none; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">ORA SWISS</a>
    </nav>

    <div id="product-details">Duke ngarkuar të dhënat...</div>

    <script>
        // 1. Inicializimi (Vendos këtu çelësat e tua)
        const supabase = window.supabase.createClient('URL_YT', 'KEY_YT');

        async function loadDetails() {
            // Gjej ID nga URL
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (!id) {
                document.getElementById("product-details").innerHTML = "ID e produktit mungon.";
                return;
            }

            // Marrja e të dhënave
            const { data, error } = await supabase
                .from('oras')
                .select('*')
                .eq('id', id)
                .single();

            if (error) {
                console.error("Gabim:", error);
                document.getElementById("product-details").innerHTML = "Gabim gjatë ngarkimit.";
                return;
            }

            // Krijimi i URL-së së fotos
            const imgUrl = https://gnwsrmelmeqduhhmfmoa.supabase.co/storage/v1/object/public/images/${data.image_url};

            // Shfaqja e të dhënave
            document.getElementById("product-details").innerHTML = `
                <h1>${data.brand || 'No Brand'} - ${data.model || 'No Model'}</h1>
                <img src="${imgUrl}" alt="Ora">
                <p><strong>Referenca:</strong> ${data.reference || 'N/A'}</p>
                <p><strong>Materiali:</strong> ${data.material || 'N/A'}</p>
                <h2>${data.price ? data.price + ' €' : 'Contact for price'}</h2>
                <button class="btn-buy" onclick="window.open('https://wa.me/3556XXXXXXXX', '_blank')">Bli Tani</button>
            `;
        }

        // Ekzekutimi
        loadDetails();
    </script>
</body>
</html>
