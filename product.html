<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .product-container { border: 1px solid #ccc; padding: 20px; border-radius: 10px; }
        .price { color: green; font-weight: bold; }
        .button { background: #25D366; color: white; padding: 10px 20px; text-decoration: none; display: inline-block; border-radius: 5px; }
    </style>
</head>
<body>

<div id="container">Duke ngarkuar...</div>

<script>
    const supabase = window.supabase.createClient(
        'https://gnwsrmelmeqduhhmfmoa.supabase.co',
        'sb_publishable__AkK_Z7lhtkvukN6FylcAQ_KBTXlcy9'
    );

    async function loadProduct() {
        const id = new URLSearchParams(window.location.search).get('id');
        const container = document.getElementById("container");

        if (!id) { container.innerHTML = "Asnjë ID nuk u gjet."; return; }

        // Marrja e të dhënave
        const { data, error } = await supabase.from('oras').select('*').eq('id', id).single();

        if (error) {
            container.innerHTML = "Gabim lidhjeje: " + error.message;
            console.error(error);
            return;
        }

        // Shfaqja e të dhënave
        container.innerHTML = `
            <div class="product-container">
                <h1>${data.brand || ''} ${data.model || ''}</h1>
                <p class="price">Çmimi: ${data.price || '0'} €</p>
                <ul>
                    <li>Referenca: ${data.reference || '-'}</li>
                    <li>Materiali: ${data.material || '-'}</li>
                    <li>Viti: ${data.year || '-'}</li>
                </ul>
                <a href="https://wa.me/35569XXXXXXX" class="button">Porosit</a>
            </div>
        `;
    }
    loadProduct();
</script>
</body>
</html>
