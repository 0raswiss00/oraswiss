<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ora Swiss - Users</title>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KD2ZZ3MJYY');
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #FFD700;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #FFD700;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stat-box {
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid #FFD700;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            flex: 1;
            min-width: 200px;
        }

        .stat-box h3 {
            color: #FFD700;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .stat-box .number {
            font-size: 2.5em;
            color: #FFD700;
            font-weight: bold;
        }

        .visitors-list {
            margin-top: 40px;
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid #FFD700;
            padding: 20px;
            border-radius: 8px;
        }

        .visitors-list h2 {
            color: #FFD700;
            margin-bottom: 20px;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 10px;
        }

        .visitor-item {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            margin: 10px 0;
            border-left: 4px solid #FFA500;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .visitor-item strong {
            color: #FFD700;
        }

        .visitor-time {
            color: #aaa;
            font-size: 0.9em;
        }

        .visitor-badge {
            background: #FFD700;
            color: #000;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8em;
        }

        .users-list {
            margin-top: 40px;
        }

        .users-list h2 {
            color: #FFD700;
            margin-bottom: 20px;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 10px;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #FFD700;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .user-card:hover {
            background: rgba(255, 215, 0, 0.1);
            transform: translateX(5px);
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .user-info h3 {
            color: #FFD700;
            margin-bottom: 5px;
        }

        .user-info p {
            color: #aaa;
            font-size: 0.9em;
            margin: 3px 0;
        }

        .loading {
            text-align: center;
            color: #FFD700;
            font-size: 1.2em;
            padding: 40px;
        }

        .spinner {
            border: 4px solid rgba(255, 215, 0, 0.2);
            border-top: 4px solid #FFD700;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff0000;
            color: #ff6b6b;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .empty {
            text-align: center;
            color: #aaa;
            padding: 40px;
            font-size: 1.1em;
        }

        .refresh-btn {
            background: #FFD700;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: #FFA500;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⌚ ORA SWISS</h1>
        <p style="text-align: center; color: #aaa; margin-bottom: 30px;">Platforma e Shitjes së Orëve të Luksit</p>

        <!-- STATISTIKA -->
        <div class="stats">
            <div class="stat-box">
                <h3>👥 Përdorues DB</h3>
                <div class="number" id="count-users">0</div>
            </div>
            <div class="stat-box">
                <h3>⌚ Ora në Katalog</h3>
                <div class="number" id="count-products">0</div>
            </div>
            <div class="stat-box">
                <h3>🛒 Porosi</h3>
                <div class="number" id="count-orders">0</div>
            </div>
            <div class="stat-box">
                <h3>👀 Vizitorë Aktualë</h3>
                <div class="number" id="count-visitors">0</div>
            </div>
        </div>

        <!-- LISTA E VIZITORËVE -->
        <div class="visitors-list" id="visitors-container">
            <h2>👥 Vizitorët e Fundit</h2>
            <div id="visitors-content" style="max-height: 300px; overflow-y: auto;">
                <p style="color: #aaa; text-align: center;">Po përgjuron...</p>
            </div>
        </div>

        <!-- LISTA E PËRDORUESVE -->
        <div class="users-list">
            <h2>📋 Lista e Përdoruesve të Regjistruar (Database)</h2>
            <button class="refresh-btn" onclick="trackEvent('refresh_data'); loadAllData();">🔄 Përditeso</button>
            <div id="users-container" class="loading">
                <div class="spinner"></div>
                <p>Po ngarkohet...</p>
            </div>
        </div>
    </div>

    <script>
        // INICIALIZIMI I SUPABASE
        const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDI1NDk2MDAsImV4cCI6MjAxODEyNTYwMH0.7N0xYUQ_xYZ_example_key";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // LISTA E VIZITORËVE
        let visitorsList = [];

        // TRACK EVENTS
        function trackEvent(eventName, eventData = {}) {
            if (typeof gtag !== 'undefined') {
                gtag('event', eventName, eventData);
                console.log('📊 Event:', eventName);
            }
        }

        // KUR HAPET FAQJA
        window.addEventListener('load', function() {
            // Krijo visitor ID
            let visitorId = localStorage.getItem('visitorId');
            if (!visitorId) {
                visitorId = 'V' + Date.now();
                localStorage.setItem('visitorId', visitorId);
            }

            // Ruaj vizitorin
            let visitor = {
                id: visitorId,
                time: new Date().toLocaleTimeString('sq-AL'),
                date: new Date().toLocaleDateString('sq-AL'),
                browser: navigator.userAgent.split('/')[navigator.userAgent.split('/').length - 1].substring(0, 20)
            };

            visitorsList.push(visitor);
            document.getElementById('count-visitors').textContent = visitorsList.length;

            // Track event
            trackEvent('visitor_joined', {
                visitor_id: visitorId,
                total_visitors: visitorsList.length
            });

            // Shfaq vizitorët
            updateVisitorsDisplay();

            // Shfaq numrin e vizitoreve
            document.getElementById('count').textContent = visitorsList.length;
         
            // Ngarkoni të dhënat
            loadAllData();
        });

        // SHFAQ VIZITORËT
        function updateVisitorsDisplay() {
            let html = '';
            visitorsList.slice().reverse().forEach((visitor, index) => {
                html += `
                    <div class="visitor-item">
                        <div>
                            <strong>👤 ${visitor.id}</strong>
                            <div class="visitor-time">
                                🕐 ${visitor.time} | 📅 ${visitor.date}
                            </div>
                            <div class="visitor-time" style="font-size: 0.8em; margin-top: 5px;">
                                🌐 ${visitor.browser}
                            </div>
                        </div>
                        <div class="visitor-badge">#${visitorsList.length - index}</div>
                    </div>
                `;
            });
            document.getElementById('visitors-content').innerHTML = html || '<p style="color: #aaa;">Nuk ka vizitorë</p>';
        }

        // LOAD PËRDORUESIT NGA DATABASE
        async function loadAllData() {
            const usersContainer = document.getElementById("users-container");
            
            try {
                usersContainer.innerHTML = '<div class="loading"><div class="spinner"></div><p>Po ngarkohet...</p></div>';

                trackEvent('data_loading_started');

                // NGARKONI PËRDORUESIT
                const { data: users, error: usersError } = await supabase
                    .from('users')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (usersError) throw usersError;

                // NGARKONI PRODUKTET
                const { data: products, error: productsError } = await supabase
                    .from('products')
                    .select('*');

                if (productsError) throw productsError;

                // NGARKONI POROSITË
                const { data: orders, error: ordersError } = await supabase
                    .from('orders')
                    .select('*');

                // PËRDITËSONI STATISTIKAT
                const userCount = users?.length || 0;
                const productCount = products?.length || 0;
                const orderCount = orders?.length || 0;

                document.getElementById("count-users").textContent = userCount;
                document.getElementById("count-products").textContent = productCount;
                document.getElementById("count-orders").textContent = orderCount;

                trackEvent('data_loaded_successfully', {
                    users_count: userCount,
                    products_count: productCount,
                    orders_count: orderCount
                });

                // SHFAQ PËRDORUESIT
                displayUsers(users);

            } catch (error) {
                console.error("❌ Gabim:", error);
                
                trackEvent('data_loading_error', {
                    error_message: error.message
                });

                usersContainer.innerHTML = `
                    <div class="error">
                        <strong>❌ Gabim:</strong><br>
                        ${error.message}
                    </div>
                `;
            }
        }

        // SHFAQ PËRDORUESIT
        function displayUsers(users) {
            const container = document.getElementById("users-container");

            if (!users || users.length === 0) {
                container.innerHTML = '<div class="empty">📭 Ende nuk ka përdorues</div>';
                return;
            }

            let html = '';
            users.forEach((user) => {
                const avatar = user.full_name 
                    ? user.full_name.charAt(0).toUpperCase() 
                    : '👤';

                const createdDate = new Date(user.created_at).toLocaleDateString('sq-AL', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                html += `
                    <div class="user-card">
                        <div class="user-avatar">${avatar}</div>
                        <div class="user-info">
                            <h3>${user.full_name || 'Nuk ka emër'}</h3>
                            <p>📧 ${user.email}</p>
                            <p>📱 ${user.phone || '-'}</p>
                            <p>📅 ${createdDate}</p>
                            <p>🆔 ${user.id.substring(0, 8)}...</p>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // PËRDITËSO ÇËDO 30 SEKONDA
        setInterval(loadAllData, 30000);
    </script>
</body>
</html>
