<!DOCTYPE html>
<html>
<head>
<title>Messages - Oraswiss</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
}

.header {
    background:#000;
    color:white;
    padding:15px;
    text-align:center;
}

.chat-box {
    margin:20px;
    background:white;
    border-radius:12px;
    padding:20px;
}

.message {
    padding:10px;
    background:#eee;
    border-radius:10px;
    margin-bottom:10px;
}
</style>

</head>

<body>

<div class="header">
    💬 Messages
</div>

<div class="chat-box">

    <h3 id="chatTitle">
        Select a conversation
    </h3>

<div id="messages"></div>

<textarea id="messageText" placeholder="Write a message..."
style="width:100%; height:80px; margin-top:15px;"></textarea>


<input type="file" id="imageFile" accept="image/*" style="margin-top:10px;">

<button id="sendBtn"
style="margin-top:10px; padding:10px; width:100%;">
Send
</button>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/+esm";

const supabaseUrl = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
const supabaseKey = "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9";

const supabase = createClient(supabaseUrl, supabaseKey);

const params = new URLSearchParams(window.location.search);
const sellerId = params.get("seller");

console.log("SELLER ID:", sellerId);


if (sellerId) {
    document.getElementById("chatTitle").innerText = "Chat with seller";
} else {
    document.getElementById("chatTitle").innerText = "No conversation selected";
}


document.getElementById("sendBtn").onclick = async () => {

    const text = document.getElementById("messageText").value.trim();
    const imageFile = document.getElementById("imageFile").files[0];

    const { data: { user }, error } = await supabase.auth.getUser();


    if (error || !user) {
        console.log("User nuk u gjet", error);
        return;
    }


    if (!sellerId) {
        alert("Nuk u gjet shitësi");
        return;
    }


    let imageUrl = null;


    if (imageFile) {

        const filePath = user.id + "/" + Date.now() + "_" + imageFile.name;

        const { error: uploadError } = await supabase.storage
            .from("chat-images")
            .upload(filePath, imageFile);


        if (uploadError) {
            console.error(uploadError);
            return;
        }


        const { data } = supabase.storage
            .from("chat-images")
            .getPublicUrl(filePath);

        imageUrl = data.publicUrl;
    }



    const { error: insertError } = await supabase
        .from("messages")
        .insert({
            sender_id: user.id,
            receiver_id: sellerId,
            message: text,
            image_url: imageUrl
        });


    if (insertError) {
        console.error(insertError);
        return;
    }


    document.getElementById("messageText").value = "";
    document.getElementById("imageFile").value = "";

    loadMessages();

};



async function loadMessages() {


    const { data: { user }, error } = await supabase.auth.getUser();


    if (error || !user) {
        console.log("Pa user");
        return;
    }


    const { data: messages, error: msgError } = await supabase
        .from("messages")
        .select("*")
        .or(
        `and(sender_id.eq.${user.id},receiver_id.eq.${sellerId}),and(sender_id.eq.${sellerId},receiver_id.eq.${user.id})`
        )
        .order("created_at", { ascending:true });


    if (msgError) {
        console.error(msgError);
        return;
    }


    const box = document.getElementById("messages");

    box.innerHTML = "";
    console.log("MESAZHET NGA DATABASE:", messages);

    messages.forEach(msg => {

        const div = document.createElement("div");

        div.className = "message";


        div.innerHTML = `
            <b>${msg.sender_id === user.id ? "You" : "Seller"}:</b><br>
            ${msg.message || ""}
        `;


        if (msg.image_url) {

            div.innerHTML += `
            <br>
            <img src="${msg.image_url}"
            style="max-width:200px;border-radius:10px;">
            `;

        }


        box.appendChild(div);

    });

}



loadMessages();



supabase
.channel("messages-channel")
.on(
    "postgres_changes",
    {
        event:"INSERT",
        schema:"public",
        table:"messages"
    },
    (payload)=>{

        console.log("Mesazh i ri:", payload.new);

        loadMessages();

    }
)
.subscribe();


</script>
</body>
</html>
