<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
</head>

<body>

<h1>Orët e mia</h1>

<button id="btnSellNow" style="display:none;">
    Sell Now
</button>

<ul id="list"></ul>

<script type="module">

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
  'https://xyunmtvysqwonelecudf.supabase.co',
  'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx'
);

let currentUser = null;

// LOGIN CHECK (SIMPLE + STABLE)
async function auth() {
  const { data: { session } } = await supabase.auth.getSession();

  const btn = document.getElementById("btnSellNow");

  if (!session) {
    currentUser = null;
    btn.style.display = "none";
    return false;
  }

  currentUser = session.user;
  btn.style.display = "inline-block";
  return true;
}

// LOAD DATA
async function load() {

  const list = document.getElementById("list");

  if (!currentUser) {
    const ok = await auth();
    if (!ok) {
      list.innerHTML = "<li>Nuk je i loguar</li>";
      return;
    }
  }

  const { data, error } = await supabase
    .from("watches")
    .select("*")
    .eq("user_id", currentUser.id);

  if (error) {
    console.error(error);
    list.innerHTML = "<li>Gabim në server</li>";
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML = "<li>S’ke orë</li>";
    return;
  }

  list.innerHTML = "";

  data.forEach(item => {
    const li = document.createElement("li");

    const btn = document.createElement("button");
    btn.textContent = "Sell Now";

    btn.onclick = () => {
      window.location.href = sellnow.html?id=${item.id};
    };

    li.textContent = item.name + " ";
    li.appendChild(btn);

    list.appendChild(li);
  });
}

// BUTTON TOP
document.getElementById("btnSellNow").onclick = () => {
  window.location.href = "sellnow.html";
};

// INIT (RUN ONCE ONLY)
document.addEventListener("DOMContentLoaded", async () => {
  await auth();
  await load();
});

</script>

</body>
</html>
