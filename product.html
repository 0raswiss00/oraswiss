<div id="product-container">
    <h1 id="title">Duke ngarkuar...</h1>
    <div id="options-container" style="display: flex; gap: 10px; margin: 20px 0;">
        </div>
    <div id="details"></div>
</div>

<script>
    async function loadProduct() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        // 1. Marrim orën kryesore
        const { data: product, error } = await client.from('oras').select('*').eq('id', id).single();
        
        // 2. Marrim të gjitha variantet e këtij modeli (p.sh. 2974.1 dhe 2974.2)
        const { data: variants } = await client.from('oras')
            .select('*')
            .eq('brand', product.brand)
            .eq('model', product.model);

        document.getElementById('title').innerText = ${product.brand} ${product.model};

        // 3. Shfaqim opsionet (fotot e vogla)
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = variants.map(v => `
            <a href="product.html?id=${v.id}">
                <img src="https://gnwsrmelmeqduhhmfmoa.supabase.co/storage/v1/object/public/or-images/${v.image}" 
                     style="width: 80px; height: 80px; border: ${v.id == id ? '2px solid red' : '1px solid #ccc'}; cursor: pointer;">
            </a>
        `).join('');

        // 4. Shfaqim detajet
        document.getElementById('details').innerHTML = `
            <p>Çmimi: ${product.price} €</p>
            <p>Referenca: ${product.reference}</p>
            <a href="${product.paypal_link}">Bli Tani</a>
        `;
    }
    loadProduct();
</script>
