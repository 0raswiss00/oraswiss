<!DOCTYPE html>
<html lang="sq">
<head>
    <title>Dashboard-i Im</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="wrap">
    <h1>Mirë se erdhe!</h1>
    
    <!-- Butoni që kërkove për të shitur -->
    <button onclick="window.location.href='sellnow.html'" style="background: gold; width: 100%; padding: 15px;">
      + Sell Now
    </button>
    
    <h3>Orët e mia:</h3>
    <ul id="myWatchesList"></ul>
  </div>
</body>
    
<script type="module">
  // 1. Importo libraritë (rreshtat 22-23)
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

// Kopjo dhe zëvendëso rreshtat 26-29 me këtë:
const supabase = createClient(
  'https://gnwsrmelmeqduhhfmoa.supabase.co', 
  'sb_publishable_AkK_Z71htkvukN6Fy1cAQ_KBTXI...' // vendos çelësin tënd këtu
);

// 3. Shfaq orët nga Supabase
// Funksioni për të marrë dhe shfaqur orët
// 3. Shfaq orët nga Supabase për këtë përdorues
// 3. Shfaq orët nga Supabase për këtë përdorues
async function fetchWatches() {
    // Së pari marrim përdoruesin
    const { data: { user }, error: authError } = await supabase.auth.getUser();
    
    if (authError || !user) {
        console.log("Përdoruesi nuk është i loguar");
        return;
    }

    // Tërheqim vetëm orët që kanë user_id të njëjtë me përdoruesin e loguar
    const { data, error } = await supabase
        .from('oras')
        .select('*')
        .eq('user_id', user.id); 

    if (error) {
        console.error("Gabim gjatë marrjes së të dhënave:", error);
        return;
    }

    // Shfaqim orët në listë
    const list = document.getElementById('myWatchesList');
    if (list) {
        list.innerHTML = ""; 
        if (data && data.length > 0) {
            data.forEach(watch => {
                let li = document.createElement('li');
                li.innerHTML = `${watch.brand} - ${watch.model} | ${watch.price}€ 
                    <button onclick="deleteWatch('${watch.id}')">Fshi</button>`;
                list.appendChild(li);
            });
        } else {
            list.innerHTML = "<li>Nuk keni asnjë orë të shtuar.</li>";
        }
    }
}

// Thirr funksionin për të nisur procesin
fetchWatches();

// Thirr funksionin sapo faqja të jetë gati
fetchWatches();

  // 4. Funksioni për fshirje
  window.deleteWatch = async (watchId) => {
    const { error } = await supabase.from('oras').delete().eq('id', watchId);
    if (!error) location.reload();
  };
</script>

</body>
</html>
