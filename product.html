<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Detajet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
        .product-card { background: #111; border: 1px solid #333; padding: 20px; max-width: 500px; margin: auto; border-radius: 10px; }
        .slider-container { position: relative; width: 100%; overflow: hidden; margin-bottom: 15px; }
        .product-slider-img { width: 100%; border-radius: 10px; display: none; }
        .nav-btn { position: absolute; top: 50%; background: rgba(0,0,0,0.6); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .price { color: #25D366; font-weight: bold; font-size: 1.4em; margin: 10px 0; }
        .btn { display: block; text-align: center; text-decoration: none; font-weight: bold; border-radius: 5px; padding: 15px; margin-top: 10px; }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-paypal { background: #ffeb00; color: black; }
    </style>
</head>
<body>

    <div id="container">Duke ngarkuar...</div>

    <script>
        window.supabaseClient = window.supabase.createClient(
            "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ"
        );
        const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";

        async function loadProduct() {
            const id = new URLSearchParams(window.location.search).get('id');
            const container = document.getElementById("container");
            if (!id) { container.innerHTML = "Asnjë ID u gjet."; return; }

            try {
                const { data, error } = await window.supabaseClient.from('oras').select('*').eq('id', id).single();
                if (error) throw error;

                // 1. Logjika e fotove
                let imageArray = [];
                if (data.image_url) {
                    let raw = Array.isArray(data.image_url) ? data.image_url : [data.image_url];
                    imageArray = raw.map(img => img.startsWith('http') ? img : SUPABASE_URL + "/storage/v1/object/public/or-images/" + img);
                } else {
                    imageArray = ["https://placeholder.co/600x400/222/fff?text=No+Image"];
                }

                // 2. Ndërtimi i Slider-it
                let imagesHtml = imageArray.map((url, index) => 
                    <img src="${url}" class="product-slider-img" style="display: ${index === 0 ? 'block' : 'none'};">
                ).join('');
                
                let navHtml = imageArray.length > 1 ? `
                    <button class="nav-btn" style="left:5px;" onclick="changeImg(-1)">&#10094;</button>
                    <button class="nav-btn" style="right:5px;" onclick="changeImg(1)">&#10095;</button>` : '';

                // 3. Ndërtimi i kartës
                container.innerHTML = `
                    <div class="product-card">
                        <div class="slider-container">${imagesHtml}${navHtml}</div>
                        <h1>${data.brand} - ${data.model}</h1>
                        <div class="price">Price: ${data.price ? data.price + ' €' : 'Contact'}</div>
                        <hr>
                        <p><strong>Reference:</strong> ${data.reference || 'N/A'}</p>
                        <p><strong>Description:</strong> ${data.description || 'N/A'}</p>
                        <a href="https://wa.me/35569XXXXXXX?text=I%20am%20interested%20in:%20${encodeURIComponent(data.brand + ' ' + data.model)}" class="btn btn-whatsapp">💬 ORDER ON WHATSAPP</a>
                        ${(data.price && data.paypal_link) ? <a href="${data.paypal_link}" target="_blank" class="btn btn-paypal">🛒 BUY NOW (PayPal)</a> : ''}
                    </div>
                `;
            } catch (err) { container.innerHTML = "GABIM: " + err.message; }
        }

        window.changeImg = function(dir) {
            const imgs = document.getElementsByClassName('product-slider-img');
            let i = 0;
            for (; i < imgs.length; i++) if (imgs[i].style.display === 'block') break;
            imgs[i].style.display = 'none';
            i = (i + dir + imgs.length) % imgs.length;
            imgs[i].style.display = 'block';
        }

        loadProduct();
    </script>
</body>
</html>
