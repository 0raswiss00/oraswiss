<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ora Swiss - Users</title>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KD2ZZ3MJYY');
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #FFD700;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #FFD700;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stat-box {
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid #FFD700;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            flex: 1;
            min-width: 200px;
        }

        .stat-box h3 {
            color: #FFD700;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .stat-box .number {
            font-size: 2.5em;
            color: #FFD700;
            font-weight: bold;
        }

        .visitors-list {
            margin-top: 40px;
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid #FFD700;
            padding: 20px;
            border-radius: 8px;
        }

        .visitors-list h2 {
            color: #FFD700;
            margin-bottom: 20px;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 10px;
        }

        .visitor-item {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            margin: 10px 0;
            border-left: 4px solid #FFA500;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .visitor-item strong {
            color: #FFD700;
        }

        .visitor-time {
            color: #aaa;
            font-size: 0.9em;
        }

        .visitor-badge {
            background: #FFD700;
            color: #000;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8em;
        }

        .users-list {
            margin-top: 40px;
        }

        .users-list h2 {
            color: #FFD700;
            margin-bottom: 20px;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 10px;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #FFD700;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .user-card:hover {
            background: rgba(255, 215, 0, 0.1);
            transform: translateX(5px);
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .user-info h3 {
            color: #FFD700;
            margin-bottom: 5px;
        }

        .user-info p {
            color: #aaa;
            font-size: 0.9em;
            margin: 3px 0;
        }

        .loading {
            text-align: center;
            color: #FFD700;
            font-size: 1.2em;
            padding: 40px;
        }

        .spinner {
            border: 4px solid rgba(255, 215, 0, 0.2);
            border-top: 4px solid #FFD700;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff0000;
            color: #ff6b6b;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .empty {
            text-align: center;
            color: #aaa;
            padding: 40px;
            font-size: 1.1em;
        }

        .refresh-btn {
            background: #FFD700;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: #FFA500;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⌚ ORA SWISS</h1>
        <p style="text-align: center; color: #aaa; margin-bottom: 30px;">Platforma e Shitjes së Orëve të Luksit</p>

        <!-- STATISTIKA -->
        <div class="stats">
            <div class="stat-box">
                <h3>👥 Përdorues DB</h3>
                <div class="number" id="count-users">0</div>
            </div>
            <div class="stat-box">
                <h3>⌚ Ora në Katalog</h3>
                <div class="number" id="count-products">0</div>
            </div>
            <div class="stat-box">
                <h3>🛒 Porosi</h3>
                <div class="number" id="count-orders">0</div>
            </div>
            <div class="stat-box">
                <h3>👀 Vizitorë Aktualë</h3>
                <div class="number" id="count-visitors">0</div>
            </div>
        </div>

        <!-- LISTA E VIZITORËVE -->
        <div class="visitors-list" id="visitors-container">
            <h2>👥 Vizitorët e Fundit</h2>
            <div id="visitors-content" style="max-height: 300px; overflow-y: auto;">
                <p style="color: #aaa; text-align: center;">Po përgjuron...</p>
            </div>
        </div>

        <!-- LISTA E PËRDORUESVE -->
        <div class="users-list">
            <h2>📋 Lista e Përdoruesve të Regjistruar (Database)</h2>
            <button class="refresh-btn" onclick="trackEvent('refresh_data'); loadAllData();">🔄 Përditeso</button>
            <div id="users-container" class="loading">
                <div class="spinner"></div>
                <p>Po ngarkohet...</p>
            </div>
        </div>
    </div>

<script>
    const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
    const SUPABASE_KEY = "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let visitorsList = [];

    function trackEvent(eventName, eventData = {}) {
        if (typeof gtag !== 'undefined') {
            gtag('event', eventName, eventData);
        }
    }

    window.addEventListener('load', function() {
        let visitorId = localStorage.getItem('visitorId');
        if (!visitorId) {
            visitorId = 'V' + Date.now();
            localStorage.setItem('visitorId', visitorId);
        }

        visitorsList.push({
            id: visitorId,
            time: new Date().toLocaleTimeString('sq-AL'),
            date: new Date().toLocaleDateString('sq-AL'),
            browser: navigator.userAgent.split('/').pop().substring(0, 20)
        });

        document.getElementById('count-visitors').textContent = visitorsList.length;
        updateVisitorsDisplay();
        loadAllData();
    });

    function updateVisitorsDisplay() {
        let html = '';
        visitorsList.slice().reverse().forEach((visitor, index) => {
            html += `
                <div class="visitor-item">
                    <div>
                        <strong>👤 ${visitor.id}</strong>
                        <div class="visitor-time">🕐 ${visitor.time} | 📅 ${visitor.date}</div>
                        <div class="visitor-time" style="font-size:0.8em">🌐 ${visitor.browser}</div>
                    </div>
                    <div class="visitor-badge">#${visitorsList.length - index}</div>
                </div>
            `;
        });
        document.getElementById('visitors-content').innerHTML = html || '<p style="color:#aaa;">Nuk ka vizitorë</p>';
    }

    async function loadAllData() {
        try {
            const { count: userCount, error: userError } = await supabase
                .from('profiles')
                .select('*', { count: 'exact', head: true });

            // Në vend të .select('*', { count: 'exact', head: true })
            // Provo të përdorësh .select('id', { count: 'exact', head: true })
            const { count: watchCount, error: watchError } = await supabase
                .from('watches')
                .select('id', { count: 'exact', head: true }); 

            document.getElementById("count-users").textContent = userCount || 0;
            document.getElementById("count-products").textContent = watchCount || 0;

        } catch (error) {
            console.error("Gabim:", error);
        }
    }

    setInterval(loadAllData, 30000);
</script>
</body>    
</html>
