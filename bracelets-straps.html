<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sell Bracelet / Strap</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}


form{

    max-width:600px;
    margin:30px auto;
    background:#1b1b1b;
    padding:25px;
    border-radius:10px;

}


h2{

    text-align:center;

}


label{

    display:block;
    margin-top:12px;
    margin-bottom:5px;
    color:#ccc;

}


input,select,textarea{

    width:100%;
    padding:10px;
    background:#222;
    color:white;
    border:1px solid #444;
    border-radius:5px;
    box-sizing:border-box;

}


button{

    width:100%;
    margin-top:20px;
    padding:12px;
    background:#c9a227;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;

}


button:hover{

    opacity:.8;

}


</style>

</head>


<body>


<form id="braceletForm">


<h2>Add Bracelet / Strap</h2>


<label>Category</label>

<input 
id="category"
value="Bracelets / Straps"
readonly>


<label>Brand</label>
<input id="brand" type="text" placeholder="Brand" required>

<label>Model</label>
<input id="model" type="text" placeholder="Model">

<label>Reference Number</label>
<input id="reference" type="text" placeholder="Reference number">



<label>Year</label>
<input id="year" type="number" placeholder="Year">

    

<label>Price (€)</label>

<input 
id="price"
type="number"
placeholder="Price">



<label>Type</label>

<select id="type">

<option value="Bracelet">
Bracelet
</option>

<option value="Strap">
Strap
</option>

</select>



<label>Condition</label>

<select id="condition">

<option value="New">
New
</option>

<option value="Used">
Used
</option>

</select>



<label>Material</label>

<select id="material">

<option>Stainless Steel</option>
<option>Titanium</option>
<option>Gold</option>
<option>White Gold</option>
<option>Rose Gold</option>
<option>Platinum</option>
<option>Ceramic</option>
<option>Carbon</option>
<option>Silver</option>
<option>Two-Tone</option>
<option>Leather</option>
<option>Crocodile</option>
<option>Alligator</option>
<option>Snake</option>
<option>Rubber</option>
<option>NATO</option>
<option>Textile</option>
<option>Other</option>

</select>



<label>Gold Purity</label>

<select id="gold_purity">

<option value="">
Select
</option>

<option>
18K
</option>

<option>
14K
</option>

<option>
22K
</option>

<option>
24K
</option>

</select>



<label>Color</label>

<select id="color">

<option>Silver</option>
<option>Black</option>
<option>Gold</option>
<option>Rose Gold</option>
<option>Two-Tone</option>
<option>Brown</option>
<option>Blue</option>
<option>Other</option>

</select>



<label>Lug Width (mm)</label>

<input 
id="lug_width"
type="text"
placeholder="Example: 20mm">



<label>Clasp / Buckle Width (mm)</label>

<input 
id="clasp_width"
type="text"
placeholder="Example: 18mm">



<label>Length (mm)</label>

<input 
id="length"
type="text"
placeholder="Example: 120/75mm">



<label>Thickness (mm)</label>

<input 
id="thickness"
type="text"
placeholder="Example: 3.5mm">



<label>Description</label>

<textarea
id="description"
rows="5"
placeholder="Description">
</textarea>



<label>Upload Photos</label>

<input 
id="fileInput"
type="file"
accept="image/*"
multiple>


<button type="submit">
Sell Now
</button>


</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>

<script src="db-connect.js"></script>


<script type="module">


const { data:{user} } = 
await window.supabaseClient.auth.getUser();


if(!user){

    alert("You must be logged in");

    window.location.href="register.html";

}



document
.getElementById("braceletForm")
.addEventListener("submit", async function(e){


e.preventDefault();



const files = 
document.getElementById("fileInput").files;



let imageUrls = [];

// Merri fajlat nga ID-ja e saktë në HTML (fileInput)
const fileInput = document.getElementById("fileInput");
const files = fileInput ? fileInput.files : [];

// Upload photos
for(let i = 0; i < files.length; i++){
    const file = files[i];

    const fileName = 
        Date.now() + "_" + i + "_" + file.name;

    const { error: uploadError } = 
        await window.supabaseClient
            .storage
            .from("or-images")
            .upload(fileName, file);

    if (uploadError) {
        console.error("Gabim në upload:", uploadError);
        continue;
    }

    const { data: urlData } = window.supabaseClient
        .storage
        .from("or-images")
        .getPublicUrl(fileName);

    if (urlData) {
        imageUrls.push(urlData.publicUrl);
    }
}



const productData = {


user_id:user.id,


category:
"bracelets_straps",


brand:
document.getElementById("brand").value,


model: 
document.getElementById("model").value,


reference:
document.getElementById("reference").value,

   
year: 
Number(document.getElementById("year").value) || null,

    
price:
Number(
document.getElementById("price").value
) || null,


type:
document.getElementById("type").value,


condition:
document.getElementById("condition").value,


material:
document.getElementById("material").value,


gold_purity:
document.getElementById("gold_purity").value,


color:
document.getElementById("color").value,


lug_width:
document.getElementById("lug_width").value,


clasp_width:
document.getElementById("clasp_width").value,


length:
document.getElementById("length").value,


thickness:
document.getElementById("thickness").value,


description:
document.getElementById("description").value,


image_url:
imageUrls[0] || null


};




console.log(
"Sending:",
productData
);


    

console.log("Sending:", productData);    
    
console.log("AUTH USER:", user);
console.log("PRODUCT USER ID:", productData.user_id);

    


const {data, error} =

await window.supabaseClient

.from("bracelets_straps")

.insert([productData])
.select();


console.log("INSERT DATA:", data);
console.log("INSERT ERROR:", error);




if(error){


alert(
"Database error: "
+
error.message
);


return;


}




alert(
"Bracelet / Strap published successfully!"
);



window.location.href =
"dashboard.html";



});



</script>


</body>

</html>
