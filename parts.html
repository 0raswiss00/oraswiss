<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <title>Parts - Ora Swiss</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
    /* Stili për butonat si te image_19.png */
    .nav-filters { margin-bottom: 30px; }
    .nav-filters a { background: #2a2a8e; color: #fff; padding: 8px 15px; border-radius: 20px; text-decoration: none; margin-right: 10px; font-weight: bold; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
    .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
    .price { color: #25D366; font-weight: bold; margin-top: 10px; font-size: 1.2em; }
  </style>
</head>
<body>

  <!-- Butonat e navigimit -->
  <div class="nav-filters">
    <a href="luxury.html">Luxury 3</a>
    <a href="vintage.html">Vintage 2</a>
    <a href="parts.html">Parts 1</a>
  </div>

  <h1>Parts Collection</h1>
  <div id="oras-container" class="grid">Duke ngarkuar koleksionin...</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
  const SUPABASE_KEY = "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"; 
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function loadOras() {
    const container = document.getElementById("oras-container");
    
    // --- KËTU ËSHTË NDRYSHIMI PËR ÇDO FAQE ---
    // Në luxury.html shkruaj 'luxury'
    // Në vintage.html shkruaj 'vintage'
    // Në parts.html shkruaj 'parts'
    const category = 'parts'; 
    // ----------------------------------------

    const { data, error } = await client
      .from('oras')
      .select('*')
      .eq('category', category);

    if (error) {
      container.innerHTML = "Gabim: " + error.message;
      return;
    }

    container.innerHTML = "";
    
    if (data.length === 0) {
      container.innerHTML = "<p>Nuk ka artikuj në këtë kategori.</p>";
      return;
    }

data.forEach(ora => {
    // 1. Logjika ekzistuese për kontrollin e fotos (Përshtatur për të marrë foton e parë nëse ka shumë)
    let imgUrl = "https://placeholder.co/600x400/222/fff?text=No+Image";
    
    // Kontrollojmë nëse ka foto (nëse i ke ruajtur si array ose tekst të ndarë me presje)
    let primaryImage = ora.image_url;
    if (ora.images && ora.images.length > 0) {
        primaryImage = Array.isArray(ora.images) ? ora.images[0] : ora.images.split(',')[0];
    }

    if (primaryImage && primaryImage !== 'null' && primaryImage !== '') {
        if (primaryImage.startsWith('http')) {
            imgUrl = primaryImage;
        } else {
            // SUPABASE_URL duhet të jetë e përcaktuar më lart në kodin tënd
            imgUrl = SUPABASE_URL + "/storage/v1/object/public/or-images/" + primaryImage;
        }
    }

    // 2. KUSHTI I RI: Kontrollojmë nëse ka çmim për të shfaqur butonin e verdhë "Buy Now"
    const buyNowButton = ora.price 
        ? `<a href="${ora.paypal_link}" target="_blank" style="text-decoration:none;">
             <button class="btn-main btn-buy" style="margin-top:5px; width:100%; background-color: #ffeb00; color: #000; font-weight: bold; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">
                 🛒 Buy Now
             </button>
           </a>` 
        : ''; // Nëse s'ka çmim, nuk shfaqet fare

    // 3. Injektimi në HTML (Rreshti 66 e poshtë)
    container.innerHTML += `
    <div class="card" style="border: 1px solid #333; padding: 15px; border-radius: 10px; background: #111; margin-bottom: 15px;">
        <h3 onclick="window.location.href='product.html?id=${ora.id}'" style="cursor:pointer; color: #fff;">
            ${ora.brand} - ${ora.model}
        </h3>

        <img src="${imgUrl}" style="width: 100%; height: auto; border-radius: 10px; margin-top: 5px;">

        <div class="price" style="color: #2ecc71; font-weight: bold; margin: 10px 0;">
            ${ora.price ? ora.price + ' €' : 'Contact'}
        </div>

        <input type="email" placeholder="Emaili yt" style="width:100%; margin: 5px 0; padding:8px; box-sizing: border-box; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px;">
        
        <button class="btn-main btn-secondary" style="width: 100%; padding: 10px; margin-bottom: 5px; border-radius: 5px; border: 1px solid #555; background: #333; color: #fff; cursor: pointer;">
            Send Request
        </button>

        ${buyNowButton}

        <div style="display: flex; gap: 5px; margin-top: 5px;">
            <button class="btn-main btn-secondary" onclick="event.stopPropagation(); alert('Liked!')" style="flex: 1; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; cursor: pointer;">
                ❤️ Like
            </button>
            <button class="btn-main btn-secondary" style="flex: 1; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; cursor: pointer;">
                🔗 Share
            </button>
        </div>
    </div>
    `;
});
}

  loadOras();
</script>

</body>
</html>
