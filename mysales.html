<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>My Sales - Ora Swiss</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .sale-item { border: 1px solid #333; margin-bottom: 15px; padding: 10px; display: flex; align-items: center; gap: 15px; border-radius: 8px; }
        .sale-item img { width: 100px; height: 100px; object-fit: cover; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="salesList">Duke ngarkuar...</div>

    <script>
        // Inicializimi
        const myOraSwissClient = window.supabase.createClient(
            "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
            "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"
        );

        async function loadMySales() {
            const salesList = document.getElementById("salesList");
            
            const { data: { user } } = await myOraSwissClient.auth.getUser();
            
            if (!user) {
                salesList.innerHTML = "Ju lutem logohuni.";
                return;
            }

            const { data, error } = await myOraSwissClient
                .from('oras')
                .select('*')
                .eq('user_id', user.id);

            if (error) {
                salesList.innerHTML = "Gabim: " + error.message;
                return;
            }

            if (!data || data.length === 0) {
                salesList.innerHTML = "Nuk keni asnjë artikull në shitje.";
                return;
            }

    
    // Gjenerimi i listës me imazhe të klikueshme
    salesList.innerHTML = data.map(item => `
        <div class="sale-item">
            <!-- Tani imazhi të çon te product.html -->
            <a href="product.html?id=${item.id}">
                <img src="${item.image_url && item.image_url[0] ? item.image_url[0] : 'placeholder.jpg'}" alt="${item.brand}">
            </a>

            <div>
                <strong>${item.brand} ${item.model}</strong><br>
                <small>Çmimi: ${item.price} €</small>
                <div style="margin-top:10px;">
                    <!-- Edhe butoni "Shiko" tani të çon te product.html -->
                    <button onclick="window.location.href='product.html?id=${item.id}'">Shiko</button>
                    <button onclick="window.location.href='edit.html?id=${item.id}'" style="background:#444; color:#fff;">Modifiko</button>
                </div>
            </div>
        </div>
    `).join('');
</script>

</body>
</html>
