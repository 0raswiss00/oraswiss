<body>

    <div id="container">Duke ngarkuar...</div>

    <script>
        // Përdorim 'var' dhe një kontroll që të mos prishet nëse është deklaruar diku tjetër
        if (typeof window.supabaseClient === 'undefined') {
            window.supabaseClient = window.supabase.createClient(
                "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ"
            );
        }
        var supabase = window.supabaseClient;

        async function loadProduct() {
            const id = new URLSearchParams(window.location.search).get('id');
            const container = document.getElementById("container");

            if (!id) {
                container.innerHTML = "Asnjë ID u gjet.";
                return;
            }

try {
    // 1. Marrim të dhënat
    const { data, error } = await supabase.from('oras').select('*').eq('id', id).single();
    if (error) throw error;

    // 2. Logjikë e sigurt për foton:
    // Përdor image_url nëse ekziston, përndryshe përdor referencën + .jpg
    let fileName = data.image_url;
    if (!fileName) {
        fileName = ${data.reference}.jpg; 
    }

    // 3. Gjenerojmë URL-në
    const { data: publicUrlData } = supabase.storage.from('or-images').getPublicUrl(fileName);
    
    // 4. Mbrojtje: Nëse URL-ja dështon, përdorim një foto rezervë
    const fullImageUrl = (publicUrlData && publicUrlData.publicUrl) ? publicUrlData.publicUrl : 'https://placeholder.co/400x400?text=No+Image';

    // 5. Ndërtojmë HTML-në (këtu përdorim fullImageUrl që krijuam lart)
    container.innerHTML = `
        <div style="border:1px solid #333; padding:20px; max-width:500px; margin:auto;">
            <img src="${fullImageUrl}" alt="Ora" style="width:100%;">
            <h1>${data.brand || ''} ${data.model || ''}</h1>
            <p><strong>Price:</strong> ${data.price || 'N/A'} €</p>
            <hr>
            <p><strong>Reference:</strong> ${data.reference || 'N/A'}</p>
            ... (shto pjesët e tjera që ke) ...
        </div>
    `;
} catch (err) {
    console.error("Gabim kritik:", err);
    container.innerHTML = "<p>Gabim gjatë ngarkimit të produktit.</p>";
}

                
               container.innerHTML = `
                   <div style="border:1px solid #333; padding:20px; max-width:500px; margin:auto;">
                       <img src="${data.image_url ? fullImageUrl : 'https://placehold.co/400x400?text=No+Image'}" alt="${data.model}" style="width:100%; height:auto; margin-bottom:20px;">
                       <h1>${data.brand} ${data.model}</h1>
                       <p><strong>Price:</strong> ${data.price} €</p>
        
                       <hr>
                       <p><strong>Reference:</strong> ${data.reference || 'N/A'}</p>
                       <p><strong>Case Size:</strong> ${data.case_size || 'N/A'} mm</p>
                       <p><strong>Movement:</strong> ${data.movement || 'N/A'}</p>
                       <p><strong>Function:</strong> ${data.function || 'N/A'}</p>
                       <p><strong>Service:</strong> ${data.service ? 'Yes (Serviced)' : 'No'}</p>
                       <p><strong>Box & Papers:</strong> ${data.box_papers ? 'Full Set' : 'Watch Only'}</p>
        
                       <br>
                       <a href="https://wa.me/35569XXXXXXX?text=I%20am%20interested%20in:%20${data.brand}%20${data.model}" 
                           style="background:#25D366; color:white; padding:15px; display:block; text-align:center; text-decoration:none; font-weight:bold; border-radius:5px;">
                          ORDER ON WHATSAPP
                        </a>

                        <a href="${data.paypal_link}" target="_blank" 
                            style="background:#0070ba; color:white; padding:15px; display:block; text-align:center; text-decoration:none; font-weight:bold; border-radius:5px; margin-top:10px;">
                           BUY NOW (PayPal)
                        </a>


                    </div>
`                ;
            } catch (err) {
                container.innerHTML = "GABIM: " + err.message;
            }
        }
        loadProduct();
    </script>
