<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sell Your Watch</title>
  <style>
    body { font-family: Arial; background: #000; color: #fff; padding: 20px; }
    form { max-width: 600px; margin: 0 auto; background: #111; padding: 20px; border-radius: 10px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    input, select, textarea { width: 100%; padding: 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; box-sizing: border-box;}
    button { width: 100%; padding: 15px; background: gold; color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>

<form id="sellForm">
  <h2>Shto orë të re</h2>
  <div class="row">
    <input type="text" id="brand" placeholder="Brand" required>
    <input type="text" id="model" placeholder="Model">
  </div>
  <!-- ... fushat e tjera si më parë ... -->
  <input type="text" id="reference" placeholder="Reference">
  <input type="text" id="material" placeholder="Material">
  
  <label style="display:block; margin-top:10px;">Ngarko Foton:</label>
  <input type="file" id="image_file" accept="image/*" style="margin-bottom: 15px;">

  <button type="submit">Shto orën</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
<script>
  const supabase = window.supabase.createClient("https://gnwsrmelmeqduhhmfmoa.supabase.co", "YOUR_ANON_KEY");

  document.getElementById('sellForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const file = document.getElementById('image_file').files[0];
    let imageUrl = "";

    if (file) {
      const fileName = ${Date.now()}_${file.name};
      const { data, error: uploadError } = await supabase.storage
        .from('images') // SIGUROHU që ke një bucket me emrin 'images' në Supabase
        .upload(fileName, file);

      if (uploadError) return alert("Gabim në ngarkim: " + uploadError.message);
      
      const { data: publicData } = supabase.storage.from('images').getPublicUrl(fileName);
      imageUrl = publicData.publicUrl;
    }

    const oraData = {
      brand: document.getElementById('brand').value,
      model: document.getElementById('model').value,
      image_url: imageUrl, // Këtu ruhet linku që krijohet automatikisht
      category: 'luxury'
    };

    const { error } = await supabase.from('oras').insert([oraData]);
    if (error) alert("Gabim: " + error.message);
    else alert("U shtua me sukses!");
  });
</script>
</body>
</html>
