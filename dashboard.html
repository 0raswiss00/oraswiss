<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>myOraSwiss - Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: #000; color: #fff; padding: 20px; }
        .profile-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .btn-sell { background: gold; color: #000; font-weight: bold; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 20px; }
        
        /* Stili për menunë My OraSwiss */
        .my-oraswiss-menu { display: none; flex-direction: column; gap: 15px; margin-bottom: 30px; background: #111; padding: 15px; border-radius: 8px; }
        .my-oraswiss-menu.active { display: flex; }
        
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; cursor: pointer; }
        .btn-toggle { background: #333; color: white; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; text-align: center; margin-bottom: 20px; }
        
        .watch-card { background: #111; margin-bottom: 10px; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 15px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <h2>Ardian Cela</h2>
        <a href="profile.html" style="color: gold; text-decoration: none;">To your profile</a>
    </div>

    <button class="btn-sell" onclick="window.location.href='sellnow.html'">+ Sell Now</button>

    <!-- Butoni që hap menunë -->
    <div class="btn-toggle" onclick="toggleMenu()">My OraSwiss ▼</div>

    <!-- Menuja e fshehur që do të shfaqet me klikim -->
    <div id="myOraSwissMenu" class="my-oraswiss-menu">
        <div class="menu-item" onclick="location.href='buy.html'"><span>🛒 Buy</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='messages.html'"><span>✉️ Messages</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='settings.html'"><span>⚙️ Account Settings</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='support.html'"><span>🎧 Support</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='info.html'"><span>ℹ️ Info</span> <span>></span></div>
    </div>

    <button onclick="ngarkoArtikujt()" class="btn-sell" style="background: #333; color: white;">
        Shfaq artikujt e mi
    </button>

    <ul id="myWatchesList" style="list-style: none; padding: 0;"></ul>

<script>
    // Funksioni për të shfaqur/fshehur menunë
    function toggleMenu() {
        const menu = document.getElementById('myOraSwissMenu');
        menu.classList.toggle('active');
    }
</script>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
  // ... (pjesa tjetër e kodit tuaj të Supabase mbetet e njëjtë)
</script>
</body>
</html>
