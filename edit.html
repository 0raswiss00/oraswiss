<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Edit - Ora Swiss</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #f39c12; margin-top: 0; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        .btn-save { background: #f39c12; color: #121212; }
        .btn-delete { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Modifiko Produktin</h2>
    <input type="text" id="brand" placeholder="Brand">
    <input type="text" id="model" placeholder="Model">
    <input type="number" id="price" placeholder="Price">
    <textarea id="description" placeholder="Description"></textarea>
    <input type="file" id="image_input" multiple accept="image/*">
    
    <button class="btn-save" onclick="saveProduct()">Ruaj Ndryshimet</button>
    <button class="btn-delete" onclick="deleteProduct()">Fshi Produktin</button>
</div>
<script>
    // 1. Inicializimi
    const supabaseClient = supabase.createClient(
        "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
        "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"
    );

    const productId = new URLSearchParams(window.location.search).get('id');

    // 2. Ngarko të dhënat në fushat kur faqja hapet
    async function loadData() {
        if (!productId) {
            console.log("Nuk ka ID në URL");
            return;
        }
        
        const { data, error } = await supabaseClient
            .from('oras')
            .select('*')
            .eq('id', productId)
            .single();

        if (error) {
            console.error("Gabim gjatë ngarkimit:", error);
            return;
        }

        if (data) {
            if(document.getElementById("brand")) document.getElementById("brand").value = data.brand || '';
            if(document.getElementById("model")) document.getElementById("model").value = data.model || '';
            if(document.getElementById("price")) document.getElementById("price").value = data.price || '';
            if(document.getElementById("description")) document.getElementById("description").value = data.description || '';
        }
    }

    // 3. Ruaj ndryshimet (me foto)
    async function saveProduct() {
        const fileInput = document.getElementById('image_input');
        let imageUrl = null;

        // Nëse është zgjedhur foto, ngarkoje tek 'or-images'
        if (fileInput && fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const fileName = ${Date.now()}_${file.name};
            
            const { error: uploadError } = await supabaseClient.storage
                .from('or-images') 
                .upload(fileName, file);

            if (uploadError) { 
                alert("Gabim gjatë ngarkimit të fotos: " + uploadError.message); 
                return; 
            }
            
            const { data } = supabaseClient.storage.from('or-images').getPublicUrl(fileName);
            imageUrl = data.publicUrl;
        }

        // Përgatit të dhënat për tabelën 'oras'
// ... pjesa e sipërme e funksionit ...

const updateData = {
    brand: document.getElementById("brand").value,
    model: document.getElementById("model").value,
    price: parseFloat(document.getElementById("price").value),
    description: document.getElementById("description").value
};

// KËTU ËSHTË NDRYSHIMI: 
// E mbështjellim imageUrl brenda kllapave [] që të bëhet Array
if (imageUrl) updateData.image_url = [imageUrl]; 

const { error } = await supabaseClient
    .from('oras')
    .update(updateData)
    .eq('id', productId);
        
        if (error) {
            alert("Gabim gjatë ruajtjes në bazën e të dhënave: " + error.message);
        } else {
            alert("U ruajt me sukses!");
            window.location.href = 'index.html';
        }
    }

    // 4. Fshi produktin
    async function deleteProduct() {
        if (!confirm("Je i sigurt që dëshiron ta fshish këtë produkt?")) return;
        
        const { error } = await supabaseClient
            .from('oras')
            .delete()
            .eq('id', productId);
            
        if (error) {
            alert("Gabim gjatë fshirjes: " + error.message);
        } else {
            alert("Produkti u fshi me sukses!");
            window.location.href = 'index.html';
        }
    }

// --- KODI QË DUHET TË SHTOSH ---

let currentIndex = 0; // Indexi aktual i fotos

function ndryshoFoto() {
    // Supozojmë që variabla 'produkti' përmban të dhënat e marra nga Supabase
    // dhe 'image_url' është një array (p.sh. ["foto1.jpg", "foto2.jpg"])
    if (window.produktData && window.produktData.image_url) {
        const images = window.produktData.image_url;
        const imgElement = document.getElementById("product-image");

        // Kalojmë tek fotoja tjetër
        currentIndex = (currentIndex + 1) % images.length;
        
        // Ndryshojmë src e imazhit
        imgElement.src = images[currentIndex];
    }
}
    
    // Ekzekuto ngarkimin sapo të hapet faqja
    loadData();
</script>

</body>
</html>
