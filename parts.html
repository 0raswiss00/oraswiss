<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <title>Parts - Ora Swiss</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
    /* Stili për butonat si te image_19.png */
    .nav-filters { margin-bottom: 30px; }
    .nav-filters a { background: #2a2a8e; color: #fff; padding: 8px 15px; border-radius: 20px; text-decoration: none; margin-right: 10px; font-weight: bold; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
    .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
    .price { color: #25D366; font-weight: bold; margin-top: 10px; font-size: 1.2em; }
  </style>
</head>
<body>

  <!-- Butonat e navigimit -->
  <div class="nav-filters">
    <a href="luxury.html">Luxury 3</a>
    <a href="vintage.html">Vintage 2</a>
    <a href="parts.html">Parts 1</a>
  </div>

  <h1>Parts Collection</h1>
  <div id="oras-container" class="grid">Duke ngarkuar koleksionin...</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
  const SUPABASE_KEY = "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"; 
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function loadOras() {
    const container = document.getElementById("oras-container");
    
    // --- KËTU ËSHTË NDRYSHIMI PËR ÇDO FAQE ---
    // Në luxury.html shkruaj 'luxury'
    // Në vintage.html shkruaj 'vintage'
    // Në parts.html shkruaj 'parts'
    const category = 'parts'; 
    // ----------------------------------------

    const { data, error } = await client
      .from('oras')
      .select('*')
      .eq('category', category);

    if (error) {
      container.innerHTML = "Gabim: " + error.message;
      return;
    }

    container.innerHTML = "";
    
    if (data.length === 0) {
      container.innerHTML = "<p>Nuk ka artikuj në këtë kategori.</p>";
      return;
    }

container.innerHTML = data.map(ora => {

    // 1. Ndërtimi i linkut të fotos
    let imgUrl = "https://placeholder.co/600x400/222/fff?text=No+Image";
    if (ora['image-url']) {
        if (Array.isArray(ora['image-url']) && ora['image-url'].length > 0) {
            imgUrl = "https://gnwsrmelmeqduhhmfmoa.supabase.co/storage/v1/object/public/images/" + ora['image-url'][0];
        } else if (typeof ora['image-url'] === 'string' && ora['image-url'].trim() !== '') {
            if (ora['image-url'].startsWith('http')) {
                imgUrl = ora['image-url'];
            } else {
                imgUrl = "https://gnwsrmelmeqduhhmfmoa.supabase.co/storage/v1/object/public/images/" + ora['image-url'];
            }
        }
    }

    // 2. Kthimi i HTML-së së saktësuar
    return `
    <div class="card" onclick="window.location.href='product.html?id=${ora.id}'" style="cursor:pointer;">
        <img src="${imgUrl}" alt="${ora.brand || 'Ora'}">
        <h3>${ora.brand || ''} - ${ora.model || ''}</h3>
        <p style="color:#aaa; font-size:14px; margin:5px 0;">Ref: ${ora.reference || '/'}</p>
        <div class="price">${ora.price ? ora.price + ' €' : 'Contact'}</div>

        <input type="email" id="email_${ora.id}" placeholder="Emaili yt" style="width:100%; margin: 5px 0; padding:10px; box-sizing:border-box;" onclick="event.stopPropagation();">
        
        <button class="btn-main btn-secondary" style="width:100%; margin-top:5px;" onclick="event.stopPropagation(); const emailVal = document.getElementById('email_${ora.id}').value; if(!emailVal){ alert('Ju lutem vendosni email-in tuaj!'); return; } alert('Kërkesa u dërgua për email-in: ' + emailVal);">
            Send Request
        </button>

        ${ora.price && ora.paypal_link ? `
        <a href="${ora.paypal_link}" target="_blank" style="text-decoration:none;" onclick="event.stopPropagation();">
            <button class="btn-main btn-buy" style="width:100%; margin-top:5px; background-color:#ffeb00; color:#000; font-weight:bold; padding:10px; border:none; border-radius:5px; cursor:pointer;">
                🛒 Buy Now
            </button>
        </a>
        ` : ''}

        <div style="display: flex; gap: 5px; margin-top: 5px;">
            <button style="flex: 1; padding: 8px; background: #222; color: #fff; border: 1px solid #333; cursor:pointer;" onclick="event.stopPropagation(); this.style.background = '#444'; alert('Liked!')">
                ❤️ Like
            </button>
            
            <button style="flex: 1; padding: 8px; background: #222; color: #fff; border: 1px solid #333; cursor:pointer;" onclick="event.stopPropagation(); const productUrl = window.location.origin + '/product.html?id=${ora.id}'; navigator.clipboard.writeText(productUrl).then(() => { alert('Linku i produktit u kopjua!'); }).catch(err => { alert('Gabim gjatë kopjimit!'); });">
                🔗 Share
            </button>
        </div>
    </div>
    `;
}).join('');

  loadOras();
</script>

</body>
</html>
