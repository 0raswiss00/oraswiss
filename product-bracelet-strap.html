
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Detajet e Produktit</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: Arial; padding: 20px; }
        #product-image { width: 100%; max-width: 500px; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- KËTO ELEMENTE JANË TË DOMOSDOSHME QË KODI YT TË FUNKSIONOJË -->
    <h1 id="product-title">Po ngarkohet...</h1>
    <img id="product-image" src="" alt="Foto Produkti">
    <p id="product-price" style="font-size: 24px; color: gold;"></p>

    <script>
        const supabase = window.supabase.createClient(
            "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
            "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"
        );

        async function loadBraceletDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!productId) {
                document.body.innerHTML = "<h1>Nuk u gjet asnjë ID produkti</h1>";
                return;
            }

            const { data, error } = await supabase
                .from('bracelets_straps')
                .select('*')
                .eq('id', productId)
                .single();

            if (error || !data) {
                document.body.innerHTML = "<h1>Gabim: Produkti nuk u gjet në bazën e të dhënave</h1>";
                return;
            }

            // Këtu kodi po mbush elementet HTML që shtuam më lart
            document.getElementById('product-title').innerText = (data.brand || "") + " " + (data.model || "");
            document.getElementById('product-price').innerText = (data.price || "0") + " €";
            document.getElementById('product-image').src = data.image_url;
        }

        loadBraceletDetails();
    </script>
</body>
</html>
