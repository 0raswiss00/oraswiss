<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
 <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KD2ZZ3MJYY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-KD2ZZ3MJYY');
  </script>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card register-form">
      <button class="back-btn" onclick="history.back()">← Back</button>

      <h2>Sign Up</h2>
      <input id="fullName" placeholder="Full Name" autocomplete="name" />
      <input id="phone" placeholder="Phone" autocomplete="tel" />
      <input id="country" placeholder="Country" autocomplete="country-name" />
      <input id="street" placeholder="Rruga" autocomplete="street-address" />
      <input id="houseNumber" placeholder="Nr. Shtëpisë" />
      <input id="zipCode" placeholder="Kodi Postar" autocomplete="postal-code" />
      <input id="email" type="email" placeholder="Email" autocomplete="email" autocapitalize="none" />
      <input id="password" type="password" placeholder="Password" autocomplete="new-password" />
      
      <button id="btnRegister" type="button" class="auth-btn">Register</button>

      <div class="auth-sep"></div>

      <h2>Login</h2>

<input id="loginEmail" type="email" placeholder="Email" autocomplete="email">

<input id="loginPassword" type="password"
       placeholder="Password"
       autocomplete="current-password">

<p>
  <a href="#" id="forgotPassword">Forgot Password?</a>
</p>

<button id="btnLogin" type="button" class="auth-btn">
  Login
</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
<script src="db-connect.js"></script>      
<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/+esm";

  const supabaseUrl = 'https://gnwsrmelmeqduhhmfmoa.supabase.co';
  const supabaseKey = 'sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9'; 
  const supabase = createClient(supabaseUrl, supabaseKey);

  window.addEventListener("DOMContentLoaded", () => {

    const btnReg = document.getElementById("btnRegister");
    // REGISTER
    btnReg.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const fullName = document.getElementById("fullName").value;
      const phone = document.getElementById("phone").value;
      const country = document.getElementById("country").value;
      const street = document.getElementById("street").value;
      const houseNumber = document.getElementById("houseNumber").value;
      const zipCode = document.getElementById("zipCode").value;

      if (!email || !password) {
        alert("Plotëso email dhe password");
        return;
      }

      try {
        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: password,
          options: {
            data: {
              full_name: fullName,
              phone: phone,
              country: country,
              street: street,
              house_number: houseNumber,
              zip_code: zipCode
            }
          }
        });
        if (error) throw error;
        alert("Regjistrimi u krye! Konfirmo emailin.");
      } catch (e) {
        alert(e.message);
      }
    });

    // LOGIN
    const btnLog = document.getElementById("btnLogin");
    if (btnLog) {
      btnLog.addEventListener("click", async () => {
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;

        try {
          const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password,
          });

          if (error) throw error;
          window.location.href = "dashboard.html";
        } catch (e) {
          alert(e.message);
        }
      });
    }
  }); // Kjo mbyllje ishte ajo që mungonte!
// FORGOT PASSWORD
const forgotPasswordLink = document.getElementById("forgotPassword");
if (forgotPasswordLink) {
    forgotPasswordLink.addEventListener("click", async (e) => {
        e.preventDefault(); // Parandalon që faqja të rifreskohet ose të shkojë te #
        
        // Këtu mund të merrni email-in nga input-i për ta përdorur në Supabase
        const email = document.getElementById("loginEmail").value.trim();
        
        if (!email) {
            alert("Ju lutem shkruani email-in tuaj në fushën e login-it.");
            return;
        }

        // Funksioni i Supabase për reset password
        const { data, error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo: 'https://oraswiss.com/update-password.html', // Ndryshoni me URL-në tuaj
        });

        if (error) {
            alert(error.message);
        } else {
            alert("Një email për rivendosjen e fjalëkalimit është dërguar.");
        }
    });
}
</script>
</body>  
</html>
