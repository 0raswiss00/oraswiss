<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>myOraSwiss - Dashboard</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; 
            background: #000; 
            color: #fff; 
            padding: 20px; 
            padding-bottom: 80px; 
            margin: 0;
        }
        .search-container { margin-bottom: 20px; }
        .search-box {
            display: flex;
            align-items: center;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 8px 12px;
        }
        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            width: 100%;
            font-size: 14px;
            margin-left: 8px;
        }
        .camera-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .profile-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .btn-sell { background: gold; color: #000; font-weight: bold; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 20px; }
        
        /* SHIRITI I POSHTËM FIKS (Bottom Navigation) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #111;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            z-index: 1000;
            transition: transform 0.3s ease;
        }
        .bottom-nav.hidden {
            transform: translateY(100%);
        }
        .bottom-nav-item {
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
        }
        .bottom-nav-item:hover { color: gold; }

        /* MENUJA "MY ORASWISS" (E fshehur fillimisht) */
        .my-oraswiss-menu { 
            display: none; 
            position: fixed;
            bottom: 70px; 
            left: 5%;
            width: 90%;
            background: #111; 
            border: 1px solid #333;
            border-radius: 8px; 
            z-index: 999;
            padding: 10px;
            box-sizing: border-box;
            box-shadow: 0px -5px 15px rgba(0,0,0,0.5);
        }
        .my-oraswiss-menu.active { display: block; }
        
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 10px; border-bottom: 1px solid #222; cursor: pointer; }
        .menu-item:last-child { border-bottom: none; }
        
        .watch-card { background: #111; margin-bottom: 10px; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 15px; }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search on OraSwiss">
            <button class="camera-icon" onclick="alert('Funksioni për foto së shpejti!')">📷</button>
        </div>
    </div>

    <ul id="myWatchesList" style="list-style: none; padding: 0;"></ul>

    <!-- Menuja që hapet (Buy, Messages, etj.) -->
    <div id="myOraSwissMenu" class="my-oraswiss-menu">
        <div class="menu-item" onclick="location.href='buy.html'"><span>🛒 Buy</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='mysold.html'"><span>🛒 my sold</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='messages.html'"><span>✉️ Messages</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='settings.html'"><span>⚙️ Account Settings</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='support.html'"><span>🎧 Support</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='info.html'"><span>ℹ️ Info</span> <span>></span></div>
    </div>

    <!-- Shiriti i navigimit i rregulluar -->
    <nav class="bottom-nav">
      <a href="index.html" class="bottom-nav-item">OraSwiss</a>
      <a href="profile.html" class="bottom-nav-item">Profile</a>
      <a href="favorites.html" class="bottom-nav-item">Favorites</a>
      <a href="collection.html" class="bottom-nav-item">Collection</a>
      <a href="mysales.html" class="bottom-nav-item">Sales</a>
      <a href="sellnow.html" class="bottom-nav-item">Sell</a>
      <a href="javascript:void(0)" class="bottom-nav-item" onclick="toggleMenu('myOraSwissMenu')">My OraSwiss</a>
    </nav>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
        'https://gnwsrmelmeqduhhmfmoa.supabase.co',
        'sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9'
    );

    async function protectPage() {
        const { data: { user } } = await supabase.auth.getUser();

        if (!user) {
            window.location.href = "login.html";
            return false;
        }

        return true;
    }

    protectPage();
  
    async function checkLogin(event, page) {
        event.preventDefault();

        const { data } = await supabase.auth.getSession();

        if (data.session) {
            window.location.href = page;
        } else {
            window.location.href = "login.html";
        }
    }

    window.checkLogin = checkLogin;
    
    async function ngarkoArtikujt() {
        const lista = document.getElementById("myWatchesList");
        lista.innerHTML = "Po ngarkojmë artikujt...";

        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
            lista.innerHTML = "<li>Duhet të logoheni!</li>";
            return;
        }

        const { data: watches, error: errorW } = await supabase
            .from('oras')
            .select('*')
            .eq('user_id', user.id);

        const { data: straps, error: errorS } = await supabase
            .from('bracelets_straps')
            .select('*')
            .eq('user_id', user.id);

        if (errorW || errorS) {
            lista.innerHTML = "<li>Gabim gjatë lidhjes me databazën.</li>";
            return;
        }

        const teGjitha = [...(watches || []), ...(straps || [])];

        lista.innerHTML = "";
        if (teGjitha.length === 0) {
            lista.innerHTML = "<li>Nuk keni asnjë artikull në shitje.</li>";
        } else {
            teGjitha.forEach(item => {
                const isStrap = straps && straps.some(s => s.id === item.id);
                const typeParam = isStrap ? '&type=straps' : '';

                const li = document.createElement("li");
                li.className = "watch-card";
                li.innerHTML = `
                    <a href="edit.html?id=${item.id}${typeParam}" style="text-decoration:none; color:inherit; display:flex; align-items:center; width:100%;">
                        <img src="${item.image_url && item.image_url[0] ? item.image_url[0] : ''}" alt="${item.brand || 'Artikull'}" style="width:100px; height:auto; margin-right:15px; object-fit:cover;">
                        <div>
                            <strong>${item.brand || 'Rrip'}</strong> - ${item.price} €
                        </div>
                    </a>
                `;
                lista.appendChild(li);
            });
        }
    }

    function toggleMenu(menuId) {
        const menu = document.getElementById(menuId);
        if (!menu) return; 

        menu.classList.toggle('active');
    }

    window.ngarkoArtikujt = ngarkoArtikujt;
    window.toggleMenu = toggleMenu;

    document.addEventListener('DOMContentLoaded', async () => {
        const { data: { user } } = await supabase.auth.getUser();

        if (!user) {
            window.location.href = "login.html";
            return;
        }

        ngarkoArtikujt();
    });

    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('keyup', function(e) {
            const termi = e.target.value.toLowerCase();
            const lista = document.getElementById("myWatchesList");
            const artikujt = lista.getElementsByClassName("watch-card");
            for (let i = 0; i < artikujt.length; i++) {
                let tekst = artikujt[i].textContent.toLowerCase();
                artikujt[i].style.display = tekst.includes(termi) ? "" : "none";
            }
        });
    }
</script>
<script>
    let lastScrollTop = 0;
    const nav = document.querySelector('.bottom-nav');

    window.addEventListener('scroll', () => {
        let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

        if (scrollTop > lastScrollTop) {
            nav.classList.add('hidden');
        } else {
            nav.classList.remove('hidden');
        }
        
        lastScrollTop = scrollTop <= 0 ? 0 : scrollTop; 
    }, false);
</script>
</body>       
</html>
