<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <title>Home - Ora Swiss</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
    
    /* Navigation Bar */
    .nav-header { margin-bottom: 50px; text-align: center; }
    .nav-header a { background: #2a2a8e; color: #fff; padding: 10px 20px; border-radius: 20px; text-decoration: none; margin: 0 10px; font-weight: bold; }

    /* Single Large Featured Product Styling */
    .hero-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 800px; /* Limits overall width for better layout */
      margin: 0 auto;
      background: #111;
      padding: 30px;
      border-radius: 15px;
      border: 1px solid #333;
    }

    .hero-image {
      width: 100%; /* Spans full container width */
      height: 600px; /* Sets a fixed, large height */
      object-fit: cover; /* Ensures the image fills without distorting */
      border-radius: 10px;
      margin-bottom: 25px;
    }

    .hero-details { text-align: center; width: 100%; }
    .hero-title { font-size: 2.5em; margin: 10px 0; cursor: pointer; color: #fff; }
    .hero-title:hover { color: #aaa; }
    .hero-ref { color: #ccc; font-size: 1.1em; margin-bottom: 15px; }
    .price { color: #25D366; font-weight: bold; font-size: 2em; margin-bottom: 25px; }

    /* Forms and Buttons */
    .btn-main { border-radius: 20px; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
    .btn-secondary { background: #ccc; color: #000; }
    .btn-buy { background: #f0c14b; color: #000; width: 100%; font-size: 1.2em; }
    
    .contact-form { width: 100%; max-width: 400px; margin: 0 auto 30px auto; text-align: center; }
    .input-email { width: 100%; margin: 5px 0 15px 0; padding: 12px; box-sizing: border-box; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff; }
  </style>
</head>
<body>

  <div class="nav-header">
    <a href="index.html">Home</a>
    <a href="luxury.html">Luxury 3</a>
    <a href="vintage.html">Vintage 2</a>
    <a href="parts.html">Parts 1</a>
  </div>

  <div id="featured-ora-container">
    <p style="text-align:center;">Duke ngarkuar koleksionin e veçantë...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
  const SUPABASE_KEY = "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"; 
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function loadFeaturedOra() {
    const container = document.getElementById("featured-ora-container");
    
    // --- THIS FETCHES ONLY ONE ITEM FROM 'oras' TABLE ---
    const { data, error } = await client
      .from('oras')
      .select('*')
      .limit(1) // Only get the first item
      .single(); // Simplify result to single object, not array

    if (error) {
      container.innerHTML = "<p style='text-align:center;'>Gabim: " + error.message + "</p>";
      return;
    }

    if (!data) {
      container.innerHTML = "<p style='text-align:center;'>Nuk ka artikuj për të shfaqur.</p>";
      return;
    }

    const ora = data;

    // Use the reliable SDK method to get the final image URL
    const { data: publicUrlData } = client.storage
      .from('or-images') 
      .getPublicUrl(ora.image_url);

    const finalImageUrl = publicUrlData.publicUrl;

    // --- GENERATE SINGLE HERO LAYOUT ---
    container.innerHTML = `
      <div class="hero-container">
        <img src="${finalImageUrl}" alt="${ora.model}" class="hero-image">
        
        <div class="hero-details">
          <h1 class="hero-title" onclick="window.location.href='product.html?id=${ora.id}'">
            ${ora.brand} - ${ora.model}
          </h1>
          <p class="hero-ref">Ref: ${ora.reference || 'N/A'}</p>
          <div class="price">${ora.price ? ora.price + ' €' : 'Contact for price'}</div>
          
          <div class="contact-form">
            <input type="email" placeholder="Emaili yt për interesim" class="input-email">
            <button class="btn-main btn-secondary">Send Request</button>
          </div>
          
          <a href="${ora.paypal_link}" target="_blank" style="text-decoration:none;">
            <button class="btn-main btn-buy">🛒 Buy Now</button>
          </a>
        </div>
      </div>
    `;
  }

  loadFeaturedOra();
</script>

</body>
</html>
