<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <title>Vintage - Ora Swiss</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
    /* Stili për butonat si te image_19.png */
    .nav-filters { margin-bottom: 30px; }
    .nav-filters a { background: #2a2a8e; color: #fff; padding: 8px 15px; border-radius: 20px; text-decoration: none; margin-right: 10px; font-weight: bold; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
    .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
    .price { color: #25D366; font-weight: bold; margin-top: 10px; font-size: 1.2em; }
  </style>
</head>
<body>

  <!-- Butonat e navigimit -->
  <div class="nav-filters">
    <a href="luxury.html">Luxury 0</a>
    <a href="vintage.html">Vintage 0</a>
    <a href="parts.html">Parts 59</a>
  </div>

  <h1>Vintage Collection</h1>
  <div id="oras-container" class="grid">Duke ngarkuar koleksionin...</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
<script>
  // 1. Sigurohu që këto rreshta janë të vetmet për Supabase
  const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
  const SUPABASE_KEY = "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"; 
  
  // NËSE KY RRESHT TË JEP GABIM, NDROJE NË: const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function loadOras() {
    const container = document.getElementById("oras-container");
    const { data, error } = await client.from('oras').select('*').eq('category', 'vintage');

    if (error) { container.innerHTML = "Gabim: " + error.message; return; }
    
    container.innerHTML = "";
    data.forEach(ora => {
      const img = ora.image_url ? SUPABASE_URL + "/storage/v1/object/public/" + ora.image_url : 'placeholder.png';
      
      // Këtu i ke butonat të shtuara sigurt, pa prishur strukturën
      container.innerHTML += `
        <div class="card">
          <img src="${img}" alt="${ora.model}">
          <h3>${ora.brand} - ${ora.model}</h3>
          <div class="price">${ora.price ? ora.price + ' €' : 'Contact'}</div>
          
          <a href="https://wa.me/35569XXXXXXX" target="_blank" style="display:block; background:#25D366; color:white; padding:8px; margin-top:5px; text-align:center; text-decoration:none; border-radius:5px;">WhatsApp</a>
          <button onclick="alert('U pëlqye!')" style="width:100%; margin-top:5px;">❤️ Like</button>
          <button onclick="navigator.clipboard.writeText(window.location.href); alert('Linku u kopjua!')" style="width:100%; margin-top:5px;">🔗 Share</button>
        </div>
      `;
    });
  }
  loadOras();
</script>

</body>
</html>
