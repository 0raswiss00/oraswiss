<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { font-family: Arial; background: #000; color: #fff; padding: 20px; }
        ul { list-style: none; padding: 0; }
        li { background: #111; margin: 10px 0; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        button { background: gold; color: #000; font-weight: bold; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Orët e mia</h1>
    <ul id="myWatchesList"></ul>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  // V1 - per login/sesion
  const supabaseAuth = createClient(
    'https://xyunmtvysqwonelecudf.supabase.co',
    'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx'
  );

  // V2 - ku jane oret
  const supabaseOras = createClient(
    'https://gnwsrmelmeqduhhmfmoa.supabase.co',
    'sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9'
  );

  async function ngarkoArtikujt() {
    const lista = document.getElementById("myWatchesList");

    const { data: { session } } = await supabaseAuth.auth.getSession();

    if (!session) {
      lista.innerHTML = "<li>Duhet të jeni të loguar.</li>";
      return;
    }

    // Merr te gjitha oret nga V2 (pa filtrim user_id sepse jane NULL)
    const { data, error } = await supabaseOras
      .from('oras')
      .select('*');

    if (error) {
      console.error("Gabim:", error);
      return;
    }

    lista.innerHTML = "";

    if (!data || data.length === 0) {
      lista.innerHTML = "<li>Nuk keni orë. <a href='sellnow.html' style='color:gold'>+ Shto orë</a></li>";
      return;
    }

    data.forEach(watch => {
      const li = document.createElement("li");
      li.innerHTML = `
        <span><strong>${watch.brand} ${watch.model}</strong> — ${watch.price}€</span>
        <button onclick="window.location.href='sellnow.html?id=${watch.id}'">Sell Now</button>
      `;
      lista.appendChild(li);
    });
  }

  supabaseAuth.auth.onAuthStateChange(() => {
    ngarkoArtikujt();
  });

  ngarkoArtikujt();
</script>
</body>
</html>
