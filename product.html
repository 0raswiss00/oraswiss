<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Detajet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="container">Duke ngarkuar...</div>

    <script>
        // Deklarimi i vetem (Supabase inicializohet vetem nje here)
        const supabase = window.supabase.createClient(
            "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ"
        );

        async function load() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const container = document.getElementById("container");

            if (!id) {
                container.innerHTML = "Asnjë ID nuk u gjet.";
                return;
            }

            try {
                const { data, error } = await supabase.from('oras').select('*').eq('id', id).single();
                
                if (error) throw error;

                // Shfaqja e te dhenave (Me 15 kolonat qe na the)
                container.innerHTML = `
                    <div style="padding:20px; border:1px solid #333; max-width:500px; margin:auto;">
                        <h1>${data.brand} ${data.model}</h1>
                        <p><strong>Referenca:</strong> ${data.reference}</p>
                        <p><strong>Çmimi:</strong> ${data.price} €</p>
                        <p><strong>Viti:</strong> ${data.year}</p>
                        <p><strong>Materiali:</strong> ${data.material}</p>
                        <p><strong>Lëvizja:</strong> ${data.movement}</p>
                        <p><strong>Servis:</strong> ${data.Service}</p>
                        <p><strong>Përshkrimi:</strong> ${data.description}</p>
                        <a href="https://wa.me/35569XXXXXXX?text=Dua te blej: ${data.brand}" 
                           style="background:#25D366; color:white; padding:10px; text-decoration:none;">
                           POROSIT NE WHATSAPP
                        </a>
                    </div>
                `;
            } catch (err) {
                container.innerHTML = "GABIM: " + err.message;
            }
        }

        load(); // Kjo e thërret funksionin
    </script>
</body>
</html>
