<!DOCTYPE html>
<html lang="sq">
<head>
    <title>Dashboard-i Im</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="wrap">
    <h1>Mirë se erdhe!</h1>
    
    <!-- Butoni që kërkove për të shitur -->
    <button onclick="window.location.href='sellnow.html'" style="background: gold; width: 100%; padding: 15px;">
      + Sell Now
    </button>
    
    <h3>Orët e mia:</h3>
    <ul id="myWatchesList"></ul>
  </div>
</body>
    
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

// VENDOS ANON KEY-NË TËNDE KËTU (Jo tekstin e shkruar)
const supabase = createClient('https://gnwsrmelmeqduhhmfmoa.supabase.co', 'VENDOS_ANON_KEY_TËNDE');

// Përdor vetëm ON AUTH STATE CHANGE. 
// Fshije getSession() sepse po të ngatërron.
supabase.auth.onAuthStateChange((event, session) => {
    if (session) {
        console.log("Përdoruesi i loguar:", session.user.id);
        fetchWatches(session.user.id);
    } else {
        console.log("Pritet logimi...");
        const list = document.getElementById('myWatchesList');
        if (list) list.innerHTML = "<li>Duhet të jesh i loguar.</li>";
    }
});

async function fetchWatches(userId) {
    const { data, error } = await supabase
        .from('oras')
        .select('*')
        .eq('user_id', userId);

    const list = document.getElementById('myWatchesList');
    if (!list) return;

    if (error) {
        console.error("Gabim:", error);
        list.innerHTML = "<li>Gabim gjatë ngarkimit.</li>";
        return;
    }

    list.innerHTML = "";
    if (data && data.length > 0) {
        data.forEach(watch => {
            let li = document.createElement('li');
            li.innerHTML = `${watch.brand} - ${watch.model} | ${watch.price}€ 
                            <button onclick="deleteWatch('${watch.id}')">Fshi</button>`;
            list.appendChild(li);
        });
    } else {
        list.innerHTML = "<li>Nuk keni orë të regjistruara.</li>";
    }
}

window.deleteWatch = async (watchId) => {
    const { error } = await supabase.from('oras').delete().eq('id', watchId);
    if (!error) location.reload();
    else console.error("Gabim fshirje:", error);
};
<script>
</body>    
</html>
