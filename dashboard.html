<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>myOraSwiss - Dashboard</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; 
            background: #000; 
            color: #fff; 
            padding: 20px; 
            padding-bottom: 80px; /* Lë hapësirë që përmbajtja të mos mbulohet nga shiriti i poshtëm */
            margin: 0;
        }
        .profile-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .btn-sell { background: gold; color: #000; font-weight: bold; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 20px; }
        
        /* SHIRITI I POSHTËM FIKS (Bottom Navigation) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #111;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            z-index: 1000;
        }
        .bottom-nav-item {
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
        }
        .bottom-nav-item:hover { color: gold; }

        /* MENUJA "MY ORASWISS" (E fshehur fillimisht) */
        .my-oraswiss-menu { 
            display: none; 
            position: fixed;
            bottom: 70px; /* Shfaqet fiks mbi shiritin e poshtëm */
            left: 5%;
            width: 90%;
            background: #111; 
            border: 1px solid #333;
            border-radius: 8px; 
            z-index: 999;
            padding: 10px;
            box-sizing: border-box;
            box-shadow: 0px -5px 15px rgba(0,0,0,0.5);
        }
        .my-oraswiss-menu.active { display: block; }
        
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 10px; border-bottom: 1px solid #222; cursor: pointer; }
        .menu-item:last-child { border-bottom: none; }
        
        .watch-card { background: #111; margin-bottom: 10px; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 15px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <h2>Ardian Cela</h2>
        <a href="profile.html" style="color: gold; text-decoration: none;">To your profile</a>
    </div>

    <button class="btn-sell" onclick="window.location.href='sellnow.html'">+ Sell Now</button>

    <button onclick="ngarkoArtikujt()" class="btn-sell" style="background: #333; color: white;">
        Shfaq artikujt e mi
    </button>

    <ul id="myWatchesList" style="list-style: none; padding: 0;"></ul>

    <!-- Menuja që hapet (Buy, Messages, etj.) -->
    <div id="myOraSwissMenu" class="my-oraswiss-menu">
        <div class="menu-item" onclick="location.href='buy.html'"><span>🛒 Buy</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='messages.html'"><span>✉️ Messages</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='settings.html'"><span>⚙️ Account Settings</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='support.html'"><span>🎧 Support</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='info.html'"><span>ℹ️ Info</span> <span>></span></div>
    </div>

    <!-- Shiriti i navigimit në fund të faqes -->
    <nav class="bottom-nav">
        <!-- Profili yt -->
        <a href="profile.html" class="bottom-nav-item">👤 Profile</a>
        <a href="index.html" class="bottom-nav-item">🏠 Home</a> 
        <a href="favorites.html" class="bottom-nav-item">❤️ Favorites</a>
        <a href="collection.html" class="bottom-nav-item">⌚ Collection</a>

           <!-- Orët në shitje (My Sale Watch) -->
       <a href="my-sales.html" class="bottom-nav-item">⌚ My Sales</a> 
    <a href="sell.html" class="bottom-nav-item">🏷️ Sell</a>
        
    <!-- Këtu është rregullimi për "My OraSwiss" -->
    <button type="button" class="bottom-nav-item" onclick="toggleMenu()" style="border:none; background:none; cursor:pointer;">
    👤 My OraSwiss
    </button>
    <!-- Butoni që hap menunë e plotë -->
    <button type="button" class="bottom-nav-item" onclick="toggleMenu()" style="background:none; border:none; cursor:pointer;">
        ☰ More
    </button> 
  </nav>
<script>
// FUNKSIONI I MENU-së (vetëm një herë)
function toggleMenu() {
    const menu = document.getElementById('myOraSwissMenu');
    if (menu) {
        menu.classList.toggle('active');
    }
}
</script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
    'https://gnwsrmelmeqduhhmfmoa.supabase.co',
    'sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9'
);

// Nëse do ta thërrasësh nga HTML (onclick), e bën globale:
window.ngarkoArtikujt = async function () {
    const lista = document.getElementById("myWatchesList");
    lista.innerHTML = "Po ngarkojmë orët...";

    // vazhdon kodi yt këtu...
};

      const { data: { user } } = await supabase.auth.getUser();

      if (!user) {
          lista.innerHTML = "<li>Duhet të logoheni!</li>";
          return;
      }

      const { data, error } = await supabase
          .from('oras')
          .select('*')
          .eq('user_id', user.id); 

      if (error) { 
          console.error(error);
          lista.innerHTML = "<li>Gabim gjatë lidhjes.</li>";
          return; 
      }

      lista.innerHTML = ""; 
    
      if (!data || data.length === 0) {
          lista.innerHTML = "<li>Nuk keni asnjë orë në listë.</li>";
      } else {
          data.forEach(watch => {
              const li = document.createElement("li");
              li.className = "watch-card";
              const imgUrl = (watch.image_url && watch.image_url.length > 0) ? watch.image_url[0] : 'placeholder.jpg';
              
              li.innerHTML = `
                  <img src="${imgUrl}" style="width:80px;height:80px;object-fit:cover;border-radius:6px;"/> 
                  <div style="margin-left: 10px;">
                      <strong>${watch.brand} ${watch.model}</strong><br>
                      <span style="color:gold;">${watch.price} €</span>
                  </div>
              `;
              li.onclick = function() {
                  window.location.href = 'product.html?id=' + watch.id;
              };
              lista.appendChild(li);
          });
      }
  };
</script>
</body>
</html>
