<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>My Sales - Ora Swiss</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0056b3; /* Sfondi i faqes */
            color: white;              /* Teksti kryesor i bardhë që të duket mbi blunë */
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
        }

        .sale-item { 
            background-color: #0056b3; /* Karta e produktit tani është e njëjtë me sfondin */
            border: 2px solid #003d82; /* Një kornizë pak më e errët për ta ndarë produktin */
            margin-bottom: 15px; 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-radius: 8px; 
        }

        .sale-item img { 
            width: 100px; 
            height: 100px; 
            object-fit: cover; 
            border-radius: 5px; 
            cursor: pointer; 
        }

        /* Butonat mbeten të bardhë me shkronja të zeza */
        button {
            background-color: white;
            color: black;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            margin-right: 5px;
        }

        button:hover {
            background-color: #e0e0e0;
        }

        a {
            text-decoration: none;
            color: white; /* Teksti i linkut i bardhë */
        }
    </style>
</head>
<body>

    <div id="salesList">Duke ngarkuar...</div>

    <script>
        // Inicializimi i Supabase
        const myOraSwissClient = window.supabase.createClient(
            "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
            "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"
        );

        async function loadMySales() {
    const salesList = document.getElementById("salesList");

    const { data: { user } } = await myOraSwissClient.auth.getUser();

    if (!user) {
        salesList.innerHTML = "Ju lutem logohuni.";
        return;
    }

    const [
        { data: watches, error: watchesError },
        { data: bracelets, error: braceletsError }
    ] = await Promise.all([
        myOraSwissClient
            .from("oras")
            .select("*")
            .eq("user_id", user.id),

        myOraSwissClient
            .from("bracelets_straps")
            .select("*")
            .eq("user_id", user.id)
    ]);

    if (watchesError || braceletsError) {
        salesList.innerHTML = "Gabim: " + (watchesError?.message || braceletsError?.message);
        return;
    }

    const items = [
        ...(watches || []).map(item => ({ ...item, type: "watch" })),
        ...(bracelets || []).map(item => ({ ...item, type: "bracelet" }))
    ];

    if (items.length === 0) {
        salesList.innerHTML = "Nuk keni asnjë artikull në shitje.";
        return;
    }

    salesList.innerHTML = items.map(item => `
        <div class="sale-item">

            <a href="${item.type === 'bracelet' ? 'product-bracelet-strap.html' : 'product.html'}?id=${item.id}">
                <img src="${item.image_url?.[0] || 'placeholder.jpg'}">
            </a>

            <div>
                <a href="${item.type === 'bracelet' ? 'product-bracelet-strap.html' : 'product.html'}?id=${item.id}">
                    <strong>${item.brand} ${item.model}</strong>
                </a>
                <br>
                <small>Çmimi: ${item.price} €</small>

                <div style="margin-top:10px;">
                    <button onclick="window.location.href='${item.type === 'bracelet' ? 'product-bracelet-strap.html' : 'product.html'}?id=${item.id}'">
                        Shiko
                    </button>

                    <button onclick="window.location.href='edit.html?id=${item.id}'">
                        Modifiko
                    </button>
                </div>
            </div>

        </div>
    `).join("");
}
        // Thirrja e funksionit
        loadMySales();
    </script>
</body>
</html>
