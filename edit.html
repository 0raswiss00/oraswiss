<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Edit - Ora Swiss</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #f39c12; margin-top: 0; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        .btn-save { background: #f39c12; color: #121212; }
        .btn-delete { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Modifiko Produktin</h2>
    <input type="text" id="brand" placeholder="Brand">
    <input type="text" id="model" placeholder="Model">
    <input type="number" id="price" placeholder="Price">
    <textarea id="description" placeholder="Description"></textarea>
    <input type="file" id="image_input" multiple accept="image/*">
    
    <button class="btn-save" onclick="saveProduct()">Ruaj Ndryshimet</button>
    <button class="btn-delete" onclick="deleteProduct()">Fshi Produktin</button>
</div>

<script>
    // 1. Inicializimi (Sigurohu që ke vendosur URL dhe KEY-in tënd real)
    const { createClient } = supabase;
    const supabaseClient = createClient(
        "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
        "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9" // Shto këtu KEY-in tënd të plotë
    );

    // 2. ID e produktit
    const productId = new URLSearchParams(window.location.search).get('id');

    // 3. Funksionet
    async function loadData() {
        if (!productId) return;
        const { data, error } = await supabaseClient.from('oras').select('*').eq('id', productId).single();
        if (data) {
            document.getElementById("brand").value = data.brand || '';
            document.getElementById("model").value = data.model || '';
            document.getElementById("price").value = data.price || '';
            document.getElementById("description").value = data.description || '';
            document.getElementById("image_url").value = Array.isArray(data.image_url) ? data.image_url.join(', ') : (data.image_url || '');
        }
    }

    async function saveProduct() {
    // 1. Marrim vlerat nga inputet e tjera
    const brand = document.getElementById("brand").value;
    const model = document.getElementById("model").value;
    const price = parseFloat(document.getElementById("price").value);
    const description = document.getElementById("description").value;

    // 2. Kontrollojmë nëse janë ngarkuar foto të reja
    const fileInput = document.getElementById('image_input');
    let imageUrl = ""; // Këtu do të ruajmë URL-në

    if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const fileName = `${Date.now()}_${file.name}`;
        
        // Ngarkimi në Supabase (Zëvendëso 'emri-i-bucket' me emrin tuaj real)
        const { data, error } = await supabaseClient.storage
            .from('emri-i-bucket') 
            .upload(fileName, file);

        if (error) {
            alert("Gabim gjatë ngarkimit: " + error.message);
            return;
        }

        // Marrim URL-në publike
        const { data: urlData } = supabaseClient.storage
            .from('emri-i-bucket')
            .getPublicUrl(fileName);
        imageUrl = urlData.publicUrl;
    }

    // 3. Përditësojmë databazën
    const updatePayload = { brand, model, price, description };
    if (imageUrl) updatePayload.image_url = imageUrl; // Përditësojmë vetëm nëse ka foto

    const { error } = await supabaseClient
        .from('oras')
        .update(updatePayload)
        .eq('id', productId);

    if (error) alert("Gabim: " + error.message);
    else { alert("U ruajt!"); window.location.href = 'index.html'; }
}
</script>

</body>
</html>
