<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>Orët e mia</h1>
    <ul id="myWatchesList"></ul>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const supabase = createClient(
    'https://xyunmtvysqwonelecudf.supabase.co',
    'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx'
  );

  async function ngarkoArtikujt() {
    try {
      const { data, error } = await supabase.from('watches').select('*');
      if (error) throw error;

      const lista = document.getElementById("myWatchesList");
      if (!lista) return;
      
      lista.innerHTML = ""; // Pastro listën

      if (data.length === 0) {
        lista.innerHTML = "<li>Nuk ka orë për momentin.</li>";
      } else {
        data.forEach(watch => {
          const li = document.createElement("li");
          li.textContent = watch.name || "Orë pa emër";
          lista.appendChild(li);
        });
      }
    } catch (err) {
      console.error("Gabim gjatë ngarkimit:", err);
    }
  }

  ngarkoArtikujt();
</script>
</body>
</html>
