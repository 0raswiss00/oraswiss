<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div id="oras-container">Duke ngarkuar...</div>

  <script>
    // Tani kjo do të funksionojë sepse e lidhëm skriptin lart
    const supabase = window.supabase.createClient(
      "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
      "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"
    );

    async function loadData() {
      const container = document.getElementById("oras-container");
      const { data, error } = await supabase.from('oras').select('*').eq('category', 'luxury');
      
      if (error) {
        container.innerHTML = "Gabim: " + error.message;
        return;
      }
      
      container.innerHTML = data.map(ora => `
        <div class="card">
          <h3>${ora.brand} ${ora.model}</h3>
          <p>${ora.price} €</p>
        </div>
      `).join('');
    }

    loadData();
  </script>
</body>
</html>
