<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>My Sales - Ora Swiss</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
        .list-container { max-width: 800px; margin: auto; }
        .sale-item { background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        button { cursor: pointer; padding: 8px 12px; }
    </style>
</head>
<body>

<div class="list-container">
    <h1>Artikujt e mi në shitje</h1>
    <div id="salesList">Duke ngarkuar...</div>
</div>

<script>
    const supabase = window.supabase.createClient(
        "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
        "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"
    );

    async function loadMySales() {
        const salesList = document.getElementById("salesList");

        // 2. Merr vetëm produktet e këtij user-i
        const { data, error } = await supabase
            .from('oras')
            .select('*')
            .eq('user_id', user.id);

        if (error) { salesList.innerHTML = "Gabim: " + error.message; return; }
        if (data.length === 0) { salesList.innerHTML = "Nuk keni asnjë artikull në shitje."; return; }

        // 3. Gjenero listën
        salesList.innerHTML = data.map(item => `
            <div class="sale-item">
                <div>
                    <strong>${item.brand} ${item.model}</strong><br>
                    <small>Çmimi: ${item.price} €</small>
                </div>
                <div>
                    <button onclick="window.location.href='detajet.html?id=${item.id}'">Shiko</button>
                    <button onclick="window.location.href='edit.html?id=${item.id}'" style="background:#444; color:#fff;">Modifiko</button>
                </div>
            </div>
        `).join('');
    

    loadMySales();
</script>
</body>
</html>
