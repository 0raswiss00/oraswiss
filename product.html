<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Detajet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
        .product-card { background: #111; border: 1px solid #333; padding: 20px; max-width: 500px; margin: auto; border-radius: 10px; }
        .product-img { width: 100%; height: auto; border-radius: 10px; margin-bottom: 15px; object-fit: cover; }
        .price { color: #25D366; font-weight: bold; font-size: 1.4em; margin: 10px 0; }
        hr { border: 0; border-top: 1px solid #333; margin: 15px 0; }
        .btn { display: block; text-align: center; text-decoration: none; font-weight: bold; border-radius: 5px; padding: 15px; margin-top: 10px; }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-paypal { background: #ffeb00; color: black; } /* Bërë i verdhë si te lista kryesore */
    </style>
</head>
<body>

    <div id="container">Duke ngarkuar...</div>

<script>
    if (typeof window.supabaseClient === 'undefined') {
        window.supabaseClient = window.supabase.createClient(
            "https://gnwsrmelmeqduhhmfmoa.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTY4ODg4MTksImV4cCI6MjAzMjQ2NDgxOX0.X7j7Z8228iQ8lV9C5r5pS0R5M211L5N7P5r1q2u6w2s"
        );
    }
    var supabase = window.supabaseClient;
    const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";

    function changeImg(dir) {
        var imgs = document.getElementsByClassName('slider-img');
        var i = 0;
        for (i = 0; i < imgs.length; i++) {
            if (imgs[i].style.display === 'block') break;
        }
        imgs[i].style.display = 'none';
        i = (i + dir + imgs.length) % imgs.length;
        imgs[i].style.display = 'block';
    }

    async function loadProduct() {
        const id = new URLSearchParams(window.location.search).get('id');
        const container = document.getElementById("container");
        if (!id) { container.innerHTML = "Asnjë ID u gjet."; return; }

        try {
            const { data, error } = await supabase.from('oras').select('*').eq('id', id).single();
            if (error) throw error;

            let raw = data.image_url || [];
            let images = Array.isArray(raw) ? raw : String(raw).split(",");
            images = images.map(i => i.trim()).filter(Boolean).map(i => 
                i.startsWith("http") ? i : SUPABASE_URL + "/storage/v1/object/public/or-images/" + i
            );
            if (images.length === 0) images = ["https://placehold.co/600x400?text=No+Image"];

            let imagesHtml = '';
            for (let i = 0; i < images.length; i++) {
                imagesHtml += '<img src="' + images[i] + '" class="slider-img" style="width:100%; display:' + (i === 0 ? 'block' : 'none') + ';">';
            }

            let navHtml = images.length > 1 ? '<div style="margin:10px 0;"><button onclick="changeImg(-1)">❮</button> <button onclick="changeImg(1)">❯</button></div>' : '';
            let paypalHtml = data.paypal_link ? '<br><a href="' + data.paypal_link + '" target="_blank">🛒 BUY NOW (PayPal)</a>' : '';

            container.innerHTML = '<div class="product-card">' + imagesHtml + navHtml + 
                                  '<h1>' + data.brand + ' - ' + data.model + '</h1>' +
                                  '<br><a href="https://wa.me/35569XXXXXXX?text=I%20want%20to%20order%20' + data.model + '">💬 ORDER ON WHATSAPP</a>' +
                                  paypalHtml + '</div>';
        } catch (err) {
            container.innerHTML = "GABIM: " + err.message;
        }
    }
    loadProduct();
</script>
</body>
</html>
