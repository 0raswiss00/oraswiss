<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<title>Ora Swiss - Detajet</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background:#0b0b0b;
    color:white;
    padding:20px;
}

.product-card {
    background:#111;
    border:1px solid #333;
    padding:20px;
    max-width:500px;
    margin:auto;
    border-radius:10px;
}

.product-img {
    width:100%;
    height:auto;
    border-radius:10px;
    object-fit:cover;
}

.price {
    color:#25D366;
    font-weight:bold;
    font-size:1.4em;
    margin:10px 0;
}

hr {
    border:0;
    border-top:1px solid #333;
    margin:15px 0;
}

.btn {
    display:block;
    text-align:center;
    text-decoration:none;
    font-weight:bold;
    border-radius:5px;
    padding:15px;
    margin-top:10px;
}

.btn-whatsapp {
    background:#25D366;
    color:white;
}

.btn-paypal {
    background:#ffeb00;
    color:black;
}

.gallery-container {
    position:relative;
}

.nav-btn {
    position:absolute;
    top:45%;
    background:#000;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    font-size:20px;
}

.prev {
    left:10px;
}

.next {
    right:10px;
}

.admin-actions {
    display:none;
    margin-top:20px;
    padding:15px;
    border:1px solid #444;
}

.admin-actions button {
    padding:10px;
    margin-right:10px;
    cursor:pointer;
}
</style>

</head>

<body>


<div id="container">
    Duke ngarkuar...
</div>


<a href="index.html" 
style="color:#ccc;text-align:center;display:block;margin-top:15px;">
← Kthehu në Home
</a>


<div class="admin-actions" id="admin-controls-container">

<h4>Admin Controls</h4>

<button id="edit-btn">
Modifiko
</button>

<button id="delete-btn" style="background:#ff4d4d;color:white;">
Fshi Produktin
</button>

</div>



<script>

const SUPABASE_URL =
"https://gnwsrmelmeqduhhmfmoa.supabase.co";


const SUPABASE_KEY =
"sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9";


const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);



let currentProduct = null;


let currentImages = [];

let currentImgIndex = 0;



function getImageUrl(path){

    if(!path) return "";

    if(path.startsWith("http"))
        return path;

    return "https://gnwsrmelmeqduhhmfmoa.supabase.co/storage/v1/object/public/or-images/" + path;
}



function changeImage(step){

    if(currentImages.length <= 1)
        return;


    currentImgIndex += step;


    if(currentImgIndex >= currentImages.length)
        currentImgIndex = 0;


    if(currentImgIndex < 0)
        currentImgIndex = currentImages.length - 1;



    document.getElementById("main-product-img").src =
    getImageUrl(currentImages[currentImgIndex]);

}



async function loadProduct(){


const id =
new URLSearchParams(window.location.search).get("id");


const container =
document.getElementById("container");


if(!id){

container.innerHTML="Nuk u gjet ID e produktit.";

return;

}



try {


const {data,error} =
await supabase
.from("oras")
.select("*")
.eq("id",id)
.single();



if(error)
throw error;



currentProduct = data;



currentImages =
Array.isArray(data.image_url)
?
data.image_url
:
(data.image_url ? [data.image_url] : []);



currentImgIndex = 0;
const imageHTML = currentImages.length > 0
?
`
<div class="gallery-container">

<img id="main-product-img"
class="product-img"
src="${getImageUrl(currentImages[0])}"
alt="${data.brand}">


${currentImages.length > 1 ? `

<button class="nav-btn prev" onclick="changeImage(-1)">
&#10094;
</button>

<button class="nav-btn next" onclick="changeImage(1)">
&#10095;
</button>

` : ""}


</div>
`
:
`
<img class="product-img"
src="https://placeholder.co/600x400/222/fff?text=No+Image">
`;



const paypalButton =
(data.price && data.paypal_link)
?
`
<a href="${data.paypal_link}"
target="_blank"
class="btn btn-paypal">

🛒 BUY NOW (PayPal)

</a>
`
:
"";



container.innerHTML = `

<div class="product-card">


${imageHTML}



<h1>
${data.brand || ""}
-
${data.model || ""}
</h1>



<div class="price">

Price:
${data.price ? data.price + " €" : "Contact"}

</div>



<hr>



<p>
<strong>Reference:</strong>
${data.reference || "N/A"}
</p>


<p>
<strong>Case Size:</strong>
${data.case_size || "N/A"}
</p>


<p>
<strong>Movement:</strong>
${data.movement || "N/A"}
</p>


<p>
<strong>Function:</strong>
${data.function || "N/A"}
</p>


<p>
<strong>Service:</strong>
${data.service ? "Yes (Serviced)" : "No"}
</p>


<p>
<strong>Box & Papers:</strong>
${data.box_papers ? "Full Set" : "Watch Only"}
</p>


<p>
<strong>Description:</strong>
${data.description || "N/A"}
</p>



<br>



<a href="https://wa.me/35569XXXXXXX?text=I%20am%20interested%20in:%20${encodeURIComponent(data.brand + " " + data.model)}"

class="btn btn-whatsapp">

💬 ORDER ON WHATSAPP

</a>



${paypalButton}



</div>

`;



// Lidh butonat Admin me produktin aktual

document.getElementById("edit-btn").onclick = function(){

editProduct(currentProduct.id);

};



document.getElementById("delete-btn").onclick = function(){

deleteProduct(currentProduct.id);

};



await checkOwnership(data.user_id);



}

catch(err){

container.innerHTML =
"GABIM: " + err.message;

console.error(err);

}


}



// Fillon ngarkimi

loadProduct();
      
</script>        
</body>
</html>
