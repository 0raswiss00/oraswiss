// Funksionet për Admin (Fshirje dhe Modifikim)
async function deleteProduct(id) {
    console.log("Duke fshirë ID-në:", id); // Kjo do shfaqet te Console (F12)
    if (!confirm("A jeni i sigurt që doni ta fshini këtë produkt?")) return;
    
    const { data, error } = await supabase.from('oras').delete().eq('id', id);
    
    if (error) {
        console.error("Gabim:", error); // Nëse ka gabim, do e shohësh këtu
        alert("Gabim gjatë fshirjes: " + error.message);
    } else {
        console.log("Përgjigja:", data);
        alert("Produkti u fshi me sukses!");
        window.location.href = 'index.html'; 
    }
}
// Shto këtë funksion për modifikimin
function editProduct(id) {
    console.log("Duke shkuar te faqja e modifikimit për ID-në:", id);
    window.location.href = 'edit.html?id=' + id;
}

async function checkOwnership(watchOwnerId) {
    const { data: { user } } = await supabase.auth.getUser();
    
    // Gjej butonat (sigurohu që kanë këto ID në HTML)
    const editBtn = document.getElementById("edit-btn");
    const deleteBtn = document.getElementById("delete-btn");

    // Nëse përdoruesi nuk është loguar ose nuk është pronari, fshi butonat
    if (!user || user.id !== watchOwnerId) {
        if (editBtn) editBtn.style.display = "none";
        if (deleteBtn) deleteBtn.style.display = "none";
    }
}
