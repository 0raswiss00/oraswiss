<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Porositë e mia - Ora Swiss</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #333; color: white; }
    </style>
</head>
<body>
    <h1>Porositë e mia</h1>
    <table id="orders-table">
        <thead>
            <tr>
                <th>Ora</th>
                <th>Statusi</th>
                <th>Nr. Dërgimi</th>
                <th>Veprime</th>
            </tr>
        </thead>
        <tbody id="orders-body"></tbody>
    </table>

<script src="supabase-lib.js"></script>
<script src="db-connect.js"></script>
<script>  
 async function loadOrders() {
    const ordersBody = document.getElementById('orders-body');
    if (!ordersBody) return;

    // 1. Marrrim porositë nga tabela 'orders'
    const { data, error } = await supabase
        .from('orders')
        .select('*');

    if (error) {
        console.error("Gabim gjatë marrjes së porosive:", error);
        return;
    }

// Funksioni që ekzekutohet kur klikohet butoni "Blej"
async function kryejBlerjen(productId) {
    // 1. Marrim përdoruesin e loguar aktualisht
    const { data: { user } } = await supabase.auth.getUser();

    if (!user) {
        alert("Duhet të jeni i loguar për të bërë blerje!");
        window.location.href = "login.html";
        return;
    }

    // 2. Ruajmë porosinë në tabelën 'orders' në Supabase
    // Marrim të dhënat e orës
const { data: ora, error: oraError } = await supabase
    .from('oras')
    .select('user_id, price')
    .eq('id', productId)
    .single();

if (oraError) {
    console.error(oraError);
    return;
}

// Krijojmë porosinë
const { data, error } = await supabase
    .from('orders')
    .insert([
        {
            product_id: productId,
            buyer_id: user.id,
            seller_id: ora.seller_id,
            amount: ora.price,
            status: 'pending',
            tracking_number: null
        }
    ]);

    if (error) {
        console.error("Gabim gjatë blerjes:", error);
        alert("Blerja dështoi: " + error.message);
    } else {
        alert("Porosia u krye me sukses!");
        // Pas blerjes, e dërgojmë direkt te faqja e historikut të porosisë
        window.location.href = "mysales.html"; 
    }
}

     
    // 2. Gjenerojmë rreshtat e tabelës
    ordersBody.innerHTML = data.map(order => `
        <tr>
            <td>Ora #${order.product_id}</td>
            <td>${order.status}</td>
            <td>${order.tracing_number || 'N/A'}</td>
            <td><button>Detaje</button></td>
        </tr>
    `).join('');
}

    // Përdorni një "event listener" për të pritur ngarkimin e skriptit
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof testo === 'function') {
            testo(); // Kjo do të ekzekutojë funksionin që keni në db-connect.js
        }
    });
</script>

</body>
</html>
