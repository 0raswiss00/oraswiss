<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>Orët e mia</h1>
    <ul id="myWatchesList"></ul>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const supabase = createClient(
    'https://xyunmtvysqwonelecudf.supabase.co',
    'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx'
  );

  // --- FUNKSIONET E BUTONAVE ---
  window.deleteWatch = async (id) => {
    if(confirm("Dëshiron ta fshish këtë orë?")) {
        await supabase.from('watches').delete().eq('id', id);
        location.reload(); 
    }
  };

  window.editWatch = (id) => {
    window.location.href = sellnow.html?id=${id};
  };

  // --- FUNKSIONI KRYESOR ---
  async function ngarkoArtikujt() {
    try {
      const { data, error } = await supabase.from('watches').select('*');
      if (error) throw error;

      const lista = document.getElementById("myWatchesList");
      if (!lista) return;
      
      lista.innerHTML = ""; 

      if (data.length === 0) {
        lista.innerHTML = "<li>Nuk ka orë për momentin.</li>";
      } else {
        data.forEach(watch => {
          const li = document.createElement("li");
          // Këtu përdorim funksionet window.editWatch dhe window.deleteWatch
          li.innerHTML = `
            ${watch.name} 
            <button onclick="editWatch('${watch.id}')">Modifiko</button>
            <button onclick="deleteWatch('${watch.id}')" style="color:red">Fshi</button>
          `;
          lista.appendChild(li);
        });
      }
    } catch (err) {
      console.error("Gabim gjatë ngarkimit:", err);
    }
  }

  ngarkoArtikujt();
</script>
</body>
</html>
