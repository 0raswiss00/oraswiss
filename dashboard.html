<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>Orët e mia</h1>
    <ul id="myWatchesList"></ul>

<div id="watches-container"></div>
    
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const supabase = createClient(
    'https://xyunmtvysqwonelecudf.supabase.co',
    'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx'
  );

async function ngarkoArtikujt() {
  try {
    // 1. Kontrolli i sesionit (SHTOJE KËTU)
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      console.warn("Përdoruesi nuk është i loguar!");
      return; 
    }

    // 2. Marrja e të dhënave (Ky është rreshti 24 i yti)
    const { data, error } = await supabase.from('watches').select('*');
    if (error) throw error;

    console.log("Të dhënat u morën:", data);

    const lista = document.getElementById("myWatchesList");
    if (lista) {
      lista.innerHTML = ""; // Pastro listën për të shmangur dublikimet
      
      data.forEach(watch => {
        const li = document.createElement("li");
        li.innerHTML = `
          ${watch.name} 
          <button onclick="window.location.href='sellnow.html?id=${watch.id}'">Shit</button>
        `;
        lista.appendChild(li);
      });
    }
  } catch (err) {
    console.error("Gabim gjatë ngarkimit:", err);
  }
}
async function kontrolloDheShfaqSellNow() {
    // Merr sesionin aktual nga Supabase
    const { data: { session } } = await supabase.auth.getSession();
    
    const btnSell = document.getElementById("btnSellNow");

    if (session) {
        // Përdoruesi është loguar, shfaq butonin
        if (btnSell) btnSell.style.display = "block";
    } else {
        // Përdoruesi nuk është loguar, butoni mbetet i fshehur
        if (btnSell) btnSell.style.display = "none";
    }
}

// Ekzekutoje këtë kur faqja ngarkohet
kontrolloDheShfaqSellNow();

// Opsionale: Dëgjo për ndryshime në gjendjen e autentifikimit
supabase.auth.onAuthStateChange((event, session) => {
    kontrolloDheShfaqSellNow();
});
  // 1. Funksioni për të kontrolluar nëse përdoruesi është i loguar
async function shfaqButoninSell() {
    const { data: { session } } = await supabase.auth.getSession();
    const btnSell = document.getElementById("btnSellNow");

    if (session && btnSell) {
        btnSell.style.display = "block"; // Shfaqet nëse është loguar
    }
}

// 2. Thirr funksionet
shfaqButoninSell();
ngarkoArtikujt();
</script>
</body>
</html>
