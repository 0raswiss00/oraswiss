<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>My Sold - Ora Swiss</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #111;
        }

        th, td {
            border: 1px solid #333;
            padding: 12px;
            text-align: left;
        }

        th {
            background: gold;
            color: #000;
        }

        button {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-cancel {
            background: #dc3545;
            color: white;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
</head>

<body>

<h1>Menaxhimi i Porosive (My Sold)</h1>

<table>
    <thead>
        <tr>
            <th>Ora</th>
            <th>Statusi</th>
            <th>Nr. Dërgimi</th>
            <th>Veprime</th>
        </tr>
    </thead>

    <tbody id="sales-body">
        <tr>
            <td colspan="10">Duke ngarkuar...</td>
        </tr>
    </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
<script src="db-connect.js"></script>    
<script>
// db-connect.js
const supabase = window.supabase.createClient(URL, KEY);
    "https://gnwsrmelmeqduhhmfmoa.supabase.co",
    "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"
);

async function loadMySold() {

    const soldBody = document.getElementById("sales-body");

    const {
        data: { user }
    } = await supabase.auth.getUser();

    if (!user) {
        soldBody.innerHTML =
        "<tr><td colspan='10'>Duhet të jesh i loguar.</td></tr>";
        return;
    }
    
    const { data, error } = await supabase
    .from("orders")
    .select(`
        *,
        oras (
            id,
            brand,
            model,
            image_url
        )
    `)
    .eq("seller_id", user.id);
    console.log("ORDERS:", data);
    console.log("ERROR:", error);
    
    if (error) {
        console.error(error);

        soldBody.innerHTML =
        "<tr><td colspan='10'>Gabim gjatë marrjes së të dhënave.</td></tr>";

        return;
    }


    if (!data || data.length === 0) {

        soldBody.innerHTML =
        "<tr><td colspan='10'>Nuk ke asnjë shitje.</td></tr>";

        return;
    }


// Gjej pjesën e 'map' në kodin tënd dhe zëvendësoje me këtë strukturë:

soldBody.innerHTML = data.map(order => {
    const ora = order.oras;
    
    // Sigurohu që po përdor emrin e saktë të kolonës që krijove (tracing_number ose tracking_number)
    const trackingVal = order.tracing_number || ""; 

    return `
<tr>
    <td>${ora ? `<img src="${ora.image_url}" width="70">` : "Pa foto"}</td>
    <td>${ora ? `${ora.brand} ${ora.model}` : `Ora #${order.product_id}`}</td>
    <td>${order.id}</td>
    <td>${order.status || "-"}</td>
    
    <td id="track-cell-${order.id}">
        ${trackingVal || "Nuk ka"}
    </td>

    <td>
        <button onclick="openTrackingModal('${order.id}', '${trackingVal}')">
            Shto/Edito
        </button>

        <br>

        <button class="btn-cancel" onclick="anulloPorosine('${order.id}')">
            Anullo
        </button>
    </td>
</tr>
`;
}).join("");

async function anulloPorosine(orderId) {

    if (!confirm("A dëshironi ta anuloni këtë porosi?")) {
        return;
    }

    const { error } = await supabase
        .from("orders")
        .update({
            status: "cancelled"
        })
        .eq("id", orderId);

    if (error) {
        alert(error.message);
        return;
    }

    alert("Porosia u anulua me sukses.");

    loadMySold();
}

document.addEventListener("DOMContentLoaded", loadMySold);
</script>

</body>
</html>
