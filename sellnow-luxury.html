    .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadOras() {
      const container = document.getElementById("oras-container");
      
      const { data, error } = await supabase
        .from('oras')
        .select('*')
        .eq('category', 'luxury');

      if (error) {
        container.innerHTML = "Gabim: " + error.message;
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = "Nuk ka ende orë në këtë kategori.";
        return;
      }

      container.innerHTML = "";
      data.forEach(ora => {
        // Ndërtojmë linkun automatik: URL e Supabase + path-i i fotos
        const imageUrl = ora.image_url 
          ? ${SUPABASE_URL}/storage/v1/object/public/${ora.image_url} 
          : 'placeholder.png'; // Foto default nëse mungon

        container.innerHTML += `
  <div class="card">
    <img src="${imageUrl}" alt="${ora.model}" onerror="this.style.display='none'">
    <h3>${ora.brand} - ${ora.model}</h3>
    <p>${ora.description || ''}</p>
    <div class="price">${ora.price ? ora.price + ' €' : 'Contact for price'}</div>
    
    <!-- SHTONI FORMULARIN KETU -->
    <form class="request-form">
      <input type="hidden" name="watch_name" value="${ora.brand} ${ora.model}">
      <input type="text" name="full_name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="text" name="country" placeholder="Country" required>
      <textarea name="message" placeholder="Message"></textarea>
      <button type="submit">Send Request</button>
    </form>
    <!-- FUNDI I FORMULARIT -->
    
  </div>
`;
