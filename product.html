<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <title>Detajet e Orës - Ora Swiss</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; margin: 0; }
    nav { padding: 20px; border-bottom: 1px solid #333; background: #0b0b0b; }
    nav a { color: #fff; text-decoration: none; margin-right: 20px; font-weight: bold; }
    .container { max-width: 800px; margin: 40px auto; padding: 20px; background: #161616; border-radius: 15px; }
    img { width: 100%; border-radius: 10px; }
    .btn-buy { background: #25D366; color: #000; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">ORA SWISS</a>
    <a href="index.html">Home</a>
  </nav>

  <div class="container" id="product-details">Duke ngarkuar...</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
  <script>
    const supabase = window.supabase.createClient("https://gnwsrmelmeqduhhmfmoa.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ");

    async function loadDetails() {
      const id = new URLSearchParams(window.location.search).get('id');
      const { data } = await supabase.from('oras').select('*').eq('id', id).single();
      // Rreshti 31: Përdor backticks (``) dhe jo thonjëza të thjeshta
      const imgUrl = https://gnwsrmelmeqduhhmfmoa.supabase.co/storage/v1/object/public/images/${data.image_url};
      
      document.getElementById("product-details").innerHTML = `
        <h1>${data.brand} - ${data.model}</h1>
        <img src="${imgUrl}">
        <p><strong>Referenca:</strong> ${data.ref || 'N/A'}</p>
        <p><strong>Materiali:</strong> ${data.material || 'N/A'}</p>
        <h2>${data.price} €</h2>
        <button class="btn-buy" onclick="window.open('https://wa.me/3556XXXXXXXX', '_blank')">Bli Tani</button>
      `;
    }
    loadDetails();
  </script>
</body>
</html>
