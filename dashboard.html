<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>Orët e mia</h1>
    <button id="btnSellNow" type="button" style="display: none;">Sell Now</button>
    <ul id="myWatchesList"></ul>
    
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const supabase = createClient(
    'https://xyunmtvysqwonelecudf.supabase.co',
    'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx'
  );

  async function ngarkoArtikujt() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return;

    // Këtu po përdorim emra unikë për variablat
    const { data: watches, error } = await supabase
      .from('watches')
      .select('*')
      .eq('user_id', user.id);

    if (error) {
      console.error("Gabim:", error);
      return;
    }

    const lista = document.getElementById("myWatchesList");
    if (lista) {
      lista.innerHTML = "";
      if (watches.length === 0) {
        lista.innerHTML = "<li>Nuk keni asnjë orë të regjistruar.</li>";
      } else {
        watches.forEach(watch => {
          const li = document.createElement("li");
          li.innerHTML = ${watch.name} <button onclick="window.location.href='sellnow.html?id=${watch.id}'">Sell Now</button>;
          lista.appendChild(li);
        });
      }
    }
  }

  async function kontrolloDheShfaqSellNow() {
    const { data: { session } } = await supabase.auth.getSession();
    const btnSell = document.getElementById("btnSellNow");
    if (btnSell) {
      btnSell.style.display = session ? "block" : "none";
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    kontrolloDheShfaqSellNow();
    ngarkoArtikujt();

    const btnSell = document.getElementById("btnSellNow");
    if (btnSell) {
      btnSell.addEventListener("click", () => {
        window.location.href = "sellnow.html";
      });
    }
  });

  supabase.auth.onAuthStateChange(() => {
    kontrolloDheShfaqSellNow();
    ngarkoArtikujt();
  });
</script>
</body>
</html>
