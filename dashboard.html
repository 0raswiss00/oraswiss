<!DOCTYPE html>
<html lang="sq">
<head>
    <title>Dashboard-i Im</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="wrap">
    <h1>Mirë se erdhe!</h1>
    
    <!-- Butoni që kërkove për të shitur -->
    <button onclick="window.location.href='sellnow.html'" style="background: gold; width: 100%; padding: 15px;">
      + Sell Now
    </button>
    
    <h3>Orët e mia:</h3>
    <ul id="myWatchesList"></ul>
  </div>
</body>
    
<script type="module">
  // 1. Importo libraritë (rreshtat 22-23)
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

  // 2. Inicializo Supabase (këtu vendos URL-në dhe Key-në tënde)
  const supabase = createClient('https://gnwsrmelmeqduhhfmoa.supabase.co', 'sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9');
  const auth = getAuth();

  // 3. Logjika për të shfaqur orët
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const { data, error } = await supabase.from('oras').select('*').eq('user_id', user.uid);
      
      if (data) {
        // Këtu ID-ja duhet të jetë "myWatchesList" siç e ke në HTML te rreshti 17
        const list = document.getElementById('myWatchesList');
        list.innerHTML = ""; 
        data.forEach(watch => {
          let li = document.createElement('li');
          li.innerHTML = `${watch.brand} - ${watch.model} | ${watch.price}€ 
            <button onclick="deleteWatch('${watch.id}')">Fshi</button>`;
          list.appendChild(li);
        });
      }
    } else {
      window.location.href = "login.html";
    }
  });

  // 4. Funksioni për fshirje
  window.deleteWatch = async (watchId) => {
    const { error } = await supabase.from('oras').delete().eq('id', watchId);
    if (!error) location.reload();
  };
</script>

</body>
</html>
