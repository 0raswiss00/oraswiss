<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>Orët e mia</h1>
    <ul id="myWatchesList"></ul>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const supabaseKey = 'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx';

  // Kontrollojmë gjendjen e sesionit
  supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) {
      console.log("Përdoruesi i loguar, po marrim orët...");
      fetchWatches(session.user.id);
    } else {
      console.log("Nuk ka sesion, dërgimi te login.html");
      window.location.href = "login.html";
    }
  });

  async function fetchWatches(userId) {
    const { data, error } = await supabase
      .from('watches')
      .select('*')
      .eq('user_id', userId);

    if (error) {
      console.error("Gabim në databazë:", error.message);
      return;
    }

    const listElement = document.getElementById("myWatchesList");
    if (!listElement) return;

    listElement.innerHTML = ""; 

    if (data && data.length > 0) {
      data.forEach(watch => {
        const li = document.createElement("li");
        // Këtu po përdorim vetëm emrin për të shmangur gabimet me kolonat
        li.textContent = watch.name; 
        listElement.appendChild(li);
      });
    } else {
      listElement.innerHTML = "<li>Nuk ke asnjë orë të regjistruar.</li>";
    }
  }
</script>
</body>
</html>
