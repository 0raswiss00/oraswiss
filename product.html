<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .product-container { border: 1px solid #ccc; padding: 20px; border-radius: 10px; }
        .price { color: green; font-weight: bold; }
        .button { background: #25D366; color: white; padding: 10px 20px; text-decoration: none; display: inline-block; border-radius: 5px; }
    </style>
</head>
<body>

<div id="container">Duke ngarkuar...</div>

<script>
    // Fshije rreshtin 'const supabase = ...' që kishit më parë.
    // Përdorim drejtpërdrejt 'window.supabase' për të shmangur konfliktet.

    async function loadProduct() {
        const id = new URLSearchParams(window.location.search).get('id');
        const container = document.getElementById("container");

        if (!id) { 
            container.innerHTML = "ID mungon."; 
            return; 
        }

        // Përdorim 'window.supabase' që vjen nga biblioteka që ke importuar lart
        const { data, error } = await window.supabase
            .from('oras')
            .select('*')
            .eq('id', id)
            .single();

        if (error) {
            container.innerHTML = "Gabim: " + error.message;
            console.error("Gabim Supabase:", error);
            return;
        }

        if (!data) {
            container.innerHTML = "Produkti nuk u gjet.";
            return;
        }

        // Shfaqja e të dhënave
        container.innerHTML = `
            <div class="product-container">
                <h1>${data.brand || ''} - ${data.model || ''}</h1>
                <p><strong>Kategoria:</strong> ${data.category || ''}</p>
                <p class="price">Çmimi: ${data.price || '0'} €</p>
                <ul>
                    <li>Referenca: ${data.reference || '-'}</li>
                    <li>Materiali: ${data.material || '-'}</li>
                    <li>Madhësia: ${data.case_size || '-'}</li>
                    <li>Viti: ${data.year || '-'}</li>
                    <li>Lëvizja: ${data.movement || '-'}</li>
                    <li>Funksionet: ${data.function || '-'}</li>
                    <li>Shërbimi: ${data.service || '-'}</li>
                    <li>Kuti/Dokumenta: ${data.box_papers || '-'}</li>
                    <li>PayPal: ${data.PayPal || '-'}</li>
                </ul>
            </div>
        `;
    }

    // Sigurohemi që funksioni thirret pasi faqja të jetë gati
    window.addEventListener('DOMContentLoaded', loadProduct);
</script>

</body>
</html>
