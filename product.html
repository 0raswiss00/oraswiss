<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Detajet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="container">Duke ngarkuar...</div>

    <script>
        // Inicializimi i vetëm dhe i pastër (Vetëm një herë)
        const supabase = window.supabase.createClient(
            "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ"
        );

        async function loadProduct() {
            const id = new URLSearchParams(window.location.search).get('id');
            const container = document.getElementById("container");

            if (!id) {
                container.innerHTML = "Asnjë ID produkti nuk u gjet.";
                return;
            }

            try {
                const { data, error } = await supabase.from('oras').select('*').eq('id', id).single();
                
                if (error) throw error;

                // Shfaqja e të dhënave
                container.innerHTML = `
                    <div style="max-width:500px; margin:auto; border:1px solid #333; padding:20px; border-radius:10px;">
                        <img src="${data.image_url || ''}" onerror="this.src='https://via.placeholder.com/400'" style="width:100%; border-radius:10px;">
                        <h1>${data.brand} ${data.model}</h1>
                        <p><strong>Referenca:</strong> ${data.reference || 'N/A'}</p>
                        <p style="font-size:24px; color:#25D366;">${data.price} €</p>
                        <p>${data.description || 'Nuk ka përshkrim.'}</p>
                        <a href="https://wa.me/35569XXXXXXX?text=Dua të blej orën: ${data.brand} ${data.model}" 
                           style="display:block; background:#25D366; color:white; padding:15px; text-decoration:none; text-align:center; font-weight:bold; border-radius:5px;">
                           POROSIT NE WHATSAPP
                        </a>
                    </div>
                `;
            } catch (err) {
                container.innerHTML = "GABIM: " + err.message;
            }
        }

        // Thirrja e funksionit ne fund te script-it
        loadProduct();
    </script>
</body>
</html>
