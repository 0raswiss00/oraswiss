<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Detajet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
        .product-card { background: #111; border: 1px solid #333; padding: 20px; max-width: 500px; margin: auto; border-radius: 10px; }
        .product-img { width: 100%; height: auto; border-radius: 10px; margin-bottom: 15px; object-fit: cover; }
        .price { color: #25D366; font-weight: bold; font-size: 1.4em; margin: 10px 0; }
        hr { border: 0; border-top: 1px solid #333; margin: 15px 0; }
        .btn { display: block; text-align: center; text-decoration: none; font-weight: bold; border-radius: 5px; padding: 15px; margin-top: 10px; }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-paypal { background: #ffeb00; color: black; } /* Bërë i verdhë si te lista kryesore */
    </style>
</head>
<body>

    <div id="container">Duke ngarkuar...</div>

    <script>
// Fillon këtu pas rreshtit 22
const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
const supabase = window.supabase.createClient(SUPABASE_URL, "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ");

let images = [];
let currentIndex = 0;

async function loadProduct() {
    const id = new URLSearchParams(window.location.search).get('id');
    const container = document.getElementById("container");

    try {
        const { data, error } = await supabase.from('oras').select('*').eq('id', id).single();
        if (error) throw error;

        images = data.image_url ? (Array.isArray(data.image_url) ? data.image_url : [data.image_url]) : ["https://placeholder.co/600x400/222/fff?text=No+Image"];

        // Ndërtimi i HTML-së në mënyrë të sigurt
        let html = `
            <div class="product-card">
                <div style="position: relative;">
                    <img id="main-img" src="" class="product-img">
                    <div id="btn-container" style="position:absolute; width:100%; top:40%; display:flex; justify-content:space-between; padding:0 5px;"></div>
                </div>
                <h1>${data.brand} - ${data.model}</h1>
                <div class="price">Price: ${data.price ? data.price + ' €' : 'Contact'}</div>
                <hr>
                <p><strong>Reference:</strong> ${data.reference || 'N/A'}</p>
                <a href="https://wa.me/35569XXXXXXX?text=Jam%20i%20interesuar%20per:%20${encodeURIComponent(data.brand + ' ' + data.model)}" class="btn btn-whatsapp">💬 ORDER ON WHATSAPP</a>
            </div>
        `;
        
        container.innerHTML = html;

        // Shtimi i butonave vetëm nëse ka më shumë se 1 foto
        if (images.length > 1) {
            const btnContainer = document.getElementById('btn-container');
            btnContainer.innerHTML = `
                <button onclick="changePhoto(-1)" style="cursor:pointer; background:rgba(0,0,0,0.5); color:white; border:none; padding:10px;">❮</button>
                <button onclick="changePhoto(1)" style="cursor:pointer; background:rgba(0,0,0,0.5); color:white; border:none; padding:10px;">❯</button>
            `;
        }

        updateImage();
    } catch (err) {
        container.innerHTML = "GABIM: " + err.message;
    }
}

function updateImage() {
    const imgElement = document.getElementById("main-img");
    if (!imgElement) return;
    let imgUrl = images[currentIndex];
    imgElement.src = imgUrl.startsWith('http') ? imgUrl : ${SUPABASE_URL}/storage/v1/object/public/or-images/${imgUrl};
}

window.changePhoto = function(dir) {
    currentIndex = (currentIndex + dir + images.length) % images.length;
    updateImage();
};

loadProduct();

    </script>
</body>
</html>
