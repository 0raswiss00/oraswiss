<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>My Sales - Ora Swiss</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 1. Sfondi i Zezë */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        /* 2. Karta e produktit (e zezë me kornizë gold) */
        .sale-item { 
            background-color: #1a1a1a; 
            border: 1px solid #d4a017; /* Gold */
            margin-bottom: 15px; 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-radius: 8px; 
        }

        /* 3. Butonat (Gold me tekst të zi) */
        button {
            background-color: #d4a017; /* Gold */
            color: #000000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #b88b10; /* Gold më i errët për hover */
        }

        /* 4. Teksti dhe Linket */
        a {
            text-decoration: none;
            color: #d4a017; /* Linket në Gold */
        }

        /* 5. Navigimi Fundor (i zi me ikona/tekst Gold) */
        .bottom-nav {
            background: #000000 !important;
            border-top: 2px solid #d4a017 !important; /* Vijë gold sipër */
        }

        .nav-item.active {
            color: #d4a017 !important;
        }
    </style>
</head>
<body>

    <div id="salesList">Duke ngarkuar...</div>

    <script>
        // Inicializimi i Supabase
        const myOraSwissClient = window.supabase.createClient(
            "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
            "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"
        );

        async function loadMySales() {
            const salesList = document.getElementById("salesList");
            
            const { data: { user } } = await myOraSwissClient.auth.getUser();
            
            if (!user) {
                salesList.innerHTML = "Ju lutem logohuni.";
                return;
            }

            const { data, error } = await myOraSwissClient
                .from('oras')
                .select('*')
                .eq('user_id', user.id);

            if (error) {
                salesList.innerHTML = "Gabim: " + error.message;
                return;
            }

            if (!data || data.length === 0) {
                salesList.innerHTML = "Nuk keni asnjë artikull në shitje.";
                return;
            }

            // Gjenerimi i listës me linka tek imazhi dhe titulli
            salesList.innerHTML = data.map(item => `
                <div class="sale-item">
                    <a href="product.html?id=${item.id}">
                        <img src="${item.image_url && item.image_url[0] ? item.image_url[0] : 'placeholder.jpg'}">
                    </a>

                    <div>
                        <a href="product.html?id=${item.id}">
                            <strong>${item.brand} ${item.model}</strong>
                        </a>
                        <br>
                        <small>Çmimi: ${item.price} €</small>
                        <div style="margin-top:10px;">
                            <button onclick="window.location.href='product.html?id=${item.id}'">Shiko</button>
                            <button onclick="window.location.href='edit.html?id=${item.id}'">Modifiko</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Thirrja e funksionit
        loadMySales();
    </script>
</body>
</html>
