<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
</head>

<body>

<h1>Orët e mia</h1>

<button id="btnSellNow" style="display:none;">Sell Now</button>

<ul id="list"></ul>

<script type="module">

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
  'https://xyunmtvysqwonelecudf.supabase.co',
  'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx',
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

let user = null;

// GET USER (ONLY WAY)
async function getUser() {
  const { data: { session } } = await supabase.auth.getSession();
  return session?.user || null;
}

// CHECK AUTH
async function checkAuth() {

  user = await getUser();

  const btn = document.getElementById("btnSellNow");

  if (!user) {
    btn.style.display = "none";
    return false;
  }

  btn.style.display = "inline-block";
  return true;
}

// LOAD WATCHES
async function loadWatches() {

  const list = document.getElementById("list");

  const ok = await checkAuth();

  if (!ok) {
    list.innerHTML = "<li>Nuk je i loguar</li>";
    return;
  }

  const { data, error } = await supabase
    .from("watches")
    .select("*")
    .eq("user_id", user.id);

  if (error) {
    console.error(error);
    list.innerHTML = "<li>Gabim server</li>";
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML = "<li>S’ke orë</li>";
    return;
  }

  list.innerHTML = "";

  data.forEach(watch => {

    const li = document.createElement("li");

    const btn = document.createElement("button");
    btn.textContent = "Sell Now";

    btn.onclick = () => {
      window.location.href = sellnow.html?id=${watch.id};
    };

    li.textContent = watch.name + " ";
    li.appendChild(btn);

    list.appendChild(li);
  });
}

// BUTTON
document.getElementById("btnSellNow").onclick = () => {
  window.location.href = "sellnow.html";
};

// INIT
document.addEventListener("DOMContentLoaded", loadWatches);

</script>

</body>
</html>
