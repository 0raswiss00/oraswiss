<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>Orët e mia</h1>
    <!-- Butoni ka ID-në e duhur dhe fillimisht është i fshehur -->
    <button id="btnSellNow" type="button" style="display: none;">
      Sell Now
    </button>
    
    <ul id="myWatchesList"></ul>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const supabase = createClient(
    'https://xyunmtvysqwonelecudf.supabase.co',
    'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx'
  );

  // 1. Funksioni për të ngarkuar orët nga databaza
  async function ngarkoArtikujt() {
    try {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) return;

      // Tërheqim orët që i përkasin përdoruesit të loguar
      const { data, error } = await supabase
        .from('watches')
        .select('*')
        .eq('user_id', user.id);

      if (error) {
        console.error("Gabim gjatë ngarkimit:", error);
        return;
      }

      const lista = document.getElementById("myWatchesList");
      if (lista) {
        lista.innerHTML = "";
        
        if (data.length === 0) {
          lista.innerHTML = "<li>Nuk keni asnjë orë të regjistruar për këtë llogari.</li>";
        } else {
          data.forEach(watch => {
            const li = document.createElement("li");
            li.innerHTML = `
                ${watch.name} 
                <button onclick="window.location.href='sellnow.html?id=${watch.id}'">Sell Now</button>
            `;
            lista.appendChild(li);
          });
        }
      }
    } catch (err) {
      console.error("Gabim i papritur:", err);
    }
  }

  // 2. Funksioni për të kontrolluar nëse përdoruesi është i loguar për të shfaqur butonin
  async function kontrolloDheShfaqSellNow() {
    const { data: { session } } = await supabase.auth.getSession();
    const btnSell = document.getElementById("btnSellNow");

    if (btnSell) {
      if (session) {
        btnSell.style.display = "block";
      } else {
        btnSell.style.display = "none";
      }
    }
  }

  // 3. Ekzekutimi i funksioneve kur ngarkohet faqja
  document.addEventListener("DOMContentLoaded", function() {
    kontrolloDheShfaqSellNow();
    ngarkoArtikujt();

    const btnSell = document.getElementById("btnSellNow");
    if (btnSell) {
      btnSell.addEventListener("click", function() {
        window.location.href = "sellnow.html"; 
      });
    }
  });

  // 4. Dëgjo automatikisht nëse përdoruesi bën login ose logout
  supabase.auth.onAuthStateChange((event, session) => {
      kontrolloDheShfaqSellNow();
      ngarkoArtikujt();
  });
</script>
</body>
</html>
