<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <title>Parts - Ora Swiss</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
    /* Stili për butonat si te image_19.png */
    .nav-filters { margin-bottom: 30px; }
    .nav-filters a { background: #2a2a8e; color: #fff; padding: 8px 15px; border-radius: 20px; text-decoration: none; margin-right: 10px; font-weight: bold; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
    .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
    .price { color: #25D366; font-weight: bold; margin-top: 10px; font-size: 1.2em; }
  </style>
</head>
<body>

  <!-- Butonat e navigimit -->
  <div class="nav-filters">
    <a href="luxury.html">Luxury 3</a>
    <a href="vintage.html">Vintage 2</a>
    <a href="parts.html">Parts 1</a>
  </div>

  <h1>Parts Collection</h1>
  <div id="oras-container" class="grid">Duke ngarkuar koleksionin...</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
  const SUPABASE_KEY = "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"; 
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function loadOras() {
    const container = document.getElementById("oras-container");
    
    // --- KËTU ËSHTË NDRYSHIMI PËR ÇDO FAQE ---
    // Në luxury.html shkruaj 'luxury'
    // Në vintage.html shkruaj 'vintage'
    // Në parts.html shkruaj 'parts'
    const category = 'parts'; 
    // ----------------------------------------

    const { data, error } = await client
      .from('oras')
      .select('*')
      .eq('category', category);

    if (error) {
      container.innerHTML = "Gabim: " + error.message;
      return;
    }

    container.innerHTML = "";
    
    if (data.length === 0) {
      container.innerHTML = "<p>Nuk ka artikuj në këtë kategori.</p>";
      return;
    }

    data.forEach(ora => {
// === LOGJIKA E RE PËR MARRJEN E FOTOS (Rreshtat 65-72) ===
    let imgUrl = "https://placeholder.co/600x400/222/fff?text=No+Image";

    if (ora.image_url) {
        // Kontrollojmë nëse është listë (Array) me shumë foto
        if (Array.isArray(ora.image_url) && ora.image_url.length > 0) {
            const fotojaEParë = ora.image_url[0];
            imgUrl = SUPABASE_URL + "/storage/v1/object/public/images/" + fotojaEParë;
        } 
        // Kontrollojmë nëse ka mbetur ndonjë tekst i thjeshtë i vjetër (Link i plotë ose emër fote)
        else if (typeof ora.image_url === 'string' && ora.image_url !== 'null' && ora.image_url.trim() !== '') {
            if (ora.image_url.startsWith('http')) {
                imgUrl = ora.image_url;
            } else {
                imgUrl = SUPABASE_URL + "/storage/v1/object/public/images/" + ora.image_url;
            }
        }
    }

    // Rreshti 74 yti ekzistues: Injektimi në HTML
    container.innerHTML += `
        <div class="card">
            <h3 onclick="window.location.href='product.html?id=${ora.id}'" style="cursor:pointer;">
                ${ora.brand} - ${ora.model}
            </h3>
            <img src="${imgUrl}" alt="${ora.brand}" ... >
    `;

    // Rreshti 66: Injektimi në HTML
    container.innerHTML += `
      <div class="card">
        <h3 onclick="window.location.href='product.html?id=${ora.id}'" style="cursor:pointer;">
          ${ora.brand} - ${ora.model}
        </h3>
        
        <img src="${imgUrl}" alt="${ora.brand}" style="width: 100%; height: 200px; object-fit: cover; border-radius: 4px;">
        
        <div class="price">${ora.price ? ora.price + ' €' : 'Contact'}</div>
          
          <input type="email" placeholder="Emaili yt" style="width:100%; margin: 5px 0; padding:8px; box-sizing:border-box;">
          <button class="btn-main btn-secondary">Send Request</button>
          
          <a href="${ora.paypal_link}" target="_blank" style="text-decoration:none;">
            <button class="btn-main btn-buy" style="margin-top:5px;">🛒 Buy Now</button>
          </a>
          
            <button class="btn-main btn-secondary" onclick="event.stopPropagation(); alert('Liked!')">❤️ Like</button>
            <button class="btn-main btn-secondary" onclick="event.stopPropagation(); navigator.clipboard.writeText(window.location.href)">🔗 Share</button>
        </div>
      `;
    });
  }

  loadOras();
</script>

</body>
</html>
