<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Product Details</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <main id="product-details">
        Duke ngarkuar detajet e orës...
    </main>

<script>
    // Sigurohu që klienti është i inicializuar (Supabase client)
    const supabase = window.supabase.createClient("URL_JOTE", "KEY_JOTE");

    async function loadProduct() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (!id) {
            document.getElementById('product-details').innerHTML = "Ora nuk u gjet (ID mungon).";
            return;
        }

        // Përdorim .eq për të gjetur orën
        const { data, error } = await supabase
            .from('oras')
            .select('*')
            .eq('id', id)
            .single();

        if (error) {
            console.error("Gabim Supabase:", error);
            document.getElementById('product-details').innerHTML = "Gabim në lidhje: " + error.message;
            return;
        }

        if (!data) {
            document.getElementById('product-details').innerHTML = "Ora nuk ekziston.";
            return;
        }

        // Shfaq të dhënat (SIGUROHU që emrat e kolonave si brand, model, price përputhen me Supabase)
        document.getElementById('product-details').innerHTML = `
            <h1>${data.brand} - ${data.model}</h1>
            <img src="${data.image_url}" style="width:300px">
            <p>Çmimi: €${data.price}</p>
            <a href="${data.paypal_link}" target="_blank">🛒 Blej tani</a>
        `;
    }

    // Kjo është shumë e rëndësishme: THIRRJA E FUNKSIONIT
    loadProduct();
</script>
</body>
</html>
