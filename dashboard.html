<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { font-family: Arial; background: #000; color: #fff; padding: 20px; }
        ul { list-style: none; padding: 0; }
        li { background: #111; margin: 10px 0; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        button { background: gold; color: #000; font-weight: bold; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Orët e mia</h1>
    <ul id="myWatchesList"></ul>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
    'https://xyunmtvysqwonelecudf.supabase.co',
    'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx'
);

  async function ngarkoArtikujt() {
    const lista = document.getElementById("myWatchesList");

    const { data: { session } } = await supabase.auth.getSession();

    if (!session) {
      lista.innerHTML = "<li>Duhet të jeni të loguar.</li>";
      return;
    }

    const { data, error } = await supabase
      .from('watches')
      .select('*')
      .eq('user_id', session.user.id);

    if (error) {
      console.error("Gabim:", error);
      return;
    }

    lista.innerHTML = "";

    if (data.length === 0) {
      lista.innerHTML = "<li>Nuk keni orë të regjistruara.</li>";
      return;
    }

    data.forEach(watch => {
      const li = document.createElement("li");
      li.innerHTML = `
        <span><strong>${watch.brand} ${watch.model}</strong> — ${watch.price}€</span>
        <button onclick="window.location.href='sellnow.html?id=${watch.id}'">Sell Now</button>
      `;
      lista.appendChild(li);
    });
  }

  supabase.auth.onAuthStateChange(() => {
    ngarkoArtikujt();
  });

  ngarkoArtikujt();
</script>
</body>
</html>
