<!DOCTYPE html>
<html lang="sq">
<head>
    <title>Dashboard-i Im</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Mirësevjen në profilin tënd!</h1>
    <div id="myWatches">
        <h3>Orët e mia për shitje:</h3>
        <ul id="watchList"></ul>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
        
        // Inicializo Supabase
        const supabase = createClient('URL_YT_SUPABASE', 'ANON_KEY_YT_SUPABASE');

        const auth = getAuth();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Merr orët e këtij përdoruesi nga Supabase
                const { data, error } = await supabase
                    .from('oras')
                    .select('*')
                    .eq('user_id', user.uid); // Filtro vetëm për këtë përdorues

                if (data) {
                    const list = document.getElementById('watchList');
                    data.forEach(watch => {
                    // ... rreshti 31: data.forEach(watch => {
                    let li = document.createElement('li');
                    // Këtu shtojmë butonat direkt në HTML-në e elementit 'li'
                    li.innerHTML = `
                        ${watch.brand} - ${watch.model} | ${watch.price}€ 
                        <button onclick="deleteWatch('${watch.id}')">Fshi</button>
                        <button onclick="editWatch('${watch.id}')">Edito</button>
                   `;
                   list.appendChild(li);
                 
                    });
                }
            } else {
                window.location.href = "login.html"; // Nëse nuk është loguar
            }
        });

window.deleteWatch = async (watchId) => {
    if(confirm("Je i sigurt që do ta fshish?")) {
        const { error } = await supabase.from('oras').delete().eq('id', watchId);
        if(!error) { alert("U fshi!"); location.reload(); }
    }
};

window.editWatch = (watchId) => {
    alert("Funksioni edit: " + watchId);
};

        
    </script>    
</body>
</html>
