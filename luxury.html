<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <title>Luxury - Ora Swiss</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KD2ZZ3MJYY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-KD2ZZ3MJYY');
  </script>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
    /* Stili për butonat si te image_19.png */
    .nav-filters { margin-bottom: 30px; }
    .nav-filters a { background: #2a2a8e; color: #fff; padding: 8px 15px; border-radius: 20px; text-decoration: none; margin-right: 10px; font-weight: bold; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
    .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
    .price { color: #25D366; font-weight: bold; margin-top: 10px; font-size: 1.2em; }
  </style>
</head>
<body>

  <div class="nav-filters">
    <a href="luxury.html">Luxury </a>
    <a href="vintage.html">Vintage </a>
    <a href="parts.html">Parts </a>
    <a href="bracelets-straps.html">Bracelet/Straps </a>
  </div>

  <h1>Luxury Collection</h1>
  <div id="oras-container" class="grid">Duke ngarkuar koleksionin...</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
  const SUPABASE_KEY = "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"; 
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function loadOras() {
    const container = document.getElementById("oras-container");
    
    // --- KËTU ËSHTË NDRYSHIMI PËR ÇDO FAQE ---
    // Në luxury.html shkruaj 'luxury'
    // Në vintage.html shkruaj 'vintage'
    // Në parts.html shkruaj 'parts'
    const category = 'luxury'; 
    // ----------------------------------------

    const { data, error } = await client
      .from('oras')
      .select('*')
      .eq('category', category);

    if (error) {
      container.innerHTML = "Gabim: " + error.message;
      return;
    }

    container.innerHTML = "";
    
    if (data.length === 0) {
      container.innerHTML = "<p>Nuk ka artikuj në këtë kategori.</p>";
      return;
    }

    // Krijojmë variablin për të grumbulluar të gjithë HTML-në për performancë më të mirë
    let cardsHtml = "";

    data.forEach(ora => {
    let imgUrl = "https://placeholder.co/600x400/222/fff?text=No+Image";
    let primaryImage = "";

    // Kontrollojmë kolonën e re të saktë image_url
    if (ora.image_url && ora.image_url.length > 0) {
        // Merr foton e parë nga lista (Array)
        primaryImage = Array.isArray(ora.image_url) ? ora.image_url[0] : ora.image_url;
    }

    if (primaryImage && primaryImage !== 'null' && primaryImage !== '') {
        if (primaryImage.startsWith('http')) {
            imgUrl = primaryImage;
        } else {
            imgUrl = SUPABASE_URL + "/storage/v1/object/public/or-images/" + primaryImage;
        }
    }

        // 2. Kushti për butonin e verdhë Buy Now
        const buyNowButton = ora.price 
            ? `<a href="${ora.paypal_link}" target="_blank" style="text-decoration:none;" onclick="event.stopPropagation();">
                 <button class="btn-main btn-buy" style="margin-top:5px; width:100%; background-color:#ffeb00; color:#000; font-weight:bold; padding:10px; border:none; border-radius:5px; cursor:pointer;">
                     🛒 Buy Now
                 </button>
               </a>` 
            : ''; 

        // 3. Ndërtimi i HTML-së për çdo kartë (me thonjëza të rregulluara tek alert-et)
        cardsHtml += `
        <div class="card" onclick="window.location.href='product.html?id=${ora.id}'" style="cursor:pointer;">
            <h3>${ora.brand} - ${ora.model}</h3>
            <img src="${imgUrl}" style="width:100%; height:auto; border-radius:10px; margin-top:5px;">
            <div class="price">${ora.price ? ora.price + ' €' : 'Contact'}</div>

            <input type="email" id="email_parts_${ora.id}" placeholder="Emaili yt" style="width:100%; margin:5px 0; padding:8px; box-sizing:border-box; background:#222; border:1px solid #444; color:#fff; border-radius:5px;" onclick="event.stopPropagation();">
            
            <button class="btn-main btn-secondary" style="width:100%; padding:10px; margin-bottom:5px; border-radius:5px; border:1px solid #555; background:#333; color:#fff; cursor:pointer;" 
                onclick="event.stopPropagation(); const emailVal = document.getElementById('email_parts_${ora.id}').value; if(!emailVal){ alert('Ju lutem vendosni email-in!'); return; } alert('Kërkesa u dërgua: ' + emailVal);">
                Send Request
            </button>

            ${buyNowButton}

            <div style="display: flex; gap:5px; margin-top:5px;">
                <button class="btn-main btn-secondary" onclick="event.stopPropagation(); alert('Liked!')" style="flex:1; padding:8px; background:#222; color:#fff; border:1px solid #444; border-radius:5px; cursor:pointer;">
                    ❤️ Like
                </button>
                <button class="btn-main btn-secondary" style="flex:1; padding:8px; background:#222; color:#fff; border:1px solid #444; border-radius:5px; cursor:pointer;" 
                    onclick="event.stopPropagation(); const productUrl = window.location.origin + '/product.html?id=${ora.id}'; navigator.clipboard.writeText(productUrl).then(() => { alert('Linku u kopjua!'); }).catch(() => { alert('Gabim gjatë kopjimit!'); });">
                    🔗 Share
                </button>
            </div>
        </div>
        `;
    });

    // Injektojmë të gjitha kartat në DOM vetëm një herë
    container.innerHTML = cardsHtml;
  }

  // Thirrja e funksionit për të ngarkuar të dhënat
  loadOras();
</script>

</body>
</html>
