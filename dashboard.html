<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>Orët e mia</h1>
    <ul id="myWatchesList"></ul>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const supabase = createClient(
    'https://xyunmtvysqwonelecudf.supabase.co',
    'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx'
  );

  async function ngarkoArtikujt() {
    try {
      // Marrja e të dhënave
      const { data, error } = await supabase.from('watches').select('*');
      if (error) throw error;

      console.log("Të dhënat u morën:", data);

      const lista = document.getElementById("myWatchesList");
      if (lista) {
        lista.innerHTML = ""; // Pastro listën për të shmangur dublikimet
        
        data.forEach(watch => {
          const li = document.createElement("li");
          // Këtu shfaqim emrin dhe butonin
          // Ndrysho rreshtin e butonit në këtë formë:
          li.innerHTML = `
              ${watch.name} 
              <button onclick="window.location.href='sellnow.html?id=${watch.id}'">Sell Now</button>
          `;
          lista.appendChild(li);
        });
      }
    } catch (err) {
      console.error("Gabim gjatë ngarkimit:", err);
    }
  }

  // Ekzekuto funksionin
  ngarkoArtikujt();
</script>
</body>
</html>
