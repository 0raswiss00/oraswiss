<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Koleksioni</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { border: 1px solid #333; padding: 15px; border-radius: 10px; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
    </style>
</head>
<body>
    <nav><a href="luxury.html">Luxury</a> | <a href="vintage.html">Vintage</a> | <a href="parts.html">Parts</a></nav>
    <div id="oras-container" class="grid">Duke ngarkuar...</div>

<script>
  // 1. Sigurohemi që supabase është e ngarkuar
  if (typeof supabase === 'undefined') {
      console.error("Supabase nuk u ngarkua!");
  } else {
      const client = supabase.createClient(
          "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
          "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ"
      );

      async function loadData() {
          const container = document.getElementById('oras-container');
          
          // Kategoria fiks siç e ke në Supabase (p.sh. 'luxury')
          const { data, error } = await client.from('oras').select('*').eq('category', 'luxury');
          
          if (error) {
              container.innerHTML = "Gabim: " + error.message;
              return;
          }
          
          if (!data || data.length === 0) {
              container.innerHTML = "Nuk u gjet asnjë orë në këtë kategori.";
              return;
          }

          // Shfaqja e të dhënave
          container.innerHTML = data.map(item => `
              <div class="card">
                  <img src="https://gnwsrmelmeqduhhmfmoa.supabase.co/storage/v1/object/public/or-images/${item.image}" alt="${item.brand}">
                  <h3>${item.brand} - ${item.model}</h3>
                  <p>Çmimi: ${item.price} €</p>
                  <a href="product.html?id=${item.id}">Shiko Detajet</a>
              </div>
          `).join('');
      }
      
      loadData();
  }
</script>

</body>
</html>
