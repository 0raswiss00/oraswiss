<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>Orët e mia</h1>
    <a href="add.html">
        <button>Shit Orën Tani</button>
    </a>
    <ul id="myWatchesList"></ul>
    <div id="watches-container"></div>
    
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const supabase = createClient(
    'https://xyunmtvysqwonelecudf.supabase.co',
    'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx'
  );

async function ngarkoArtikujt() {
  try {
    // 1. Merr sesionin për të ditur cili përdorues është loguar
    const { data: { session } } = await supabase.auth.getSession();
    
    if (!session) {
      console.log("Përdoruesi nuk është loguar.");
      return;
    }

    console.log("Duke kërkuar orë për user_id:", session.user.id);

    // 2. Merr vetëm orët që kanë këtë user_id
    const { data, error } = await supabase
      .from('watches')
      .select('*')
      .eq('user_id', session.user.id); // KY ËSHTË RRESHTI QË MUNGONTE

    if (error) throw error;

    console.log("Të dhënat u morën:", data);

    const lista = document.getElementById("myWatchesList");
    if (lista) {
      lista.innerHTML = "";
      
      if (data.length === 0) {
        lista.innerHTML = "<li>Nuk keni asnjë orë të regjistruar për këtë llogari.</li>";
      } else {
        data.forEach(watch => {
          const li = document.createElement("li");
          li.innerHTML = `
              ${watch.name} 
              <button onclick="window.location.href='sellnow.html?id=${watch.id}'">Sell Now</button>
          `;
          lista.appendChild(li);
        });
      }
    }
  } catch (err) {
    console.error("Gabim gjatë ngarkimit:", err);
  }
}
async function kontrolloDheShfaqSellNow() {
  const { data: { session } } = await supabase.auth.getSession();
  const btnSell = document.getElementById("btnSellNow");

  // Kontrollo nëse butoni ekziston në HTML
  if (btnSell) {
    if (session) {
      // Përdoruesi është loguar
      btnSell.style.display = "block";
    } else {
      // Përdoruesi NUK është loguar
      btnSell.style.display = "none";
    }
  }
}

// Ekzekutoje këtë kur faqja ngarkohet
kontrolloDheShfaqSellNow();

// Opsionale: Dëgjo për ndryshime në gjendjen e autentifikimit
supabase.auth.onAuthStateChange((event, session) => {
    kontrolloDheShfaqSellNow();
});
  // 1. Funksioni për të kontrolluar nëse përdoruesi është i loguar
async function shfaqButoninSell() {
    const { data: { session } } = await supabase.auth.getSession();
    const btnSell = document.getElementById("btnSellNow");

    if (session && btnSell) {
        btnSell.style.display = "block"; // Shfaqet nëse është loguar
    }
}

// Shto këtë pas të gjitha funksioneve të tjera
document.addEventListener("DOMContentLoaded", function() {
    const butoniLart = document.getElementById("btnSellNow");
    if (butoniLart) {
        butoniLart.addEventListener("click", function() {
            // Këtu vendos emrin e saktë të file-it ku ke formën e shitjes
            window.location.href = "sell.html"; 
        });
    }
});
    
// 2. Thirr funksionet
shfaqButoninSell();
ngarkoArtikujt();
</script>
</body>
</html>
