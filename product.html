<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Product Details</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <main id="product-details">
        Duke ngarkuar detajet e orës...
    </main>

<script>
    // 1. Merr ID
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    
    // 2. Kontrollo nëse ID ekziston
    if (!id) {
        document.body.innerHTML = "<h1>Gabim: Nuk është zgjedhur asnjë produkt.</h1>";
    } else {
        // 3. Nëse ka ID, thirr funksionin për të marrë të dhënat
        loadProductData(id);
    }

    async function loadProductData(productId) {
        const { data, error } = await supabase
            .from('oras')
            .select('*')
            .eq('id', productId)
            .single();

        if (error) {
            console.error("Gabim:", error);
            return;
        }
        
        // Këtu shfaq të dhënat (sigurohu që ke një div me id="product-details")
        document.getElementById('product-details').innerHTML = `
            <h1>${data.brand} - ${data.model}</h1>
            <p>Çmimi: ${data.price} €</p>
        `;
    }
</script>
</body>
</html>
