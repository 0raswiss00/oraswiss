<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
 <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KD2ZZ3MJYY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-KD2ZZ3MJYY');
  </script>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card register-form">
      <button class="back-btn" onclick="history.back()">← Back</button>

      <h2>Sign Up</h2>
      <input id="fullName" placeholder="Full Name" autocomplete="name" />
      <input id="phone" placeholder="Phone" autocomplete="tel" />
      <input id="country" placeholder="Country" autocomplete="country-name" />
      <input id="email" type="email" placeholder="Email" autocomplete="email" autocapitalize="none" />
      <input id="password" type="password" placeholder="Password" autocomplete="new-password" />
      <button id="btnRegister" type="button" class="auth-btn">Register</button>

      <div class="auth-sep"></div>

      <h2>Login</h2>
      <input id="loginEmail" type="email" placeholder="Email" autocomplete="email" autocapitalize="none" />
      <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="btnLogin" type="button" class="auth-btn">Login</button>
    </div>
  </div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

  const supabaseUrl = 'https://xyunmtvysqwonelecudf.supabase.co';
  const supabaseKey = 'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx'; 
  const supabase = createClient(supabaseUrl, supabaseKey);

  window.addEventListener("DOMContentLoaded", () => {
    
    // REGISTER
    const btnReg = document.getElementById("btnRegister");
    if (btnReg) {
      btnReg.addEventListener("click", async () => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const fullName = document.getElementById("fullName").value;

        if (!email || !password) {
          alert("Plotëso email dhe password");
          return;
        }

        try {
          const { data, error } = await supabase.auth.signUp({
            email: email,
            password: password,
            options: { data: { full_name: fullName } }
          });
          if (error) throw error;
          alert("Regjistrimi u krye! Konfirmo emailin.");
        } catch (e) {
          alert(e.message);
        }
      });
    }

    // LOGIN
    const btnLog = document.getElementById("btnLogin");
    if (btnLog) {
      btnLog.addEventListener("click", async () => {
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;

        try {
          const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password,
          });

          if (error) throw error;
          window.location.href = "dashboard.html";
        } catch (e) {
          alert(e.message);
        }
      });
    }
  }); // Kjo mbyllje ishte ajo që mungonte!
</script>
</body>  
</html>
