<!doctype html>
<html lang="sq">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bracelets / Straps - Ora Swiss</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#0b0b0b;
    color:white;
    padding:20px;
}

.nav-filters a{
    background:#c9a227;
    color:black;
    padding:8px 15px;
    border-radius:20px;
    text-decoration:none;
    margin-right:10px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    margin-top:30px;
}


.card{
    background:#111;
    padding:15px;
    border-radius:10px;
    border:1px solid #333;
    cursor:pointer;
}


.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:8px;
}


.price{
    color:#25D366;
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}


</style>

</head>


<body>


<div class="nav-filters">

<a href="luxury.html">Luxury</a>
<a href="vintage.html">Vintage</a>
<a href="parts.html">Parts</a>
<a href="bracelets-straps.html">Bracelets / Straps</a>

</div>


<h1>Bracelets / Straps Collection</h1>


<div id="bracelets-container" class="grid">
Loading...
</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script>

const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
const SUPABASE_KEY = "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9";

const client = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);


async function loadBracelets(){

const container = document.getElementById("bracelets-container");


const { data, error } = await client
.from("bracelets_straps")
.select("*")
.order("created_at", {ascending:false});


if(error){

container.innerHTML = "Gabim: " + error.message;
return;

}


if(!data || data.length === 0){

container.innerHTML = "Nuk ka Bracelets / Straps.";
return;

}


let cardsHtml = "";


data.forEach(item=>{


let imgUrl = "https://via.placeholder.com/600x400?text=No+Image";


if(item.image_url){

imgUrl = Array.isArray(item.image_url)
? item.image_url[0]
: item.image_url;

}



cardsHtml += `

<div class="card"
onclick="window.location.href='product-bracelet-strap.html?id=${item.id}'"
style="cursor:pointer;">


<h3>
${item.brand || ""} ${item.model || ""}
</h3>


<img src="${imgUrl}">


<p>
${item.type || ""}
</p>


<div class="price">

${item.price ? item.price + " €" : "Contact"}

</div>


</div>

`;



});


container.innerHTML = cardsHtml;


}


loadBracelets();





</script>

</body>
