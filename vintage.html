<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <title>Vintage - Ora Swiss</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    
    /* Navigimi stili Chrono24 */
    .nav-bar { background: #fff; padding: 15px 20px; border-bottom: 2px solid #ddd; display: flex; gap: 10px; }
    .nav-link { text-decoration: none; color: #333; font-weight: 600; padding: 10px 20px; border-radius: 4px; transition: 0.3s; }
    .nav-link.active { background: #002d72; color: #fff; }
    .nav-link:hover { background: #e0e0e0; }

    .container { max-width: 1200px; margin: 20px auto; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    
    /* Kartat stili Chrono24 */
    .card { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; transition: 0.3s; }
    .card:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 4px; }
    .brand { color: #666; text-transform: uppercase; font-size: 0.8em; margin-top: 10px; }
    .model { font-size: 1.2em; font-weight: bold; margin: 5px 0; }
    .price { color: #002d72; font-size: 1.3em; font-weight: bold; }
  </style>
</head>
<body>

  <div class="nav-bar">
    <a href="luxury.html" class="nav-link">Luxury</a>
    <a href="vintage.html" class="nav-link active">Vintage</a>
    <a href="parts.html" class="nav-link">Parts</a>
  </div>

  <div class="container">
    <h1>Vintage Collection</h1>
    <div id="oras-container" class="grid">Duke ngarkuar koleksionin...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
<script>
  const supabase = window.supabase.createClient("URL_KTU", "KEY_KTU");

  async function loadOras() {
    const container = document.getElementById("oras-container");
    container.innerHTML = "Po ngarkohen orët...";

    // 1. Marrim të dhënat PA FILTËR fillimisht për të parë nëse ka gjë në tabelë
    const { data, error } = await supabase
      .from('oras')
      .select('*');

    if (error) {
      console.error("Gabim:", error);
      container.innerHTML = "Gabim: " + error.message;
      return;
    }

    console.log("Të dhëna të marra:", data); // SHIKO KËTU NË CONSOLE

    // 2. Filtrojmë vetëm "vintage" në JavaScript për të qenë të sigurt
    const filteredData = data.filter(ora => 
      ora.category && ora.category.toLowerCase() === 'vintage'
    );

    if (filteredData.length === 0) {
      container.innerHTML = "Nuk u gjet asnjë orë në kategorinë Vintage.";
      return;
    }

    container.innerHTML = "";
    filteredData.forEach(ora => {
      container.innerHTML += `
        <div class="card">
          <img src="${ora.image_url || 'placeholder.png'}" alt="${ora.model}">
          <h3>${ora.brand} - ${ora.model}</h3>
          <p>${ora.price} €</p>
        </div>
      `;
    });
  }

  loadOras();
</script>

</body>
</html>
