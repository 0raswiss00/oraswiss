async function shtoOren() {

  }
  console.log("Të dhënat u morën:", data);

  const oraData = {

    category: document.getElementById('kategoria').value,
    price: document.getElementById('cmimi').value,
    reference: document.getElementById('reference').value,
    material: document.getElementById('material').value,
    case_size: document.getElementById('caseSize').value,
    production_year: parseInt(document.getElementById('year').value),
    movement_type: document.getElementById('movement').value,

    box_papers: document.getElementById('boxPapers').checked,
    description: document.getElementById('description').value

  const { data, error } = await supabase.from('watches').insert([oraData]);

  } else {
    alert("Ora u shtua me sukses!");
  }
}
  // 4. Dërgo të dhënat në bazën e të dhënave
  const { data, error } = await supabase
    .from('watches')
    .insert([oraData]);

  if (error) {

  } else {

  }
}

    console.log("Të dhënat u morën:", data);

    const lista = document.getElementById("myWatchesList");
    if (lista) {
      lista.innerHTML = "";
      
      if (data.length === 0) {
        lista.innerHTML = "<li>Nuk keni asnjë orë të regjistruar për këtë llogari.</li>";
      } else {
        data.forEach(watch => {
          const li = document.createElement("li");
          li.innerHTML = `
              ${watch.name}

    }
  } catch (err) {

  }

async function kontrolloDheShfaqSellNow() {
  const { data: { session } } = await supabase.auth.getSession();
  const btnSell = document.getElementById("btnSellNow");

  // Kontrollo nëse butoni ekziston në HTML
  if (btnSell) {
    if (session) {
      // Përdoruesi është loguar
      btnSell.style.display = "block";
    } else {
      // Përdoruesi NUK është loguar
      btnSell.style.display = "none";
    }
  }
}

// Ekzekutoje këtë kur faqja ngarkohet
kontrolloDheShfaqSellNow();

// Opsionale: Dëgjo për ndryshime në gjendjen e autentifikimit
supabase.auth.onAuthStateChange((event, session) => {
    kontrolloDheShfaqSellNow();
});
  // 1. Funksioni për të kontrolluar nëse përdoruesi është i loguar
async function shfaqButoninSell() {
    const { data: { session } } = await supabase.auth.getSession();
    const btnSell = document.getElementById("btnSellNow");

    if (session && btnSell) {
        btnSell.style.display = "block"; // Shfaqet nëse është loguar
    }
}

// Shto këtë pas të gjitha funksioneve të tjera
document.addEventListener("DOMContentLoaded", function() {
    const butoniLart = document.getElementById("btnSellNow");
    if (butoniLart) {
        butoniLart.addEventListener("click", function() {
            // Këtu vendos emrin e saktë të file-it ku ke formën e shitjes
            window.location.href = "sell.html"; 
        });
    }
});
    
// 2. Thirr funksionet
shfaqButoninSell();
ngarkoArtikujt();
</script>
