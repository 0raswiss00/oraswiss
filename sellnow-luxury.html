<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <title>Luxury - Ora Swiss</title>
  <style>
    body{font-family:Arial;background:#0b0b0b;color:#fff;padding:20px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));gap:20px;margin-top:20px}
    .card{background:#111;padding:15px;border-radius:10px;border:1px solid #333}
    .card img{width:100%;border-radius:5px}
    .price{color:#25D366;font-weight:bold;margin-top:10px}
  </style>
</head>
<body>

  <h1>Luxury Collection</h1>
  <div id="oras-container" class="grid">Duke ngarkuar koleksionin...</div>

  <!-- Supabase Script -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
    // Ky është çelësi yt i saktë që zbuluam
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ";
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadOras() {
      const container = document.getElementById("oras-container");
      
      // Kërkojmë vetëm orët që janë "luxury"
      const { data, error } = await supabase
        .from('oras')
        .select('*')
        .eq('category', 'luxury');

      if (error) {
        container.innerHTML = "Gabim gjatë ngarkimit: " + error.message;
        return;
      }

      if (data.length === 0) {
        container.innerHTML = "Nuk ka ende orë në këtë kategori.";
        return;
      }

     container.innerHTML = "";
      data.forEach(ora => {
        container.innerHTML += `
          <div class="card">
            <img src="${ora.image_url}" alt="${ora.model}">
            
            <h3>${ora.brand} - ${ora.model}</h3>
            <p>${ora.description}</p>
            <div class="price">${ora.price ? ora.price + ' €' : 'Contact for price'}</div>
          </div>
        `;
      });

    loadOras();
  </script>
</body>
</html>
