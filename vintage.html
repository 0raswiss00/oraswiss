<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <title>Vintage - Ora Swiss</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .card { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; }
    img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
    .price { color: #25D366; font-weight: bold; margin: 10px 0; }
  </style>
</head>
<body>

  <h1>Vintage Collection</h1>
  <div id="oras-container" class="grid">Duke ngarkuar...</div>

  <script>
    // 1. Inicializimi (Vetëm një herë!)
    const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
    const SUPABASE_KEY = "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadOras() {
      const container = document.getElementById("oras-container");
      
      // 2. Marrja e të dhënave
      const { data, error } = await supabase
        .from('oras')
        .select('*')
        .eq('category', 'vintage');

      if (error) {
        container.innerHTML = "Gabim: " + error.message;
        console.error(error);
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = "Nuk ka orë në këtë kategori.";
        return;
      }

      // 3. Shfaqja e të dhënave
      container.innerHTML = "";
      data.forEach(ora => {
        container.innerHTML += `
          <div class="card">
            <img src="${SUPABASE_URL}/storage/v1/object/public/${ora.image_url}" alt="${ora.model}">
            <h3>${ora.brand} - ${ora.model}</h3>
            <p>Ref: ${ora.reference || 'N/A'}</p>
            <div class="price">${ora.price ? ora.price + ' €' : 'Contact'}</div>
            <a href="https://wa.me/35569XXXXXXX" target="_blank">WhatsApp</a>
          </div>
        `;
      });
    }

    loadOras();
  </script>
</body>
</html>
