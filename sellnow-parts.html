<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <title>Parts - Ora Swiss</title>
  <style>
    body{font-family:Arial;background:#0b0b0b;color:#fff;padding:20px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));gap:20px;margin-top:20px}
    .card{background:#111;padding:15px;border-radius:10px;border:1px solid #333}
    .price{color:#25D366;font-weight:bold;margin-top:10px}
  </style>
</head>
<body>
  <h1>Parts Collection</h1>
  <div id="oras-container" class="grid">Duke ngarkuar...</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
  <script>
    const supabase = window.supabase.createClient("https://gnwsrmelmeqduhhmfmoa.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ");
    
    async function loadParts() {
      const { data } = await supabase.from('oras').select('*').eq('category', 'parts');
      const container = document.getElementById("oras-container");
      container.innerHTML = data && data.length > 0 ? data.map(ora => `
        <div class="card">
          <h3>${ora.brand} - ${ora.model}</h3>
          <div class="price">${ora.price || 'N/A'} €</div>
        </div>
      `).join('') : "Nuk ka ende pjesë këmbimi.";
    }
    loadParts();
  </script>
</body>
</html>
