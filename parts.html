<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OraSwiss</title>
    <style>
        body { font-family: Arial, sans-serif; background: #111; color: #fff; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; }
        .card { border: 1px solid #333; padding: 15px; border-radius: 8px; width: 250px; background: #222; cursor: pointer; }
        .card img { border-radius: 4px; }
        .price { font-weight: bold; color: #00ff00; margin-top: 10px; }
        .btn-main { width: 100%; padding: 8px; margin-top: 5px; border: none; cursor: pointer; }
        .btn-secondary { background: #555; color: #fff; }
        .btn-buy { background: #ff9900; color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Ora Collection</h2>
    <div id="oras-container" class="container">Duke ngarkuar...</div>

    <script>
    async function loadCategory(cat, containerId) {
        const container = document.getElementById(containerId);
        
        const { data, error } = await supabase
            .from('oras')
            .select('*')
            .eq('category', cat);

        if (error) {
            console.error("Gabim gjatë marrjes së të dhënave:", error);
            container.innerHTML = "Error loading items.";
            return;
        }

        if (!data || data.length === 0) {
            container.innerHTML = "No items in this category.";
            return;
        }

        const html = data.map(ora => {
            let fotoHTML = '';
            let fushaFotos = ora.image_url || ora['image-url'] || '';

            if (fushaFotos && fushaFotos !== 'null' && fushaFotos !== '') {
                const fotoList = String(fushaFotos).split(',');
                fotoList.forEach(fotoEmri => {
                    let singleImgUrl = "https://placeholder.co/600x400/222/fff?text=No+Image";
                    if (fotoEmri.trim().startsWith('http')) {
                        singleImgUrl = fotoEmri.trim();
                    } else {
                        singleImgUrl = "https://gnwsrmelmeqduhmhfmoa.supabase.co/storage/v1/object/public/images/" + fotoEmri.trim();
                    }
                    fotoHTML += <img src="${singleImgUrl}" alt="${ora.brand || 'Ora'}" style="width: 100%; height: 200px; object-fit: cover; margin-bottom: 5px;">;
                });
            } else {
                fotoHTML = <img src="https://placeholder.co/600x400/222/fff?text=No+Image" style="width: 100%; height: 200px; object-fit: cover;">;
            }

            return `
            <div class="card" onclick="window.location.href='product.html?id=${ora.id}'">
                ${fotoHTML}
                <h3>${ora.brand || ''} - ${ora.model || ''}</h3>
                <p style="color:#aaa; font-size:14px; margin:5px 0;">Ref: ${ora.reference || '/'}</p>
                <div class="price">${ora.price ? ora.price + ' €' : 'Contact for price'}</div>
                
                <input type="email" placeholder="Emaili yt" style="width:100%; margin: 5px 0; padding: 5px;" onclick="event.stopPropagation();">
                <button class="btn-main btn-secondary" onclick="event.stopPropagation(); alert('Request Sent!');">Send Request</button>
                
                ${ora.paypal_link ? `
                <a href="${ora.paypal_link}" target="_blank" style="text-decoration:none;" onclick="event.stopPropagation();">
                    <button class="btn-main btn-buy">🛒 Buy Now</button>
                </a>
                ` : ''}
            </div>
            `;
        }).join('');

        container.innerHTML = html;
    }
    </script>
</body>
</html>
