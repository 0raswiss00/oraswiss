<div style="color:white; font-family:Arial">
  <h2>Users</h2>
  <div>Totali: <b id="count">0</b></div>
  <ul id="list"></ul>
</div>

<script>
  const supabase = window.supabase.createClient(
    "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
  );

  async function loadOras() {
    const listEl = document.getElementById("list");
    const countEl = document.getElementById("count");

    // Merrni të gjithë oras
    const { data, error, count } = await supabase
      .from('oras')
      .select('*', { count: 'exact' });

    if (error) {
      console.error("Gabim:", error);
      listEl.innerHTML = "<li style='color:red'>Gabim në marrjen e të dhënave</li>";
      return;
    }

    // Përditëso numrin total
    countEl.textContent = data.length;
    listEl.innerHTML = "";

    // Shfaq secilin ora
    data.forEach(item => {
      const li = document.createElement("li");
      li.style.padding = "10px";
      li.style.borderBottom = "1px solid #444";
      li.textContent = `${item.brand} ${item.model} - ${item.category} - ${item.price}€`;
      listEl.appendChild(li);
    });
  }

  // Thërrni kur hapet faqja
  loadOras();
</script>
</body>  
</html>
