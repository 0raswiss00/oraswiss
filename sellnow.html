<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shto orë</title>

  <style>
    body{font-family:Arial;background:#0b0b0b;color:#fff;margin:0;padding:20px}
    .wrap{max-width:900px;margin:0 auto}
    label{display:block;margin-top:10px}
    input,select,textarea{width:100%;padding:10px;margin-top:5px;background:#111;color:#fff;border:1px solid #333;border-radius:8px}
    button{margin-top:10px;padding:12px;border-radius:8px;border:0;cursor:pointer}
    button:hover{opacity:.9}
    #preview img{width:100px;margin:5px;border-radius:6px}
    .logo-center{display:flex;justify-content:center;margin:10px 0 20px}
    .logo-center img{height:120px}
    .btn{background:#222;color:#fff}
    .btn-primary{background:#25D366;color:#000;font-weight:bold}
  </style>
</head>

<body>

<div class="wrap">

  <div class="logo-center">
    <img src="images/oraswiss-logo.png">
  </div>

  <h2>Shto orë (Sell now)</h2>

  <div id="msg"></div>

  <label>Category</label>
  <select id="category">
    <option value="luxury">Luxury</option>
    <option value="vintage">Vintage</option>
    <option value="parts">Parts</option>
  </select>

  <label>Brand</label>
  <input id="brand">

  <label>Model</label>
  <input id="model">

  <label>Price (€)</label>
  <input id="price" type="number">

  <label>Description</label>
  <textarea id="description"></textarea>

  <label>Photos</label>
  <button id="chooseBtn" class="btn">Choose Photos</button>
  <input type="file" id="photoFiles" multiple accept="image/*" hidden>

  <div id="preview"></div>

  <button style="display:block;background:red;color:white;padding:20px" id="uploadBtn">
    UPLOAD TEST
  </button>
  <button type="button" id="publishBtn" class="btn-primary">PUBLISH</button>

</div>

<!-- Shtohet libraria e Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-storage.js";

/* FIREBASE CONFIG (Për fotot) */
const firebaseConfig = {
  apiKey: "AIzaSyACmJj1OGz1gfRUjxz-w3_k94tNBfNyvVg",
  authDomain: "oraswiss-27e27.firebaseapp.com",
  projectId: "oraswiss-27e27",
  storageBucket: "oraswiss-27e27.appspot.com",
  messagingSenderId: "596627676936",
  appId: "1:596627676936:web:0c96cf820fef4e979616bd"
};
const app = initializeApp(firebaseConfig);
const storage = getStorage(app);

/* SUPABASE CONFIG (Lidhja me databazën e re) */
const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsYWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTY4ODg4MDAsImV4cCI6MjAzMjQ2NDgwMH0.xxxxxxxxxxxxxxx"; // Shënim: Vendos Key-in tënd Anon nëse ky nuk bën
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* STATE */
let uploadedUrls = [];

/* ELEMENTS */
const chooseBtn = document.getElementById("chooseBtn");
const fileInput = document.getElementById("photoFiles");
const uploadBtn = document.getElementById("uploadBtn");
const publishBtn = document.getElementById("publishBtn");
const preview = document.getElementById("preview");
const msg = document.getElementById("msg");

/* MSG */
function setMsg(text){
  msg.textContent = text;
}

setMsg("✅ Gati për të shtuar orë");

/* OPEN FILE PICKER */
chooseBtn.addEventListener("click", () => {
  fileInput.click();
});

/* PREVIEW */
fileInput.addEventListener("change", () => {
  preview.innerHTML = "";

  Array.from(fileInput.files).forEach(file => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });

  setMsg("📸 Foto u zgjodh");
});

/* UPLOAD PHOTOS TO FIREBASE */
async function uploadPhotos(files){
  const urls = [];

  for (let file of files) {
    const storageRef = ref(storage, "watches/" + Date.now() + "-" + file.name);
    const snap = await uploadBytes(storageRef, file);
    const url = await getDownloadURL(snap.ref);
    urls.push(url);
  }

  return urls;
}

/* UPLOAD BUTTON */
uploadBtn.onclick = async () => {
  try {
    if (!fileInput.files.length) {
      alert("Zgjidh foto");
      return;
    }

    setMsg("⏳ Duke ngarkuar fotot...");
    uploadedUrls = await uploadPhotos(fileInput.files);

    console.log("Uploaded URLs:", uploadedUrls);

    if (!uploadedUrls.length) {
      throw new Error("Upload failed");
    }

    setMsg("✅ Fotot u ngarkuan me sukses!");
    alert("✅ Uploaded");

  } catch (e) {
    console.error("UPLOAD ERROR:", e);
    alert("❌ Upload error: " + e.message);
  }
};

/* PUBLISH TO SUPABASE */
publishBtn.onclick = async () => {
  try {
    if (!uploadedUrls.length) throw new Error("Ngarko fotot më parë duke shtypur butonin e kuq (UPLOAD TEST)");

    setMsg("⏳ Duke publikuar të dhënat në Supabase...");

    // Ruajmë linkun e parë të fotos te kolona image_url
    const mainImageUrl = uploadedUrls[0] || "";

    const { data, error } = await supabase
      .from('oras')
      .insert([
        {
          category: document.getElementById("category").value,
          brand: document.getElementById("brand").value,
          model: document.getElementById("model").value,
          price: Number(document.getElementById("price").value),
          description: document.getElementById("description").value,
          image_url: mainImageUrl
        }
      ]);

    if (error) throw error;

    setMsg("✅ U publikua me sukses në databazë!");
    alert("✅ U publikua me sukses!");

    // Pastrim i formularit
    uploadedUrls = [];
    preview.innerHTML = "";
    fileInput.value = "";
    document.getElementById("brand").value = "";
    document.getElementById("model").value = "";
    document.getElementById("price").value = "";
    document.getElementById("description").value = "";

  } catch (e) {
    console.error("PUBLISH ERROR:", e);
    alert("❌ Gabim gjatë publikimit: " + e.message);
    setMsg("❌ Gabim: " + e.message);
  }
};
</script>

</body>
</html>
