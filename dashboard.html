<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>Orët e mia</h1>
    <ul id="myWatchesList"></ul>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        const supabase = createClient('https://xyunmtvysqwonelecudf.supabase.co', 'sb_publishable_tk6dO6UWVIRrVWOfx4m_w_ZAoduHhx');

        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                fetchWatches(session.user.id);
            } else {
                window.location.href = "login.html";
            }
        });

        async function fetchWatches(userId) {
            let { data, error } = await supabase
                .from('watches')
                .select('*')
                .eq('user_id', userId);

            if (error) {
                console.error("Gabim:", error.message);
                return;
            }

            const listElement = document.getElementById("myWatchesList");
            listElement.innerHTML = ""; 

            data.forEach(watch => {
                const li = document.createElement("li");
                // Kjo linjë tani ka backticks (`) që kodi të mos japë gabim
                li.textContent = ${watch.name}; 
                listElement.appendChild(li);
            });
        }
    </script>
</body>
</html>
