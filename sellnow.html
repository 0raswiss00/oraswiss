<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shto orë</title>

  <style>
    body{font-family:Arial;background:#0b0b0b;color:#fff;margin:0;padding:20px}
    .wrap{max-width:900px;margin:0 auto}
    label{display:block;margin-top:10px}
    input,select,textarea{width:100%;padding:10px;margin-top:5px;background:#111;color:#fff;border:1px solid #333;border-radius:8px}
    button{margin-top:10px;padding:12px;border-radius:8px;border:0;cursor:pointer}
    button:hover{opacity:.9}
    #preview img{width:100px;margin:5px;border-radius:6px}
    .logo-center{display:flex;justify-content:center;margin:10px 0 20px}
    .logo-center img{height:120px}
    .btn{background:#222;color:#fff}
    .btn-primary{background:#25D366;color:#000;font-weight:bold}
  </style>
</head>

<body>

<div class="wrap">

  <div class="logo-center">
    <img src="images/oraswiss-logo.png">
  </div>

  <h2>Shto orë (Sell now)</h2>

  <div id="msg"></div>

  <label>Category</label>
  <select id="category">
    <option value="luxury">Luxury</option>
    <option value="vintage">Vintage</option>
    <option value="parts">Parts</option>
  </select>

  <label>Brand</label>
  <input id="brand">

  <label>Model</label>
  <input id="model">

  <label>Price (€)</label>
  <input id="price" type="number">

  <label>Description</label>
  <textarea id="description"></textarea>

  <label>Photos</label>
  <button id="chooseBtn" class="btn">Choose Photos</button>
  <input type="file" id="photoFiles" multiple accept="image/*" hidden>

  <div id="preview"></div>

  <button type="button" id="publishBtn" class="btn-primary" style="margin-top: 30px; padding: 15px; width: 100%;">PUBLISH</button>

</div>

<!-- Libraria e re e Supabase (Versioni UMD që nuk bllokohet) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>

<script>
/* CONFIGURIMI I SUPABASE */
const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
const SUPABASE_KEY = "VENDO_KETU_CELLESIN_QE_KOPJOVE"; 

// Thirrja e re e sigurt që nuk bllokon script-in
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ELEMENTET */
const chooseBtn = document.getElementById("chooseBtn");
const fileInput = document.getElementById("photoFiles");
const publishBtn = document.getElementById("publishBtn");
const preview = document.getElementById("preview");
const msg = document.getElementById("msg");

function setMsg(text){
  msg.textContent = text;
}

setMsg("✅ Çelësi u lidh! Gati për punë.");

/* LOGJIKA E FOTOVE */
chooseBtn.onclick = function() {
  fileInput.click();
};

fileInput.onchange = function() {
  preview.innerHTML = "";
  Array.from(fileInput.files).forEach(file => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
  setMsg("📸 Foto u zgjodh me sukses!");
};

/* PUBLIKIMI */
publishBtn.onclick = async () => {
  try {
    setMsg("⏳ Duke dërguar të dhënat në Supabase...");

    const mainImageUrl = "images/oraswiss-logo.png"; 

    const { data, error } = await supabase
      .from('oras')
      .insert([
        {
          category: document.getElementById("category").value,
          brand: document.getElementById("brand").value,
          model: document.getElementById("model").value,
          price: Number(document.getElementById("price").value),
          description: document.getElementById("description").value,
          image_url: mainImageUrl
        }
      ]);

    if (error) throw error;

    setMsg("🎉 Sukses! Ora u regjistrua në databazë!");
    alert("✅ U publikua me sukses!");

    // Pastrimi
    preview.innerHTML = "";
    fileInput.value = "";
    document.getElementById("brand").value = "";
    document.getElementById("model").value = "";
    document.getElementById("price").value = "";
    document.getElementById("description").value = "";

  } catch (e) {
    console.error("GABIM:", e);
    alert("❌ Gabim gjatë publikimit: " + e.message);
    setMsg("❌ Gabim: " + e.message);
  }
};
</script>

</body>
</html>
