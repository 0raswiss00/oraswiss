<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <title>luxury - Ora Swiss</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
    /* Stili për butonat si te image_19.png */
    .nav-filters { margin-bottom: 30px; }
    .nav-filters a { background: #2a2a8e; color: #fff; padding: 8px 15px; border-radius: 20px; text-decoration: none; margin-right: 10px; font-weight: bold; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
    .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
    .price { color: #25D366; font-weight: bold; margin-top: 10px; font-size: 1.2em; }
  </style>
</head>
<body>

  <!-- Butonat e navigimit -->
  <div class="nav-filters">
    <a href="luxury.html">Luxury 3</a>
    <a href="vintage.html">Vintage 2</a>
    <a href="parts.html">Parts 1</a>
  </div>

  <h1>luxury Collection</h1>
  <div id="oras-container" class="grid">Duke ngarkuar koleksionin...</div>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
  const SUPABASE_KEY = "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"; 
  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_KEY);

  console.log("Supabase loaded");
  
  async function loadOras() {
    const container = document.getElementById("oras-container");

    const category = 'luxury';

    const { data, error } = await client
      .from('oras')
      .select('*')
      .eq('category', category);

    if (error) {
      container.innerHTML = "Gabim: " + error.message;
      return;
    }

    if (!data || data.length === 0) {
      container.innerHTML = "<p>Nuk ka artikuj në këtë kategori.</p>";
      return;
    }

    container.innerHTML = "";

    data.forEach(ora => {

      const img = ora.image_url
        ? SUPABASE_URL + "/storage/v1/object/public/images/" + ora.image_url
        : "https://via.placeholder.com/300x200?text=No+Image";

      container.innerHTML += `
        <div class="card">
          <img src="${img}" alt="${ora.brand}">

          <h3 onclick="window.location.href='product.html?id=${ora.id}'" style="cursor:pointer;">
            ${ora.brand} - ${ora.model}
          </h3>

          <div class="price">${ora.price ? ora.price + ' €' : 'Contact'}</div>

          <input type="email" placeholder="Emaili yt"
            style="width:100%; margin:5px 0; padding:8px; box-sizing:border-box;">

          <button class="btn-main btn-secondary">Send Request</button>

          <a href="${ora.paypal_link}" target="_blank" style="text-decoration:none;">
            <button class="btn-main btn-buy" style="margin-top:5px;">🛒 Buy Now</button>
          </a>

          <button class="btn-main btn-secondary"
            onclick="event.stopPropagation(); alert('Liked!')">❤️ Like</button>

          <button class="btn-main btn-secondary"
            onclick="event.stopPropagation(); navigator.clipboard.writeText(window.location.href)">
            🔗 Share
          </button>
        </div>
      `;
    });
  }

  loadOras();
</script>
</body>
</html>
