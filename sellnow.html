<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sell Your Watch</title>
  <style>
    body { font-family: Arial; background: #000; color: #fff; padding: 20px; }
    form { max-width: 600px; margin: 0 auto; background: #111; padding: 20px; border-radius: 10px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    input, select, textarea { width: 100%; padding: 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; box-sizing: border-box;}
    button { width: 100%; padding: 15px; background: gold; color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>

<form id="sellForm">
 <h2>Shto orë të re</h2>
 <label>Kategoria:</label>
  <select id="category" style="width: 100%; margin-bottom: 15px;">
    <option value="luxury">Luxury</option>
    <option value="vintage">Vintage</option>
    <option value="parts">Parts</option>
  </select>
  <div class="row">
    <input type="text" id="brand" placeholder="Brand" required>
    <input type="text" id="model" placeholder="Model" required>
  </div>
   <label>Çmimi:</label>
   <input type="number" id="price" placeholder="Çmimi në €" style="width: 100%; margin-bottom: 15px; padding: 10px;">   
  <div class="row">
    <input type="text" id="reference" placeholder="Reference">
    <input type="text" id="material" placeholder="Material">
  </div>
  <div class="row">
    <input type="text" id="case_size" placeholder="Case Size (e.g. 41mm)">
    <input type="number" id="year" placeholder="Year">
  </div>
  
  <select id="movement" style="margin-bottom: 15px; width: 100%; padding: 10px; background: #222; color: #fff; border: 1px solid #444;">
    <option value="Automatic">Automatic</option>
    <option value="Manual">Manual</option>
    <option value="Quartz">Quartz</option>
  </select>

  <select id="function" style="margin-bottom: 15px; width: 100%; padding: 10px; background: #222; color: #fff; border: 1px solid #444;">
    <option value="Date">Date</option>
    <option value="Chronometer">Chronometer</option>
    <option value="Chronograph">Chronograph</option>
    <option value="Turbillon">Turbillon</option>
    <option value="No Date">No Date</option>
  </select>

<div class="row" style="margin-top:15px">
    <label><input type="checkbox" id="service"> Service kryer</label>
    <label><input type="checkbox" id="box_papers"> Box / Papers</label>
</div>

  <textarea id="description" placeholder="Description..." rows="4" style="width: 100%; padding: 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; box-sizing: border-box;"></textarea>
  
  <div style="margin-top:15px">
    <label style="color:#aaa; font-size:14px;">Ngarko Foton e Orës:</label>
    <input type="file" id="fileInput" name="images[]" accept="image/*" multiple style="margin-top: 5px;">
  </div>
  
  <button type="submit">Shto orën</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script type="module">
  // Përdorim 'window.supabase' nëse po përdorni versionin UMD
  // ose sigurohemi që skripti është ngarkuar
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const SUPABASE_URL = 'https://gnwsrmelmeqduhhmfmoa.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9'; 

  // Krijimi i klientit duke përdorur funksionin e importuar direkt
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 2. Dëgjuesi i ngjarjes (Submit)
  document.getElementById('sellForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const fileInput = document.getElementById('fileInput');
    const files = fileInput.files;
    let uploadedFileNames = [];

    // 3. Ngarkimi i fotove në Supabase Storage
    if (files.length > 0) {
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const uniqueFileName = Date.now() + "_" + file.name;
        
        const { error: uploadError } = await supabase.storage
          .from('or-images') // Sigurohu që emri i bucket është 'or-images'
          .upload(uniqueFileName, file);

        if (uploadError) {
          console.error("Gabim në ngarkim:", uploadError.message);
          alert("Gabim gjatë ngarkimit të fotos.");
          return;
        }
        uploadedFileNames.push(uniqueFileName);
      }
    }

    // 4. Marrja e sesionit dhe mbledhja e të dhënave
    const { data: { user } } = await supabase.auth.getUser();

    const oraData = {
      user_id: user?.id,
      brand: document.getElementById('brand').value,
      model: document.getElementById('model').value,
      reference: document.getElementById('reference').value,
      material: document.getElementById('material').value,
      case_size: document.getElementById('case_size').value,
      year: parseInt(document.getElementById('year').value) || null,
      movement: document.getElementById('movement').value,
      function: document.getElementById('function').value,
      service: document.getElementById('service').checked,
      box_papers: document.getElementById('box_papers').checked,
      description: document.getElementById('description').value,
      category: document.getElementById('category').value,
      price: parseInt(document.getElementById('price').value) || 0,
      image_url: uploadedFileNames
    
// Kjo duhet të jetë para rreshtit 130
const oraData = {
    box_papers: document.getElementById('box_papers').checked,
    description: document.getElementById('description').value,
    category: document.getElementById('category').value,
    price: parseInt(document.getElementById('price').value) || 0,
    image_url: uploadedFileNames // Sigurohuni që kjo është variabël valide
};

// Pastaj dërgimi
const { error: insertError } = await supabase.from('oras').insert([oraData]);
        
    // 5. Dërgimi në tabelën 'oras'
    const { error: insertError } = await supabase.from('oras').insert([oraData]);

    if (insertError) {
      console.error("Gabim në ruajtje:", insertError.message);
      alert("Gabim gjatë ruajtjes në bazën e të dhënave: " + insertError.message);
    } else {
      alert("Ora u shtua me sukses!");
      document.getElementById('sellForm').reset();
    }
  });
</script>

</body>
</html>
