  // 2. Inicializoni klientin SAKTË (vetëm një herë)
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function loadOras() {
    const container = document.getElementById("oras-container");
    
    // 3. Përdorimi i saktë i supabase.from()
    const { data, error } = await supabase
      .from('oras')
      .select('*')
      .eq('category', 'vintage');

    if (error) {
      container.innerHTML = "Gabim: " + error.message;
      return;
    }

    if (!data || data.length === 0) {
      container.innerHTML = "Nuk ka ende orë në këtë kategori.";
      return;
    }

    });
  }

  loadOras();
</script>
