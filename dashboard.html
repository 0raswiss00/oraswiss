<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
</head>

<body>

<h1>Orët e mia</h1>

<button id="btnSellNow" style="display:none;">
    Sell Now
</button>

<ul id="myWatchesList"></ul>

<script type="module">

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
    'https://xyunmtvysqwonelecudf.supabase.co',
    'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx'
);

let user = null;

// kontroll login (FIXED)
async function kontrolloLogin() {

    const { data: { session } } = await supabase.auth.getSession();

    const btnSell = document.getElementById("btnSellNow");

    if (!session) {
        user = null;
        btnSell.style.display = "none";
        return false;
    }

    user = session.user;
    btnSell.style.display = "inline-block";

    return true;
}

// ngarko artikujt (FIXED)
async function ngarkoArtikujt() {

    const lista = document.getElementById("myWatchesList");

    if (!user) {
        const ok = await kontrolloLogin();

        if (!ok) {
            lista.innerHTML = "<li>Duhet të logohesh për të parë orët e tua.</li>";
            return;
        }
    }

    const { data, error } = await supabase
        .from("watches")
        .select("*")
        .eq("user_id", user.id);

    if (error) {
        console.error(error);
        lista.innerHTML = "<li>Gabim gjatë marrjes së të dhënave.</li>";
        return;
    }

    if (!data || data.length === 0) {
        lista.innerHTML = "<li>Nuk keni asnjë orë të regjistruar.</li>";
        return;
    }

    lista.innerHTML = "";

    data.forEach(watch => {

        const li = document.createElement("li");

        const btn = document.createElement("button");
        btn.textContent = "Sell Now";

        btn.onclick = () => {
            window.location.href = sellnow.html?id=${watch.id};
        };

        li.textContent = watch.name + " ";
        li.appendChild(btn);

        lista.appendChild(li);
    });
}

// butoni sipër
document.getElementById("btnSellNow").addEventListener("click", () => {
    window.location.href = "sellnow.html";
});

// auth change (FIXED - no duplicate reload spam)
supabase.auth.onAuthStateChange((event, session) => {

    if (session) {
        user = session.user;
    } else {
        user = null;
    }

    kontrolloLogin();
    ngarkoArtikujt();
});

// init (clean)
document.addEventListener("DOMContentLoaded", async () => {
    await kontrolloLogin();
    await ngarkoArtikujt();
});

</script>

</body>
</html>
