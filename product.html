<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Detaje</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="container">Duke ngarkuar të dhënat...</div>

<script>
    // 1. Krijo klientin (kjo bëhet vetëm një herë)
    const _supabase = supabase.createClient(
        'https://gnwsrmelmeqduhhmfmoa.supabase.co',
        'sb_publishable__AkK_Z7lhtkvukN6FylcAQ_KBTXlcy9'
    );

    async function loadProduct() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const container = document.getElementById("container");

        if (!id) {
            container.innerHTML = "Gabim: Nuk është gjetur asnjë ID në adresë.";
            return;
        }

        // 2. Kërko të dhënat nga tabela 'oras'
        const { data, error } = await _supabase
            .from('oras')
            .select('*')
            .eq('id', id)
            .single();

        if (error) {
            container.innerHTML = "Gabim nga Supabase: " + error.message;
            console.error(error);
            return;
        }

        // 3. Shfaq të dhënat
        container.innerHTML = `
            <h1>${data.brand || 'Pa emër'} - ${data.model || 'Pa model'}</h1>
            <p>Çmimi: ${data.price || '0'} €</p>
            <ul>
                <li>Referenca: ${data.reference || '-'}</li>
                <li>Materiali: ${data.material || '-'}</li>
                <li>Madhësia: ${data.case_size || '-'}</li>
            </ul>
        `;
    }

    loadProduct();
</script>
</body>
</html>
