<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <title>Vintage - Ora Swiss</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
    .btn { background: #2a2a8e; color: #fff; padding: 10px; border: none; border-radius: 5px; cursor: pointer; display: block; width: 100%; margin-top: 10px; text-align: center; text-decoration: none; }
  </style>
</head>
<body>

  <h1>Vintage Collection</h1>
  <div id="oras-container" class="grid">Duke ngarkuar...</div>

  <script>
    // Inicializimi i saktë - vetëm një herë
    const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
    const SUPABASE_KEY = "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"; 
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadOras() {
      const container = document.getElementById("oras-container");
      
      const { data, error } = await supabase
        .from('oras')
        .select('*')
        .eq('category', 'vintage');

      if (error) {
        container.innerHTML = "Gabim: " + error.message;
        return;
      }

      container.innerHTML = "";
      data.forEach(ora => {
        const card = `
          <div class="card">
            <h3>${ora.brand} - ${ora.model}</h3>
            <div class="price">${ora.price ? ora.price + ' €' : 'Contact'}</div>
            
            <form action="https://api.web3forms.com/submit" method="POST">
              <input type="hidden" name="access_key" value="4ecbdce6-d462-4e39-b39d-8c11e0095f46">
              <input type="email" name="email" placeholder="Email-i juaj" required style="width:100%; padding:5px;">
              <button type="submit" class="btn">Send Request</button>
            </form>

            <a href="https://wa.me/35569XXXXXXX" class="btn" style="background:#25D366;">WhatsApp</a>
            <button class="btn" style="background:#555;" onclick="alert('Like')">❤️ Like</button>
          </div>
        `;
        container.innerHTML += card;
      });
    }

    loadOras();
  </script>
</body>
</html>
