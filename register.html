<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
 <!-- Google tag (gtag.js) -->

    gtag('config', 'G-KD2ZZ3MJYY');

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card register-form">
      <button class="back-btn" onclick="history.back()">← Back</button>

      <h2>Sign Up</h2>
      <input id="fullName" placeholder="Full Name" autocomplete="name" />
      <input id="phone" placeholder="Phone" autocomplete="tel" />
      <input id="country" placeholder="Country" autocomplete="country-name" />
      <input id="email" type="email" placeholder="Email" autocomplete="email" autocapitalize="none" />
      <input id="password" type="password" placeholder="Password" autocomplete="new-password" />
      <button id="btnRegister" type="button" class="auth-btn">Register</button>

      <div class="auth-sep"></div>

      <h2>Login</h2>
      <input id="loginEmail" type="email" placeholder="Email" autocomplete="email" autocapitalize="none" />
      <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="btnLogin" type="button" class="auth-btn">Login</button>
    </div>
  </div>

<script type="module">
  // 1. Importimi i klientit të Supabase nga CDN
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  // 2. Konfigurimi (Vendos këtu kredencialet nga Supabase Project Settings > API)
  const supabaseUrl = 'URL_E_PROJEKTIT_TUAJ';
  const supabaseKey = 'ANON_PUBLIC_KEY_E_PROJEKTIT_TUAJ';
  const supabase = createClient(supabaseUrl, supabaseKey);

  document.addEventListener("DOMContentLoaded", () => {

    // REGISTER LOGIC
    document.getElementById("btnRegister").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const fullName = document.getElementById("fullName").value;

      if (!email || !password) return alert("Plotëso email dhe password");

      try {
        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: password,
          options: {
            data: { full_name: fullName } // Ruajmë emrin në metadata
          }
        });

        if (error) throw error;
        alert("Regjistrimi u krye me sukses!");
        window.location.href = "dashboard.html";
      } catch (e) {
        alert("Gabim gjatë regjistrimit: " + e.message);
      }
    });

    // LOGIN LOGIC
    document.getElementById("btnLogin").addEventListener("click", async () => {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password,
        });

        if (error) throw error;
        window.location.href = "dashboard.html"; // Redirect pas login
      } catch (e) {
        alert("Gabim gjatë login: " + e.message);
      }
    });
  });
</script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/service-worker.js");
    }
  </script>

<div id="minionsLoader" class="minions-loader hidden">

</div>

<script>

</body>  
</html>
