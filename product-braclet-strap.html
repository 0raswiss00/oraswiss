<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Bracelet / Strap</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}


form{
    max-width:600px;
    margin:30px auto;
    background:#1b1b1b;
    padding:25px;
    border-radius:12px;
}


h2{
    text-align:center;
    color:#c9a227;
}


label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    color:#ccc;
}


input, select, textarea{

    width:100%;
    padding:12px;
    background:#222;
    color:white;
    border:1px solid #444;
    border-radius:6px;
    box-sizing:border-box;

}


button{

    width:100%;
    margin-top:25px;
    padding:14px;
    background:#c9a227;
    color:white;
    border:none;
    border-radius:6px;
    font-size:17px;
    cursor:pointer;

}


.section-title{

    margin-top:25px;
    color:#c9a227;
    border-bottom:1px solid #333;
    padding-bottom:5px;

}

</style>

</head>


<body>


<form id="braceletForm">


<h2>Add Bracelet / Strap</h2>


<div class="section-title">
Basic Information
</div>


<label>Brand</label>

<input 
id="brand"
type="text"
placeholder="Brand name"
required>


<label>Model</label>

<input 
id="model"
type="text"
placeholder="Model name">


<label>Price (€)</label>

<input 
id="price"
type="number"
min="1"
placeholder="Price">


<label>Reference / Part Number</label>

<input 
id="reference"
type="text"
placeholder="Reference number">


<label>Type</label>

<select id="type">

<option value="Bracelet">
Bracelet
</option>

<option value="Strap">
Strap
</option>

<option value="Bracelet + Strap">
Bracelet + Strap
</option>

</select>


<label>Condition</label>

<select id="condition">

<option>New</option>
<option>Like New</option>
<option>Excellent</option>
<option>Very Good</option>
<option>Good</option>

</select>


<div class="section-title">
Specifications
</div>


<label>Material</label>

<select id="material">

<option>Stainless Steel</option>
<option>Titanium</option>
<option>Gold</option>
<option>White Gold</option>
<option>Rose Gold</option>
<option>Platinum</option>
<option>Ceramic</option>
<option>Carbon</option>
<option>Silver</option>
<option>Leather</option>
<option>Crocodile</option>
<option>Rubber</option>
<option>NATO</option>
<option>Textile</option>

</select>


<label>Gold Purity</label>

<select id="gold_purity">

<option value="">
Select
</option>

<option>14K</option>
<option>18K</option>
<option>22K</option>
<option>24K</option>

</select>


<label>Color</label>

<select id="color">

<option>Silver</option>
<option>Black</option>
<option>Gold</option>
<option>Rose Gold</option>
<option>Two-Tone</option>
<option>Brown</option>
<option>Blue</option>

</select>


<label>Lug Width (mm)</label>

<input
id="lug_width"
placeholder="Example: 20mm">


<label>Clasp Width (mm)</label>

<input
id="clasp_width"
placeholder="Example: 18mm">


<label>Length (mm)</label>

<input
id="length"
placeholder="Example: 120/75mm">


<label>Thickness (mm)</label>

<input
id="thickness"
placeholder="Example: 3.5mm">


<div class="section-title">
Description
</div>


<label>Description</label>

<textarea
id="description"
rows="5"
placeholder="Product description">
</textarea>


<label>Upload Photos</label>

<input
id="fileInput"
type="file"
accept="image/*"
multiple>


<button type="submit">
Publish Bracelet / Strap
</button>


</form>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>

<script src="db-connect.js"></script>

<script>

const supabaseClient = window.supabaseClient;


async function checkUser(){

    const { data:{user} } = 
    await supabaseClient.auth.getUser();


    if(!user){

        alert("You must be logged in");

        window.location.href="register.html";

        return null;

    }


    return user;

}



document
.getElementById("braceletForm")
.addEventListener("submit", async function(e){


e.preventDefault();



const user = await checkUser();


if(!user) return;



const files = 
document.getElementById("fileInput").files;



let imageUrls = [];



// Upload images

for(let i = 0; i < files.length; i++){


    const file = files[i];


    const fileName =
    Date.now() + "" + i + "" + file.name;



    const { error:uploadError } =

    await supabaseClient
    .storage
    .from("or-images")
    .upload(fileName,file);



    if(uploadError){

        alert(
        "Image upload error: " 
        + uploadError.message
        );

        return;

    }



    const {data:urlData} =

    supabaseClient
    .storage
    .from("or-images")
    .getPublicUrl(fileName);



    imageUrls.push(
        urlData.publicUrl
    );


}




const productData = {


user_id:user.id,


category:
"bracelets_straps",


brand:
document
.getElementById("brand")
.value,


model:
document
.getElementById("model")
.value,


price:
Number(
document
.getElementById("price")
.value
) || null,


reference:
document
.getElementById("reference")
.value,


type:
document
.getElementById("type")
.value,


condition:
document
.getElementById("condition")
.value,


material:
document
.getElementById("material")
.value,


gold_purity:
document
.getElementById("gold_purity")
.value,


color:
document
.getElementById("color")
.value,


lug_width:
document
.getElementById("lug_width")
.value,


clasp_width:
document
.getElementById("clasp_width")
.value,


length:
document
.getElementById("length")
.value,


thickness:
document
.getElementById("thickness")
.value,


description:
document
.getElementById("description")
.value,


image_url:
imageUrls

};





console.log(
"Sending product:",
productData
);





const {data,error}=

await supabaseClient

.from("bracelets_straps")

.insert([
    productData
])

.select();




console.log("DATA:",data);

console.log("ERROR:",error);




if(error){


alert(
"Database error: "
+
error.message
);


return;


}



alert(
"Bracelet / Strap published successfully!"
);



window.location.href =
"dashboard.html";



});


</script>


</body>

</html>
