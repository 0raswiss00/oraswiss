<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sell Your Watch</title>
  <style>
    body { font-family: Arial; background: #000; color: #fff; padding: 20px; }
    form { max-width: 600px; margin: 0 auto; background: #111; padding: 20px; border-radius: 10px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    input, select, textarea { width: 100%; padding: 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; box-sizing: border-box;}
    button { width: 100%; padding: 15px; background: gold; color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>
<form id="sellForm">
  <h2>Shto orë të re</h2>
  <label>Kategoria:</label>
  <select id="category" style="width:100%;margin-bottom:15px;">
    <option value="luxury">Luxury</option>
    <option value="vintage">Vintage</option>
    <option value="parts">Parts</option>
  </select>
  <div class="row">
    <input type="text" id="brand" placeholder="Brand" required>
    <input type="text" id="model" placeholder="Model" required>
  </div>
  <label>Çmimi:</label>
  <input type="number" id="price" placeholder="Çmimi në €" style="width:100%;margin-bottom:15px;padding:10px;">
  <div class="row">
    <input type="text" id="reference" placeholder="Reference">
    <input type="text" id="material" placeholder="Material">
  </div>
  <div class="row">
    <input type="text" id="case_size" placeholder="Case Size (e.g. 41mm)">
    <input type="number" id="year" placeholder="Year">
  </div>
  <select id="movement" style="margin-bottom:15px;width:100%;padding:10px;background:#222;color:#fff;border:1px solid #444;">
    <option value="Automatic">Automatic</option>
    <option value="Manual">Manual</option>
    <option value="Quartz">Quartz</option>
  </select>
  <select id="function" style="margin-bottom:15px;width:100%;padding:10px;background:#222;color:#fff;border:1px solid #444;">
    <option value="Date">Date</option>
    <option value="Chronometer">Chronometer</option>
    <option value="Chronograph">Chronograph</option>
    <option value="Turbillon">Turbillon</option>
    <option value="No Date">No Date</option>
  </select>
  <div class="row" style="margin-top:15px">
    <label><input type="checkbox" id="service"> Service kryer</label>
    <label><input type="checkbox" id="box_papers"> Box / Papers</label>
  </div>
  <textarea id="description" placeholder="Description..." rows="4" style="width:100%;padding:10px;background:#222;color:#fff;border:1px solid #444;border-radius:5px;box-sizing:border-box;"></textarea>
  <div style="margin-top:15px">
    <label style="color:#aaa;font-size:14px;">Ngarko Foton e Orës:</label>
    <input type="file" id="fileInput" name="images[]" accept="image/*" multiple style="margin-top:5px;">
  </div>
  <button type="submit">Shto orën</button>
</form>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const supabase = createClient(
    'https://gnwsrmelmeqduhhmfmoa.supabase.co',
    'sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9'
  );

  const form = document.getElementById('sellForm');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Kontrollo sesionin para se të fillosh
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) {
      alert("Duhet të jesh i loguar!");
      return;
    }

    // Butoni Loading
    const btn = form.querySelector('button');
    btn.disabled = true;
    btn.innerText = "Duke ngarkuar...";

    try {
      // 1. NGARKIMI I FOTOVE
      const files = document.getElementById('fileInput').files;
      let imageUrls = [];

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const fileName = ${user.id}/${Date.now()}_${i}_${file.name}; // Strukturë më e mirë në storage

        const { error: uploadError } = await supabase.storage
          .from('or-images')
          .upload(fileName, file);

        if (uploadError) throw uploadError;

        const { data: urlData } = supabase.storage
          .from('or-images')
          .getPublicUrl(fileName);
          
        imageUrls.push(urlData.publicUrl);
      }

      // 2. MARRJA E TË GJITHA OPSIONEVE DHE VLERAVE
      const oraData = {
        user_id: user.id,
        category: document.getElementById('category').value,
        brand: document.getElementById('brand').value.trim(),
        model: document.getElementById('model').value.trim(),
        price: parseFloat(document.getElementById('price').value) || 0,
        reference: document.getElementById('reference').value.trim(),
        material: document.getElementById('material').value.trim(),
        case_size: document.getElementById('case_size').value.trim(),
        year: parseInt(document.getElementById('year').value) || null,
        movement: document.getElementById('movement').value, // Merr vlerën e zgjedhur nga select
        function: document.getElementById('function').value, // Merr vlerën e zgjedhur nga select
        service: document.getElementById('service').checked, // Kthen true ose false
        box_papers: document.getElementById('box_papers').checked, // Kthen true ose false
        description: document.getElementById('description').value.trim(),
        image_url: imageUrls // Array me linkat e fotove
      };

      // 3. DËRGIMI NË SUPABASE
      const { error: dbError } = await supabase
        .from('oras')
        .insert([oraData]);

      if (dbError) throw dbError;

      alert("Ora u publikua me sukses!");
      window.location.href = 'dashboard.html';

    } catch (err) {
      console.error(err);
      alert("Gabim: " + err.message);
      btn.disabled = false;
      btn.innerText = "Shto orën";
    }
  });
</script>
</body>
</html>
