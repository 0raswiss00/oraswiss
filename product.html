<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Detajet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="container">Duke ngarkuar...</div>

    <script>
        // Përdorim 'var' dhe një kontroll që të mos prishet nëse është deklaruar diku tjetër
        if (typeof window.supabaseClient === 'undefined') {
            window.supabaseClient = window.supabase.createClient(
                "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ"
            );
        }
        var supabase = window.supabaseClient;

        async function loadProduct() {
            const id = new URLSearchParams(window.location.search).get('id');
            const container = document.getElementById("container");

            if (!id) {
                container.innerHTML = "Asnjë ID u gjet.";
                return;
            }

// ... brenda funksionit loadProduct() ...
try {
    const { data, error } = await supabase.from('oras').select('*').eq('id', id).single();
    if (error) throw error;

    // Ndërtimi i URL-së duke përdorur bucket-in e saktë "or-images"
    const imageUrl = data.image ? https://gnwsrmelmeqduhhmfmoa.supabase.co/storage/v1/object/public/or-images/${data.image} : '';

    container.innerHTML = `
        <div style="border:1px solid #333; padding:20px; max-width:500px; margin:auto;">
            ${imageUrl ? <img src="${imageUrl}" style="width:100%; height:auto; margin-bottom:15px;" alt="Ora"> : '<p>Nuk ka imazh.</p>'}
            
            <h1>${data.brand} ${data.model}</h1>
            <p><strong>Çmimi:</strong> ${data.price} €</p>
            <p><strong>Ref:</strong> ${data.reference || 'Nuk ka'}</p>
            
            <a href="https://wa.me/35569XXXXXXX?text=Dua të blej: ${data.brand} ${data.model}" 
               style="background:#25D366; color:white; padding:10px; display:block; text-align:center; text-decoration:none; border-radius:5px;">
               POROSIT NE WHATSAPP
            </a>
        </div>
    `;
} catch (err) {
    container.innerHTML = "Gabim gjatë ngarkimit: " + err.message;
}
        loadProduct();
    </script>
</body>
</html>
