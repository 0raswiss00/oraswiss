<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Vintage</title>
    <style>
        body { font-family: sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
        .nav-bar { display: flex; gap: 15px; margin-bottom: 20px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="luxury.html" id="count-luxury">Luxury 0</a>
        <a href="vintage.html" id="count-vintage">Vintage 0</a>
        <a href="parts.html" id="count-parts">Parts 0</a>
    </div>

    <h1>Vintage Collection</h1>
    <div id="oras-container" class="grid">Duke ngarkuar...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient(
            'https://gnwsrmelmeqduhhmfmoa.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ'
        );

        async function init() {
            const container = document.getElementById('oras-container');
            const { data, error } = await supabase.from('oras').select('*');

            if (error) {
                container.innerHTML = "Gabim: " + error.message;
                return;
            }

            // Përditëso numrat
            document.getElementById('count-luxury').innerText = Luxury ${data.filter(i => i.category === 'luxury').length};
            document.getElementById('count-vintage').innerText = Vintage ${data.filter(i => i.category === 'vintage').length};
            document.getElementById('count-parts').innerText = Parts ${data.filter(i => i.category === 'parts').length};

            // Shfaq orët
            const filtered = data.filter(i => i.category === 'vintage');
            container.innerHTML = filtered.length ? "" : "Nuk ka artikuj.";
            
            filtered.forEach(ora => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <img src="${ora.image_url || ''}" style="width:100%">
                    <h3>${ora.brand}</h3>
                    <p>${ora.price ? ora.price + ' €' : 'Kontakto'}</p>
                `;
                container.appendChild(div);
            });
        }
        init();
    </script>
</body>
</html>
