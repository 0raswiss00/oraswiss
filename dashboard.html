<html lang="sq">

<body>
    <h1>Orët e mia</h1>
    <ul id="myWatchesList"></ul>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const supabase = createClient(
    'https://xyunmtvysqwonelecudf.supabase.co',
    'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx'
  );

data.forEach(watch => {
    const li = document.createElement("li");
    // Linku tani çon te detaje.html, jo te sellnow
    li.innerHTML = `
        <a href="detaje.html?id=${watch.id}">${watch.name}</a>
    `;
    lista.appendChild(li);

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const supabase = createClient('URL_YT', 'KEY_YT');
const id = new URLSearchParams(window.location.search).get('id');

async function ngarkoDetajet() {
    const { data } = await supabase.from('watches').select('*').eq('id', id).single();
    if (data) {
        document.getElementById('watch-name').textContent = data.name;
    }
}

window.fshiProdukton = async () => {
    if(confirm("Dëshiron ta fshish?")) {
        await supabase.from('watches').delete().eq('id', id);
        window.location.href = 'dashboard.html';
    }
};

window.shkoTeModifikimi = () => {
    window.location.href = sellnow.html?id=${id};
};

ngarkoDetajet();

    
  async function ngarkoArtikujt() {
    try {
      const { data, error } = await supabase.from('watches').select('*');
      if (error) throw error;

      const lista = document.getElementById("myWatchesList");
      if (!lista) return;
      
      lista.innerHTML = ""; // Pastro listën

      if (!data || data.length === 0) {
        lista.innerHTML = "<li>Nuk ka orë për momentin.</li>";
      } else {
        data.forEach(watch => {
          const li = document.createElement("li");
          
          // Ky është blloku HTML i pastër
          li.innerHTML = `
            <span>${watch.name}</span>
            <button onclick="window.location.href='sellnow.html?id=${watch.id}'">Modifiko</button>
            <button onclick="fshiOren('${watch.id}')" style="color:red">Fshi</button>
          `;
          lista.appendChild(li);
        });
      }
    } catch (err) {
      console.error("Gabim:", err);
    }
  }

  // Funksioni për fshirje
  window.fshiOren = async (id) => {
    if (confirm("Je i sigurt që do ta fshish?")) {
      await supabase.from('watches').delete().eq('id', id);
      location.reload();
    }
  };

  ngarkoArtikujt();
</script>
</body>
</html>
