<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shto orë</title>

  <style>
    body{font-family:Arial;background:#0b0b0b;color:#fff;margin:0;padding:20px}
    .wrap{max-width:900px;margin:0 auto}
    label{display:block;margin-top:10px}
    input,select,textarea{width:100%;padding:10px;margin-top:5px;background:#111;color:#fff;border:1px solid #333;border-radius:8px}
    button{margin-top:10px;padding:12px;border-radius:8px;border:0;cursor:pointer}
    button:hover{opacity:.9}
    #preview img{width:100px;margin:5px;border-radius:6px}
    .logo-center{display:flex;justify-content:center;margin:10px 0 20px}
    .logo-center img{height:120px}
    .btn{background:#222;color:#fff}
    .btn-primary{background:#25D366;color:#000;font-weight:bold}
  </style>
</head>

<body>

<div class="wrap">

  <div class="logo-center">
    <img src="images/oraswiss-logo.png">
  </div>

  <h2>Shto orë (Sell now)</h2>

  <div id="msg"></div>

  <label>Category</label>
  <select id="category">
    <option value="luxury">Luxury</option>
    <option value="vintage">Vintage</option>
    <option value="parts">Parts</option>
  </select>

  <label>Brand</label>
  <input id="brand">

  <label>Model</label>
  <input id="model">

  <label>Price (€)</label>
  <input id="price" type="number">

  <label>Description</label>
  <textarea id="description"></textarea>

  <label>Photos</label>
  <button id="chooseBtn" class="btn">Choose Photos</button>
  <input type="file" id="photoFiles" multiple accept="image/*" hidden>

  <div id="preview"></div>

  <button type="button" id="chooseBtn" class="btn">Choose Photos</button>
  <button type="button" id="uploadBtn" class="btn">Upload Photos</button>
  <button type="button" id="publishBtn" class="btn-primary">PUBLISH</button>


</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-storage.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyACmJj1OGz1gfRUjxz-w3_k94tNBfNyvVg",
  authDomain: "oraswiss-27e57.firebaseapp.com",
  projectId: "oraswiss-27e57",
  storageBucket: "oraswiss-27e57.firebasestorage.app",
  messagingSenderId: "596627676936",
  appId: "1:596627676936:web:0c96cf820fef4e979616bd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

setPersistence(auth, browserLocalPersistence);

/* STATE */
let currentUser = null;
let uploadedUrls = [];

/* ELEMENTS */
const chooseBtn = document.getElementById("chooseBtn");
const fileInput = document.getElementById("photoFiles");
const uploadBtn = document.getElementById("uploadBtn");
const publishBtn = document.getElementById("publishBtn");
const preview = document.getElementById("preview");
const msg = document.getElementById("msg");

/* MSG */
function setMsg(text){
  msg.textContent = text;
}

/* AUTH (ONLY ONCE) */
onAuthStateChanged(auth, (user) => {
  currentUser = user;

  if (user) {
    setMsg("✅ Logged in: " + (user.email || user.uid));
    uploadBtn.disabled = false;
    publishBtn.disabled = false;
  } else {
    setMsg("❌ Duhet login");
    uploadBtn.disabled = true;
    publishBtn.disabled = true;
  }
});

/* OPEN FILE PICKER */
chooseBtn.addEventListener("click", () => {
  fileInput.click();
});

/* PREVIEW */
fileInput.addEventListener("change", () => {
  preview.innerHTML = "";

  Array.from(fileInput.files).forEach(file => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });

  setMsg("📸 Foto u zgjodh");
});

/* UPLOAD PHOTOS */
async function uploadPhotos(files){
  const urls = [];

  for (let file of files) {
    const storageRef = ref(storage, "watches/" + Date.now() + "-" + file.name);
    const snap = await uploadBytes(storageRef, file);
    const url = await getDownloadURL(snap.ref);
    urls.push(url);
  }

  return urls;
}

/* UPLOAD BUTTON */
uploadBtn.onclick = async () => {
  if (!fileInput.files.length) return alert("Zgjidh foto");

  uploadedUrls = await uploadPhotos(fileInput.files);
  alert("✅ Uploaded");
};

/* PUBLISH */
publishBtn.onclick = async () => {
  try {
    if (!currentUser) throw new Error("Nuk je i loguar");
    if (!uploadedUrls.length) throw new Error("Ngarko fotot më parë");

    await addDoc(collection(db, "watches"), {
      brand: document.getElementById("brand").value,
      model: document.getElementById("model").value,
      price: Number(document.getElementById("price").value),
      description: document.getElementById("description").value,
      category: document.getElementById("category").value,
      images: uploadedUrls,
      user_id: currentUser.uid,
      status: "pending",
      created_at: serverTimestamp()
    });

    alert("✅ U publikua!");

    uploadedUrls = [];
    preview.innerHTML = "";
    fileInput.value = "";

  } catch (e) {
    alert("❌ " + e.message);
  }
};
</script>

</body>
</html>
