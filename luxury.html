<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Luxury Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <style>
        /* Shto këtu CSS-në që kishe te image.png */
        .products-section { max-width: 1100px; margin: 40px auto; padding: 0 16px; }
        .product { background: #fff; border-radius: 12px; margin-bottom: 40px; padding: 16px; box-shadow: 0 0 12px rgba(0,0,0,0.08); }
        .product-box { display: flex; flex-wrap: wrap; gap: 16px; }
        .product-main-image { width: 100%; max-width: 380px; border-radius: 8px; }
        .thumb { width: 60px; height: 60px; cursor: pointer; object-fit: cover; }
    </style>
</head>
<body>

<div id="header"></div>
<input type="text" id="searchBar" placeholder="Search by brand or model..." onkeyup="searchProducts()">

<main class="products-section" id="products-container">
    <!-- Këtu do të ngarkohen produktet -->
</main>

<script>
    // Vendos URL-në tënde brenda thonjëzave të para dhe KEY-në tek të dytat
const supabase = window.supabase.createClient(
    "https://tua_projekti.supabase.co", 
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." 
);


    async function loadProducts() {
        const { data, error } = await supabase.from('oras').select('*').eq('category', 'luxury');
        if (error) { console.error(error); return; }

        const container = document.getElementById('products-container');
        container.innerHTML = data.map(ora => `
            <article class="product" id="${ora.id}">
                <div class="product-box">
                    <div class="product-left">
                        <img class="product-main-image" src="${ora.image_url}" alt="${ora.model}">
                    </div>
                    <div class="product-right">
                        <h3>Request this watch</h3>
                        <form action="https://api.web3forms.com/submit" method="POST">
                            <input type="hidden" name="access_key" value="4ecbdce6-d462-4e39-b39d-8c11e0095f46">
                            <input type="hidden" name="Product" value="${ora.brand} ${ora.model}">
                            <input type="text" name="Full Name" placeholder="Full Name" required>
                            <input type="email" name="Email" placeholder="Email" required>
                            <button type="submit">Send Request</button>
                        </form>
                        <div class="buy-row" data-ref="${ora.id}">
                            <a href="${ora.paypal_link}" class="buy-btn" target="_blank">Buy Now</a>
                            <a href="https://wa.me/355692408065" class="whatsapp-btn">WhatsApp</a>
                            <button class="like-btn" data-id="${ora.id}">♥️ Like</button>
                        </div>
                    </div>
                    <div class="product-info">
                        <h3>${ora.brand} - ${ora.model}</h3>
                        <p><strong>Reference:</strong> ${ora.reference}</p>
                        <p><strong>Price:</strong> €${ora.price}</p>
                    </div>
                </div>
            </article>
        `).join('');

        initFeatures();
    }

    function initFeatures() {
        // Funksioni i Kërkimit
        window.searchProducts = function() {
            const val = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('.product').forEach(p => {
                p.style.display = p.innerText.toLowerCase().includes(val) ? '' : 'none';
            });
        };

        // Funksioni Like (LocalStorage)
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                alert('U ruajt te Favorites ❤️');
            });
        });
    }

    loadProducts();
</script>

</body>
</html>
