    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const client = supabase.createClient("https://gnwsrmelmeqduhhmfmoa.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ");

        async function loadProduct() {
            const id = new URLSearchParams(window.location.search).get('id');
            const { data, error } = await client.from('oras').select('*').eq('id', id).single();

            if (error || !data) {
                document.getElementById('product-container').innerHTML = "Artikulli nuk u gjet.";
                return;
            }

            const imgUrl = https://gnwsrmelmeqduhhmfmoa.supabase.co/storage/v1/object/public/or-images/${data.image};
            
            document.getElementById('product-container').innerHTML = `
                <img src="${imgUrl}" style="width:300px;">
                <h1>${data.brand} ${data.model}</h1>
                <p>Kategoria: ${data.category}</p>
                <p>Çmimi: ${data.price} €</p>
                <p>Ref: ${data.reference}</p>
                <a href="${data.paypal_link || '#'}">Bli Tani</a>
            `;
        }
        loadProduct();
    </script>
