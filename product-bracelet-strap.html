<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bracelet / Strap Details</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#050505;
    color:white;
    font-family:Arial,sans-serif;
    padding-bottom:90px;
}


.product-page{
    width:100%;
    min-height:100vh;
}


.gallery{
    position:relative;
    width:100%;
    height:55vh;
    background:#000;
    overflow:hidden;
}


.gallery img{
    width:100%;
    height:100%;
    object-fit:contain;
}


.photo-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(255,255,255,.15);
    border:none;
    color:white;
    font-size:35px;
    width:45px;
    height:60px;
    border-radius:10px;
    cursor:pointer;
}


.photo-left{
    left:15px;
}


.photo-right{
    right:15px;
}


.photo-counter{
    position:absolute;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,.6);
    padding:7px 15px;
    border-radius:20px;
}


.details{
    padding:20px;
    max-width:900px;
    margin:auto;
}


.brand{
    font-size:18px;
    color:#aaa;
}


.model{
    font-size:30px;
    margin:5px 0;
}


.price{
    font-size:28px;
    color:#25D366;
    font-weight:bold;
    margin:15px 0;
}


.info-box{
    background:#111;
    border-radius:15px;
    padding:15px;
    margin:15px;
}


.info-row{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #222;
}


.top-actions{
    display:flex;
    gap:10px;
    margin:15px;
}


.action{
    background:#151515;
    padding:12px 18px;
    border-radius:25px;
    cursor:pointer;
}



.buy-bar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#090909;
    border-top:1px solid #333;
    padding:10px;
    display:flex;
    gap:8px;
    z-index:999;
}


.buy-btn{
    flex:1;
    padding:15px;
    border-radius:10px;
    text-align:center;
    text-decoration:none;
    font-weight:bold;
    cursor:pointer;
}


.whatsapp{
    background:#25D366;
    color:white;
}


.offer{
    background:#333;
    color:white;
}


.buy{
    background:#ffd900;
    color:black;
}


</style>

</head>


<body>


<div class="product-page">


<div class="gallery">

<button class="photo-btn photo-left" onclick="changeImage(-1)">
❮
</button>


<img id="main-photo" src="">


<button class="photo-btn photo-right" onclick="changeImage(1)">
❯
</button>


<div class="photo-counter" id="photo-count">
1 / 1
</div>


</div>

<div class="details">

    <div class="brand" id="top-brand">
        -
    </div>

    <div class="model" id="top-model">
        -
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div class="price" id="top-price">-</div>

        <div id="seller-country" style="
            background:#111;
            padding:8px 12px;
            border-radius:20px;
            font-size:14px;
        ">
            🌍 -
        </div>
    </div>

</div>

<div class="top-actions">

<div class="action" onclick="shareProduct()">
🔗 Share
</div>


<div class="action">
❤️ Favorite
</div>


</div>
<div class="info-box">

<h3>Bracelet / Strap Details</h3>


<div class="info-row">
<span>Brand</span>
<span id="brand">-</span>
</div>

<div class="info-row">
<span>Model</span>
<span id="model">-</span>
</div>

    
<div class="info-row">
<span>Reference</span>
<span id="reference">-</span>
</div>


<div class="info-row">
<span>Year</span>
<span id="year">-</span>
</div>


<div class="info-row">
<span>Price</span>
<span id="price">-</span>
</div>    

    
<div class="info-row">
<span>Type</span>
<span id="type">-</span>
</div>


<div class="info-row">
<span>Condition</span>
<span id="condition">-</span>
</div>


<div class="info-row">
<span>Material</span>
<span id="material">-</span>
</div>


<div class="info-row">
<span>Gold Purity</span>
<span id="gold_purity">-</span>
</div>


<div class="info-row">
<span>Color</span>
<span id="color">-</span>
</div>


<div class="info-row">
<span>Lug Width</span>
<span id="lug_width">-</span>
</div>


<div class="info-row">
<span>Clasp Width</span>
<span id="clasp_width">-</span>
</div>


<div class="info-row">
<span>Length</span>
<span id="length">-</span>
</div>


<div class="info-row">
<span>Thickness</span>
<span id="thickness">-</span>
</div>


</div>



<div class="info-box">

<h3>Description</h3>

<p id="description">
Loading...
</p>


</div>



<div class="buy-bar">

<a class="buy-btn whatsapp" id="whatsapp">
💬 WhatsApp
</a>

<button class="buy-btn offer" id="offer" type="button">💰 Suggest Price</button>

<button class="buy-btn buy" id="buy" type="button">🛒 BUY</button>

</div>





<script>
const supabaseClient = window.supabase.createClient(
    "https://gnwsrmelmeqduhhmfmoa.supabase.co",
    "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"
);

let currentImages = [];
let currentImgIndex = 0;
let productData = null;
    
const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get("id");

if (productId) {
    loadProduct(productId);
} else {
    console.error("ID mungon!");
}

async function loadProduct(idToLoad) {
    const {data, error} = await supabaseClient
        .from("bracelets_straps")
        .select("*")
        .eq("id", idToLoad)
        .single();

    if (error || !data) {
        console.error("Gabim nga Supabase:", error);
        return;
    }
    
    console.log("Produkti u gjet:", data);
    productData = data;
    
    // Mbushja e fushave sipër
    document.getElementById("top-brand").innerText = data.brand || "N/A";
    document.getElementById("top-model").innerText = data.model || "N/A";
    document.getElementById("top-price").innerText = (data.price || 0) + " €";
    // Merr vendin e shitësit
    const { data: seller } = await supabaseClient
        .from("profiles")
        .select("country")
        .eq("id", data.user_id)
        .single();

    if (seller && seller.country) {
        const countries = {
            "Albania": "🇦🇱 Albania",
            "Switzerland": "🇨🇭 Switzerland",
            "Italy": "🇮🇹 Italy",
            "Germany": "🇩🇪 Germany"
        };

        document.getElementById("seller-country").innerText =
            countries[seller.country] || seller.country;
    }
    
    // Mbushja e fushave në tabelën e detajeve
    document.getElementById("brand").innerText = data.brand || "N/A";
    document.getElementById("model").innerText = data.model || "N/A";
    document.getElementById("reference").innerText = data.reference || "N/A";
    document.getElementById("year").innerText = data.year || "N/A";
    document.getElementById("price").innerText = (data.price || 0) + " €";
    document.getElementById("type").innerText = data.type || "N/A";
    document.getElementById("condition").innerText = data.condition || "N/A";
    document.getElementById("material").innerText = data.material || "N/A";
    document.getElementById("gold_purity").innerText = data.gold_purity || "N/A";
    document.getElementById("color").innerText = data.color || "N/A";
    document.getElementById("lug_width").innerText = data.lug_width || "N/A";
    document.getElementById("clasp_width").innerText = data.clasp_width || "N/A";
    document.getElementById("length").innerText = data.length || "N/A";
    document.getElementById("thickness").innerText = data.thickness || "N/A";
    document.getElementById("description").innerText = data.description || "N/A";

    // Përditëso linkun e WhatsApp
    document.getElementById("whatsapp").href = 
        "https://wa.me/35569XXXXXXX?text=" + 
        encodeURIComponent("I am interested in " + data.brand + " " + data.model);

    // Përditëso fotot (duke marrë parasysh që image_url është array text[])
    currentImages = Array.isArray(data.image_url) ? data.image_url : (data.image_url ? [data.image_url] : []);
    updateGallery();
}

// Butoni Offer
document.getElementById("offer").onclick = function() {
    if (!productData) return;
    let msg = "Hello, I would like to suggest a price for " + productData.brand + " " + productData.model;
    window.open("https://wa.me/35569XXXXXXX?text=" + encodeURIComponent(msg));
};

// Butoni Buy (PayPal)
document.getElementById("buy").onclick = async function(e) {
    e.preventDefault();
    if (!productData) return;
    
    const buyBtn = document.getElementById("buy");
    buyBtn.innerText = "⏳ Loading...";

    try {
        const response = await fetch(
            "https://gnwsrmelmeqduhhmfmoa.supabase.co/functions/v1/create-paypal-order",
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    product_id: productId,
                    price: productData.price,
                    product_name: productData.model
                })
            }
        );

        const result = await response.json();

        if (result.paypal_link) {
            window.location.href = result.paypal_link;
        } else {
            alert("Gabim: Linku i pagesës nuk u gjenerua.");
            buyBtn.innerText = "🛒 BUY";
        }
    } catch(error) {
        console.error(error);
        alert("Gabim me lidhjen me PayPal.");
        buyBtn.innerText = "🛒 BUY";
    }
};

function updateGallery() {
    if (currentImages.length === 0) return;

    document.getElementById("main-photo").src = currentImages[currentImgIndex];
    document.getElementById("photo-count").innerText = (currentImgIndex + 1) + " / " + currentImages.length;
}

function changeImage(direction) {
    if (currentImages.length === 0) return;

    currentImgIndex += direction;

    if (currentImgIndex >= currentImages.length) {
        currentImgIndex = 0;
    }
    if (currentImgIndex < 0) {
        currentImgIndex = currentImages.length - 1;
    }

    updateGallery();
}

function shareProduct() {
    navigator.clipboard.writeText(window.location.href);
    alert("Link copied");
}
</script>


</body>

</html>
