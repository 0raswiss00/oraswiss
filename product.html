<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="product-details">Duke kërkuar produktin...</div>

    <script>
        const supabase = supabase.createClient('URL_JOTE_KETU', 'KEY_JOTE_KETU');

        async function loadProduct() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const container = document.getElementById('product-details');

            if (!id) {
                container.innerText = "Nuk u gjet ID në URL!";
                return;
            }

            // Këtu po e kërkojmë orën me ID-në që vjen nga URL-ja
            const { data, error } = await supabase
                .from('oras')
                .select('*')
                .eq('id', id)
                .single(); // .single() merr vetëm një rresht

            if (error) {
                container.innerText = "Gabim Supabase: " + error.message;
            } else if (data) {
                container.innerHTML = `
                    <h1>${data.brand}</h1>
                    <p>Modeli: ${data.model}</p>
                    <p>Çmimi: ${data.price} €</p>
                `;
            } else {
                container.innerText = "Produkti me këtë ID nuk ekziston.";
            }
        }

        loadProduct();
    </script>
</body>
</html>
