 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // Kjo pjesë do të na tregojë nëse Supabase po ngarkohet
  console.log("Supabase libraria:", window.supabase);

  const supabase = window.supabase.createClient(
    "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
    "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"
  );

  async function loadData() {
    console.log("Duke u lidhur me Supabase...");
    const { data, error } = await supabase.from('oras').select('*').eq('category', 'luxury');
    
    if (error) {
      console.error("GABIM SUPABASE:", error);
      return;
    }
    console.log("TE DHENAT:", data);
  }

  loadData();
</script>
