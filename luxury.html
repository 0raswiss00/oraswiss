<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <title>Luxury - Ora Swiss</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
    /* Stili për butonat si te image_19.png */
    .nav-filters { margin-bottom: 30px; }
    .nav-filters a { background: #2a2a8e; color: #fff; padding: 8px 15px; border-radius: 20px; text-decoration: none; margin-right: 10px; font-weight: bold; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
    .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
    .price { color: #25D366; font-weight: bold; margin-top: 10px; font-size: 1.2em; }
  </style>
</head>
<body>

  <!-- Butonat e navigimit -->
  <div class="nav-filters">
    <a href="luxury.html">Luxury 3</a>
    <a href="vintage.html">Vintage 2</a>
    <a href="parts.html">Parts 1</a>
  </div>

  <h1>Luxury Collection</h1>
  <div id="oras-container" class="grid">Duke ngarkuar koleksionin...</div>

  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Inicializimi unik
  const client = supabase.createClient(
    "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ"
  );

  async function init() {
    const container = document.getElementById('oras-container');
    // NDYSHO VETËM KËTË PËR ÇDO FAQE (luxury, vintage, parts)
    const kategoria = 'luxury'; 

    const { data, error } = await client.from('oras').select('*').eq('category', kategoria);
    
    if (error) { console.error("Gabim:", error); return; }
    
    if (data.length === 0) {
        container.innerHTML = "Asnjë produkt për kategorinë " + kategoria;
        return;
    }

    container.innerHTML = data.map(item => `
      <div class="card">
        <img src="https://gnwsrmelmeqduhhmfmoa.supabase.co/storage/v1/object/public/or-images/${item.image}" style="width:100px;">
        <h3>${item.brand}</h3>
        <p>${item.price} €</p>
        <a href="product.html?id=${item.id}">Shiko Detajet</a>
      </div>
    `).join('');
  }
  
  init();
</script>
  
</body>
</html>
