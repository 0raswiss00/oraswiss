<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>myOraSwiss - Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: #000; color: #fff; padding: 20px; }
        .profile-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .dashboard-menu { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .menu-item { background: #111; padding: 15px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .menu-item:hover { background: #222; }
        .btn-sell { background: gold; color: #000; font-weight: bold; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 20px; }
        #myWatchesList { list-style: none; padding: 0; }
        .watch-card { background: #111; margin-bottom: 10px; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 15px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <h2>Ardian Cela</h2>
        <a href="profile.html" style="color: gold; text-decoration: none;">To your profile</a>
    </div>

    <button class="btn-sell" onclick="window.location.href='sellnow.html'">+ Sell Now</button>

    <!-- Menuja e stilit Chrono24 -->
    <div class="dashboard-menu">
        <div class="menu-item" onclick="location.href='buy.html'"><span>🛒 Buy</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='messages.html'"><span>✉️ Messages</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='settings.html'"><span>⚙️ Account Settings</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='support.html'"><span>🎧 Support</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='info.html'"><span>ℹ️ Info</span> <span>></span></div>
    </div>

    <div id="mainDashboard">
        <button onclick="shfaqArtikujt()" class="btn-sell">Artikujt e mi në shitje</button>
        </div>

    <div id="mainDashboard">
        <button onclick="window.shfaqArtikujt()" class="btn-sell">Artikujt e mi në shitje</button>
    </div>

    <div id="myWatchesContainer" style="display: none;">
        <button onclick="window.kthehuPas()" class="btn-back">← Kthehu mbrapa</button>
        <ul id="myWatchesList"></ul>
    </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const supabase = createClient(
    'https://gnwsrmelmeqduhhmfmoa.supabase.co',
    'sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9'
  );

  window.shfaqArtikujt = async function() {
      const lista = document.getElementById("myWatchesList");
      document.getElementById('myWatchesContainer').style.display = 'block';
      lista.innerHTML = "Po ngarkohen...";

      const { data, error } = await supabase.from('oras').select('*');

      if (error) { lista.innerHTML = "Gabim: " + error.message; return; }

      lista.innerHTML = "";
      data.forEach(watch => {
          const li = document.createElement("li");
          li.innerHTML = <div>${watch.brand} ${watch.model} - ${watch.price} €</div>;
          li.onclick = () => window.location.href = product.html?id=${watch.id};
          lista.appendChild(li);
      });
  };

  window.kthehuPas = function() {
      document.getElementById('myWatchesContainer').style.display = 'none';
  };
</script>
</body>
</html>
