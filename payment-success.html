<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<title>Pagesa u krye</title>
</head>

<body>

<h2>Po kontrollohet pagesa...</h2>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
<script src="db-connect.js"></script>

<script>

async function finishPayment(){

    const params = new URLSearchParams(window.location.search);

    const orderId = params.get("token");


    if(!orderId){
        document.body.innerHTML = "Nuk u gjet PayPal Order ID";
        return;
    }


    const { data } = await window.supabaseClient.auth.getUser();

    if(!data.user){
        document.body.innerHTML = "Duhet të jesh i loguar.";
        return;
    }


    const productId = localStorage.getItem("buy_product_id");


    const response = await fetch(
        "https://gnwsrmelmeqduhhmfmoa.supabase.co/functions/v1/capture-paypal-order",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                order_id: orderId,
                product_id: productId,
                buyer_id: data.user.id
            })
        }
    );


    const result = await response.json();

   console.log("CAPTURE RESPONSE:", result);
   console.log("STATUS:", response.status);

  
    if(result.success){

        document.body.innerHTML =
        "<h2>Pagesa u krye me sukses ✅</h2>";

        localStorage.removeItem("buy_product_id");

    } else {

        document.body.innerHTML =
        "Gabim: " + JSON.stringify(result)

    }

}


finishPayment();

</script>

</body>
</html>
