<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Detajet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="container">Duke ngarkuar...</div>

    <script>
        // Kjo është e vetmja deklaratë e supabase. 
        // Nëse ke një tjetër "const supabase = ..." diku tjetër, fshije!
        const supabase = window.supabase.createClient(
            "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ"
        );

        async function init() {
            const id = new URLSearchParams(window.location.search).get('id');
            const container = document.getElementById("container");

            if (!id) {
                container.innerHTML = "Produkti nuk u gjet.";
                return;
            }

            try {
                const { data, error } = await supabase.from('oras').select('*').eq('id', id).single();
                if (error) throw error;

                // Këtu shfaqen të dhënat me emrat e kolonave që më dhe:
                container.innerHTML = `
                    <div style="max-width:500px; margin:auto; border:1px solid #333; padding:20px;">
                        <h1>${data.brand} ${data.model}</h1>
                        <p><strong>Referenca:</strong> ${data.reference}</p>
                        <p><strong>Çmimi:</strong> ${data.price} €</p>
                        <p><strong>Përshkrimi:</strong> ${data.description}</p>
                        <a href="https://wa.me/35569XXXXXXX?text=Dua te blej: ${data.brand}" 
                           style="background:#25D366; color:white; padding:10px; display:block; text-align:center;">
                           POROSIT NE WHATSAPP
                        </a>
                    </div>
                `;
            } catch (err) {
                container.innerHTML = "GABIM: " + err.message;
            }
        }
        init();
    </script>
</body>
</html>
