window.sellWatch = async function(watchId) {
    const confirmSell = confirm("A je i sigurt që do ta shesësh këtë orë?");
    if (!confirmSell) return;

    // Kjo pjesë bën përditësimin në Supabase
    const { error } = await supabase
        .from('watches')
        .update({ status: 'sold' }) // Sigurohu që ke një kolonë 'status'
        .eq('id', watchId);

    if (error) {
        alert("Gabim: " + error.message);
    } else {
        alert("Ora u shit me sukses!");
        location.reload(); // Rifreskon faqen për të parë ndryshimin

};
