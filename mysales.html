<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>My Sales - Ora Swiss</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
        .list-container { max-width: 800px; margin: auto; }
        .sale-item { background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        button { cursor: pointer; padding: 8px 12px; }
    </style>
</head>
<body>

<div class="list-container">
    <h1>Artikujt e mi në shitje</h1>
    <div id="salesList">Duke ngarkuar...</div>
</div>

<script>
    // Ndryshojmë emrin nga 'supabase' në 'myOraSwissClient' 
    // për të mos pasur konflikt me asnjë skript tjetër që mund të kesh në faqe
    const myOraSwissClient = window.supabase.createClient(
        "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
        "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"
    );

    async function loadMySales() {
        const salesList = document.getElementById("salesList");
        
        // Përdorim emrin e ri 'myOraSwissClient'
        const { data: { user } } = await myOraSwissClient.auth.getUser();
        
        if (!user) {
            salesList.innerHTML = "Ju lutem logohuni.";
            return;
        }

        const { data, error } = await myOraSwissClient
            .from('oras')
            .select('*')
            .eq('user_id', user.id);

        if (error) {
            salesList.innerHTML = "Gabim: " + error.message;
            return;
        }

        if (!data || data.length === 0) {
            salesList.innerHTML = "Nuk keni asnjë artikull në shitje.";
            return;
        }

        salesList.innerHTML = data.map(item => `
            <div>
                <strong>${item.brand} ${item.model}</strong>
                <button onclick="window.location.href='detajet.html?id=${item.id}'">Shiko</button>
                <button onclick="window.location.href='edit.html?id=${item.id}'">Modifiko</button>
            </div>
        `).join('');
    }

    loadMySales();
</script>

</body>
</html>
