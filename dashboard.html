<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { font-family: Arial; background: #000; color: #fff; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-sell { background: gold; color: #000; font-weight: bold; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        ul { list-style: none; padding: 0; }
        li { background: #111; margin: 10px 0; padding: 15px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        li:hover { background: #222; }
        .watch-name { font-weight: bold; font-size: 16px; }
        .watch-price { color: gold; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>Orët e mia</h1>
        <button class="btn-sell" onclick="window.location.href='sellnow.html'">+ Sell Now</button>
    </div>

    <ul id="myWatchesList"></ul>
    <a href="index.html"
       style="color:#ccc; text-align:center; display:block; margin-top:10px;">
       ← Back to Home
    </a>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const supabaseAuth = createClient(
    'https://xyunmtvysqwonelecudf.supabase.co',
    'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx'
  );

  const supabaseOras = createClient(
    'https://gnwsrmelmeqduhhmfmoa.supabase.co',
    'sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9'
  );

async function ngarkoArtikujt() {
    const lista = document.getElementById("myWatchesList");
    
    // Merr sesionin
    const { data: { session } } = await supabaseAuth.auth.getSession();

    if (!session) {
        lista.innerHTML = "<li>Duhet të jeni të loguar për të parë orët tuaja.</li>";
        return;
    }

    try {
        const { data, error } = await supabaseOras
            .from('oras')
            .select('*')
            .eq('user_id', session.user.id);

        if (error) throw error;

        lista.innerHTML = "";

        if (!data || data.length === 0) {
            lista.innerHTML = "<li>Nuk keni asnjë orë të shtuar për shitje.</li>";
            return;
        }

        data.forEach(watch => {
            const li = document.createElement("li");
            li.style.cursor = "pointer"; // Shto këtë për t'i treguar përdoruesit që është klikueshëm
            li.onclick = () => window.location.href = product.html?id=${watch.id};
            
            // Kontroll për imazhin në rast se array është bosh
            const imgUrl = (watch.image_url && watch.image_url.length > 0) ? watch.image_url[0] : 'placeholder.jpg';
            
            li.innerHTML = `
              <img src="${imgUrl}" style="width:80px; height:80px; object-fit:cover; border-radius:6px;" />
              <div class="watch-price"><strong>${watch.price} €</strong></div>
            `;
            lista.appendChild(li);
        });
    } catch (err) {
        console.error("Gabim gjatë marrjes së të dhënave:", err.message);
        lista.innerHTML = "<li>Pati një gabim gjatë ngarkimit. Ju lutem provoni përsëri.</li>";
    }
}

  supabaseAuth.auth.onAuthStateChange(() => {
    ngarkoArtikujt();
  });

  ngarkoArtikujt();
</script>
</body>
</html>
