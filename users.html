<div style="color:white; font-family:Arial">
  <h2>Users</h2>
  <div>Totali: <b id="count">0</b> përdorues të regjistruar</div>
  <ul id="list" style="list-style:none; padding:0;"></ul>
</div>

<script>
  const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";
  
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function loadUsers() {
    const listEl = document.getElementById("list");
    const countEl = document.getElementById("count");

    try {
      // Merrni të gjithë përdoruesit e regjistruar
      const { data, error } = await supabase
        .from('users') // Emri i tabelës ku ruhen përdoruesit
        .select('*');

      if (error) {
        console.error("❌ Gabim:", error.message);
        listEl.innerHTML = `<li style="color:red;">Gabim: ${error.message}</li>`;
        return;
      }

      // Përditëso numrin total
      countEl.textContent = data.length;
      listEl.innerHTML = "";

      if (data.length === 0) {
        listEl.innerHTML = "<li style='color:#aaa;'>Ende nuk ka përdorues të regjistruar</li>";
        return;
      }

      // Shfaq çdo përdorues
      data.forEach(user => {
        const li = document.createElement("li");
        li.style.cssText = `
          padding: 15px;
          margin: 10px 0;
          background: rgba(255,255,255,0.1);
          border-left: 4px solid #FFD700;
          border-radius: 4px;
        `;
        li.innerHTML = `
          <strong>👤 ${user.full_name || user.name || "Nuk ka emër"}</strong><br>
          📧 ${user.email}<br>
          🆔 ${user.id}<br>
          📅 Regjistruar: ${new Date(user.created_at).toLocaleDateString('sq-AL')}
        `;
        listEl.appendChild(li);
      });

    } catch (err) {
      console.error("❌ Gabim:", err);
      listEl.innerHTML = "<li style='color:red;'>Gabim në koneksion</li>";
    }
  }

  // Ngarkoni përdoruesit
  loadUsers();
</script>
</body>  
</html>
