<!DOCTYPE html>
<html>
<head>
<title>Messages - Oraswiss</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
}

.header {
    background:#000;
    color:white;
    padding:15px;
    text-align:center;
}

.chat-box {
    margin:20px;
    background:white;
    border-radius:12px;
    padding:20px;
}

.message {
    padding:10px;
    background:#eee;
    border-radius:10px;
    margin-bottom:10px;
}
</style>

</head>

<body>

<div class="header">
    💬 Messages
</div>

<div class="chat-box">

    <h3 id="chatTitle">
        Select a conversation
    </h3>

    <div id="messages">
        
    </div>

    <textarea id="messageText" placeholder="Write a message..."
    style="width:100%; height:80px; margin-top:15px;"></textarea>

    <button id="sendBtn"
    style="margin-top:10px; padding:10px; width:100%;">
    Send
    </button>

</div>


<script>

const params = new URLSearchParams(window.location.search);

const sellerId = params.get("seller");


if (sellerId) {

    document.getElementById("chatTitle").innerText =
    "Chat with seller";

    console.log("SELLER ID:", sellerId);

} else {

    document.getElementById("chatTitle").innerText =
    "No conversation selected";

}

</script>

</body>
</html>
