<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Edit Product - Ora Swiss</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #111; color: #fff; padding: 20px; font-family: Arial; }
        .edit-form { max-width: 500px; margin: auto; background: #222; padding: 20px; border-radius: 10px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #333; color: white; border: none; }
        button { padding: 10px 20px; background: #f39c12; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="edit-form">
    <h2>Edit Product</h2>
    <input type="text" id="brand" placeholder="Brand">
    <input type="text" id="model" placeholder="Model">
    <input type="number" id="price" placeholder="Price">
    <textarea id="description" placeholder="Description"></textarea>
    <input type="text" id="image_url" placeholder="Image URLs (comma separated)">
    <button onclick="saveProduct()">Ruaj Ndryshimet</button>
</div>

<script>
    // 1. Deklarimi i Supabase (Vetëm një herë!)
    const supabase = window.supabase.createClient(
        "https://gnwsrmelmeqduhhmfmoa.supabase.co",
        "EYJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." // Vendos këtu API Key-në tënde të plotë
    );

    const id = new URLSearchParams(window.location.search).get('id');

    // 2. Funksioni për të ngarkuar të dhënat
    async function loadData() {
        const { data, error } = await supabase.from('oras').select('*').eq('id', id).single();
        if (data) {
            document.getElementById('brand').value = data.brand;
            document.getElementById('model').value = data.model;
            document.getElementById('price').value = data.price;
            document.getElementById('description').value = data.description;
            document.getElementById('image_url').value = Array.isArray(data.image_url) ? data.image_url.join(',') : data.image_url;
        }
    }

    // 3. Funksioni për të ruajtur ndryshimet (I pavarur jashtë loadData)
async function saveProduct(id) {
    const brand = document.getElementById("brand").value;
    const model = document.getElementById("model").value;
    const price = document.getElementById("price").value;
    const description = document.getElementById("description").value;
    
    // Merr tekstin nga inputi dhe shndërroje në array
    const imagesInput = document.getElementById("images").value;
    const imagesArray = imagesInput.split(',').map(url => url.trim());

    const { data, error } = await supabase
        .from('oras')
        .update({
            brand: brand,
            model: model,
            price: price,
            description: description,
            image_url: imagesArray // Supabase tani do ta ruajë si array
        })
        .eq('id', id);

    if (error) {
        alert("Gabim gjatë ruajtjes: " + error.message);
    } else {
        alert("Ndryshimet u ruajtën me sukses!");
        window.location.href = 'index.html';
    }
}

    // 4. Thirr loadData në fund
    loadData();
</script>

</body>
</html>
