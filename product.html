<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Product Details</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <main id="product-details">
        Duke ngarkuar detajet e orës...
    </main>

    <script>
        const supabase = window.supabase.createClient("URL_JOTE", "KEY_JOTE");

        async function loadProduct() {
            // 1. Merr ID-në nga URL (p.sh. product.html?id=1)
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                document.getElementById('product-details').innerHTML = "Ora nuk u gjet.";
                return;
            }

            // 2. Merr vetëm këtë orë nga tabela 'oras'
            const { data, error } = await supabase.from('oras').select('*').eq('id', id).single();

            if (error || !data) {
                document.getElementById('product-details').innerHTML = "Gabim gjatë ngarkimit.";
                return;
            }

            // 3. Shfaq të dhënat
            document.getElementById('product-details').innerHTML = `
                <h1>${data.brand} - ${data.model}</h1>
                <img src="${data.image_url}" style="width:300px">
                <p>Reference: ${data.reference}</p>
                <p>Price: €${data.price}</p>
                <a href="${data.paypal_link}">Buy Now</a>
            `;
        }

        loadProduct();
    </script>
</body>
</html>
