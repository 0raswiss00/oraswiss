<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Detajet e Produktit</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; }
        .product-container { border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        .price { color: green; font-size: 1.5em; font-weight: bold; }
        .button { background: #25D366; color: white; padding: 15px; text-decoration: none; display: inline-block; border-radius: 5px; margin-top: 20px; }
        img { max-width: 100%; height: auto; }
    </style>
</head>
<body>

<div id="container">Duke ngarkuar të dhënat...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabase = supabase.createClient("URL_YT", "KEY_YT");

  async function getProduct() {
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    const container = document.getElementById('oras-container');

    console.log("Duke kërkuar ID:", id); // Shiko këtë në Console (F12)

    const { data, error } = await supabase
      .from('oras')
      .select('*')
      .eq('id', id)
      .single(); // Kërkon vetëm një rresht

    if (error) {
      container.innerHTML = "Gabim databaze: " + error.message;
      return;
    }

    if (!data) {
      container.innerHTML = "Asnjë orë me këtë ID nuk u gjet në databazë.";
      return;
    }

    // Shfaq të dhënat nëse i gjeti
    container.innerHTML = `
      <h1>${data.brand}</h1>
      <p>Kutia: ${data.box_papers ? 'Po' : 'Jo'}</p>
    `;
  }

  getProduct();
</script>
</body>
</html>
