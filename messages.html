<!DOCTYPE html>
<html>
<head>
<title>Messages - Oraswiss</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
}

.header {
    background:#000;
    color:white;
    padding:15px;
    text-align:center;
}

.chat-box {
    margin:20px;
    background:white;
    border-radius:12px;
    padding:20px;
}

.message {
    padding:10px;
    background:#eee;
    border-radius:10px;
    margin-bottom:10px;
}
</style>

</head>

<body>

<div class="header">
    💬 Messages
</div>

<div class="chat-box">

    <h3 id="chatTitle">
        Select a conversation
    </h3>

    <div id="messages">
        
<div id="messages">
    
</div>

<textarea id="messageText" placeholder="Write a message..."
style="width:100%; height:80px; margin-top:15px;"></textarea>

<input type="file" id="imageFile" accept="image/*" style="margin-top:10px;">

<button id="sendBtn"
style="margin-top:10px; padding:10px; width:100%;">
Send
</button>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/+esm";

const supabaseUrl = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
const supabaseKey = "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9";

const supabase = createClient(supabaseUrl, supabaseKey);


const params = new URLSearchParams(window.location.search);

const sellerId = params.get("seller");


if (sellerId) {

    document.getElementById("chatTitle").innerText =
    "Chat with seller";

    console.log("SELLER ID:", sellerId);

} else {

    document.getElementById("chatTitle").innerText =
    "No conversation selected";

}



document.getElementById("sendBtn").onclick = async () => {


    const text = document.getElementById("messageText").value.trim();

    const imageFile = document.getElementById("imageFile").files[0];


    const { data: { user }, error: userError } =
        await supabase.auth.getUser();


    if (userError || !user) {

        const currentPage = window.location.pathname + window.location.search;

        window.location.href =
        "index.html?redirect=" + encodeURIComponent(currentPage);

        return;
    }


    if (!sellerId) {

        alert("Nuk u gjet shitësi");

        return;

    }



    let imageUrl = null;



    // NGARKO FOTO NË STORAGE

    if (imageFile) {


        const filePath = user.id + "/" + Date.now() + "_" + imageFile.name;


        const { error: uploadError } = await supabase.storage
            .from("chat-images")
            .upload(filePath, imageFile);



        if (uploadError) {

            console.error(uploadError);

            alert("Gabim gjatë ngarkimit të fotos");

            return;

        }



        const { data: publicData } = supabase.storage
            .from("chat-images")
            .getPublicUrl(filePath);



        imageUrl = publicData.publicUrl;


    }




    // RUAJ MESAZHIN

    const { error } = await supabase
        .from("messages")
        .insert({

            sender_id: user.id,

            receiver_id: sellerId,

            message: text,

            image_url: imageUrl

        });



    if (error) {

        console.error(error);

        alert("Gabim gjatë dërgimit të mesazhit");

        return;

    }



    document.getElementById("messageText").value = "";

    document.getElementById("imageFile").value = "";


    alert("Message sent");


};


</script>

</body>
</html>
