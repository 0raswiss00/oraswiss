<h2>Luxury Collection</h2>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
  "https://gnwsrmelmeqduhhmfmoa.supabase.co",
  "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"
);


// ================= LOGIN REDIRECT =================
function requireLogin() {
    localStorage.setItem("redirectAfterLogin", window.location.href);
    window.location.href = "login.html";
}

async function openSell() {
    const { data: { user } } = await supabase.auth.getUser();

    if (user) {
        window.location.href = "sellnow.html";
    } else {
        requireLogin();
    }
}


// ================= CATEGORY LOAD =================
async function loadCategory(cat, containerId) {
    const container = document.getElementById(containerId);

    const { data, error } = await supabase
        .from('oras')
        .select('*')
        .eq('category', cat);

    if (error) {
        console.error(error);
        container.innerHTML = "Error loading items";
        return;
    }

    if (!data || data.length === 0) {
        container.innerHTML = "No items";
        return;
    }

    container.innerHTML = data.map(ora => {

        let imgUrl = "https://via.placeholder.com/600x400?text=No+Image";
        let img = ora.image_url;

        if (img) {
            imgUrl = img.startsWith("http")
                ? img
                : "https://gnwsrmelmeqduhhmfmoa.supabase.co/storage/v1/object/public/or-images/" + img;
        }

        return `
        <div class="card" onclick="window.location.href='product.html?id=${ora.id}'">
            <img src="${imgUrl}">
            <h3>${ora.brand || ''} ${ora.model || ''}</h3>
            <p>Ref: ${ora.reference || '/'}</p>
            <div class="price">${ora.price ? ora.price + ' €' : 'Contact'}</div>

            <button onclick="event.stopPropagation()">Send Request</button>

            ${ora.paypal_link ? `
                <a href="${ora.paypal_link}" target="_blank" onclick="event.stopPropagation()">
                    <button>🛒 Buy</button>
                </a>
            ` : ''}
        </div>
        `;
    }).join('');
}


// ================= NAV CONTROL =================
async function updateNav() {
    const { data: { user } } = await supabase.auth.getUser();

    const btnSell = document.getElementById("btnSell");
    const btnMySales = document.getElementById("btnMySales");
    const btnMyAccount = document.getElementById("btnMyAccount");

    if (user) {
        if (btnSell) btnSell.style.display = "block";
        if (btnMySales) btnMySales.style.display = "block";
        if (btnMyAccount) btnMyAccount.style.display = "block";
    } else {
        if (btnSell) btnSell.style.display = "none";
        if (btnMySales) btnMySales.style.display = "none";
        if (btnMyAccount) btnMyAccount.style.display = "none";
    }
}

supabase.auth.onAuthStateChange(updateNav);
updateNav();


// ================= MENU =================
window.toggleMenu = function () {
    const menu = document.getElementById("myOraSwissMenu");
    if (menu) {
        menu.style.display = menu.style.display === "block" ? "none" : "block";
    }
};


// ================= COUNTERS =================
async function loadProductCount() {
    const { count } = await supabase
        .from('oras')
        .select('*', { count: 'exact', head: true });

    document.getElementById("count-products").textContent = count || 0;
}

async function loadUserCount() {
    const { data } = await supabase
        .from('oras')
        .select('user_id');

    const unique = [...new Set((data || []).map(u => u.user_id))];
    document.getElementById("count-users").textContent = unique.length;
}


// ================= INIT =================
loadCategory('luxury', 'luxury-container');
loadCategory('vintage', 'vintage-container');
loadCategory('parts', 'parts-container');

loadProductCount();
loadUserCount();

</script>
