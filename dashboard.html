<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>myOraSwiss - Dashboard</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; 
            background: #000; 
            color: #fff; 
            padding: 20px; 
            padding-bottom: 80px; /* Lë hapësirë që përmbajtja të mos mbulohet nga shiriti i poshtëm */
            margin: 0;
        }
        .profile-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .btn-sell { background: gold; color: #000; font-weight: bold; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 20px; }
        
        /* SHIRITI I POSHTËM FIKS (Bottom Navigation) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #111;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            z-index: 1000;
        }
        .bottom-nav-item {
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
        }
        .bottom-nav-item:hover { color: gold; }

        /* MENUJA "MY ORASWISS" (E fshehur fillimisht) */
        .my-oraswiss-menu { 
            display: none; 
            position: fixed;
            bottom: 70px; /* Shfaqet fiks mbi shiritin e poshtëm */
            left: 5%;
            width: 90%;
            background: #111; 
            border: 1px solid #333;
            border-radius: 8px; 
            z-index: 999;
            padding: 10px;
            box-sizing: border-box;
            box-shadow: 0px -5px 15px rgba(0,0,0,0.5);
        }
        .my-oraswiss-menu.active { display: block; }
        
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 10px; border-bottom: 1px solid #222; cursor: pointer; }
        .menu-item:last-child { border-bottom: none; }
        
        .watch-card { background: #111; margin-bottom: 10px; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 15px; }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search on OraSwiss">
            <button class="camera-icon" onclick="alert('Funksioni për foto së shpejti!')">📷</button>
        </div>
    </div>

    <ul id="myWatchesList" style="list-style: none; padding: 0;"></ul>

    <!-- Menuja që hapet (Buy, Messages, etj.) -->
    <div id="myOraSwissMenu" class="my-oraswiss-menu">
        <div class="menu-item" onclick="location.href='buy.html'"><span>🛒 Buy</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='mysold.html'"><span>🛒 my sold</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='messages.html'"><span>✉️ Messages</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='settings.html'"><span>⚙️ Account Settings</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='support.html'"><span>🎧 Support</span> <span>></span></div>
        <div class="menu-item" onclick="location.href='info.html'"><span>ℹ️ Info</span> <span>></span></div>
    </div>

    <!-- Shiriti i navigimit i rregulluar -->
    <nav class="bottom-nav">
       <div id="indexMenu" class="menu-content" style="display:none;">Përmbajtja e OraSwiss</div>
       <div id="profileMenu" class="menu-content" style="display:none;">Përmbajtja e Profilit</div>
       <div id="favoritesMenu" class="menu-content" style="display:none;">Përmbajtja e të Preferuarave</div>
       <div id="collectionMenu" class="menu-content" style="display:none;">Përmbajtja e Koleksionit</div>
       <div id="salesMenu" class="menu-content" style="display:none;">Përmbajtja e Shitjeve</div>
       <div id="sellMenu" class="menu-content" style="display:none;">Përmbajtja e Sell</div>
       <div id="myOraSwissMenu" class="menu-content" style="display:none;">Përmbajtja e My OraSwiss</div>
    </nav>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
        'https://gnwsrmelmeqduhhmfmoa.supabase.co',
        'sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9'
    );

    async function protectPage() {
        const { data: { user } } = await supabase.auth.getUser();

        if (!user) {
            window.location.href = "index.html";
            return false;
        }

        return true;
    }

    protectPage();
  
    async function checkLogin(event, page) {
        event.preventDefault();

        const { data } = await supabase.auth.getSession();

        if (data.session) {
            window.location.href = page;
        } else {
            window.location.href = "login.html";
        }
    }

    window.checkLogin = checkLogin;
    
    // 1. Deklaro funksionin si të zakonshëm
    async function ngarkoArtikujt() {
        const lista = document.getElementById("myWatchesList");
        lista.innerHTML = "Po ngarkojmë orët...";

        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
            lista.innerHTML = "<li>Duhet të logoheni!</li>";
            return;
        }

        const { data, error } = await supabase
            .from('oras')
            .select('*')
            .eq('user_id', user.id)
            .order('created_at', { ascending: false })
            .range(0, 500); // Shto këtë rresht patjetër!

        if (error) {
            lista.innerHTML = "<li>Gabim gjatë lidhjes.</li>";
            return;
        }

        lista.innerHTML = "";
        if (!data || data.length === 0) {
            lista.innerHTML = "<li>Nuk keni orë në shitje.</li>";
        } else {
            data.forEach(watch => {
                const li = document.createElement("li");
                li.className = "watch-card";
                li.innerHTML = `
                    <a href="edit.html?id=${watch.id}" style="text-decoration:none; color:inherit; display:flex; align-items:center;">
                        <img src="${watch.image_url && watch.image_url[0] ? watch.image_url[0] : ''}" alt="${watch.brand}" style="width:100px; height:auto; margin-right:15px;">
                        <strong>${watch.brand}</strong> - ${watch.price} €
                    </a>
                `;

                lista.appendChild(li);
            });
        }
    }

    // 2. Funksioni për hapjen/mbylljen e menusë "My OraSwiss"
    function toggleMenu() {
        const menu = document.getElementById('myOraSwissMenu');
        menu.classList.toggle('active');
    }

    // 3. Bëj funksionet të aksesueshme nga onclick="" në HTML
    window.ngarkoArtikujt = ngarkoArtikujt;
    window.toggleMenu = toggleMenu;

    // 4. Lidh eventet pasi DOM të jetë ngarkuar plotësisht
    document.addEventListener('DOMContentLoaded', async () => {
        const { data: { user } } = await supabase.auth.getUser();

        if (!user) {
            window.location.href = "login.html";
            return;
        }

        const btn = document.getElementById('btnNgarko');

        if (btn) {
            btn.addEventListener('click', ngarkoArtikujt);
        } else {
            ngarkoArtikujt();
        }
    });

        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('keyup', function(e) {
                const termi = e.target.value.toLowerCase();
                const lista = document.getElementById("myWatchesList");
                const artikujt = lista.getElementsByClassName("watch-card");
                for (let i = 0; i < artikujt.length; i++) {
                    let tekst = artikujt[i].textContent.toLowerCase();
                    artikujt[i].style.display = tekst.includes(termi) ? "" : "none";
                }
            });
        }
    
</script>
<script>
    let lastScrollTop = 0;
    const nav = document.querySelector('.bottom-nav');

    window.addEventListener('scroll', () => {
        let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

        if (scrollTop > lastScrollTop) {
            // Scroll poshtë - fshihte navigimin
            nav.classList.add('hidden');
        } else {
            // Scroll lart - shfaqe navigimin
            nav.classList.remove('hidden');
        }
        
        lastScrollTop = scrollTop <= 0 ? 0 : scrollTop; // Për të evituar gabime në Safari
    }, false);
</script>
<script>
    function checkLogin(event, targetUrl) {
        event.preventDefault(); // Ndalon butonin të hapet direkt
    
        // Këtu vendos logjikën tënde. Për shembull:
        const isLoggedIn = localStorage.getItem('isLoggedIn'); // ose kontrolli yt
    
        if (isLoggedIn === 'true') {
            window.location.href = targetUrl;
        } else {
            alert("Duhet të jesh i loguar për ta hapur këtë faqe!");
            // Ose: window.location.href = 'login.html';
        }
    }
</script>    
<script>
  window.toggleMenu = function(menuId) {
      var menu = document.getElementById(menuId);
      if (!menu) return; 

      // Mbyll çdo menu tjetër që ka klasën 'menu-content'
      var allMenus = document.querySelectorAll('.menu-content');
      allMenus.forEach(function(m) {
          if (m.id !== menuId) {
              m.style.display = 'none';
          }
      });

      // Logjika: Klikim për hapje, klikim për mbyllje
      if (menu.style.display === 'block') {
          menu.style.display = 'none';
      } else {
          menu.style.display = 'block';
      }
  };
</script>
</body>       
</html>
