<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <title>Vintage - Ora Swiss</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
    /* Stili për butonat si te image_19.png */
    .nav-filters { margin-bottom: 30px; }
    .nav-filters a { background: #2a2a8e; color: #fff; padding: 8px 15px; border-radius: 20px; text-decoration: none; margin-right: 10px; font-weight: bold; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
    .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
    .price { color: #25D366; font-weight: bold; margin-top: 10px; font-size: 1.2em; }
  </style>
</head>
<body>

  <!-- Butonat e navigimit -->
  <div class="nav-filters">
    <a href="luxury.html">Luxury 0</a>
    <a href="vintage.html">Vintage 0</a>
    <a href="parts.html">Parts 59</a>
  </div>

  <h1>Vintage Collection</h1>
  <div id="oras-container" class="grid">Duke ngarkuar koleksionin...</div>

<script>
    const supabase = window.supabase.createClient(
    "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
    "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"
);
    async function loadProducts() {
        const { data, error } = await supabase.from('oras').select('*').eq('category', 'luxury');
        if (error) { console.error(error); return; }

        const container = document.getElementById('products-container');
        container.innerHTML = data.map(ora => `
            <article class="product" id="${ora.id}">
                <div class="product-box">
                    <div class="product-left">
                        <img class="product-main-image" src="${ora.image_url}" alt="${ora.model}">
                    </div>
                    <div class="product-right">
                        <h3>Request this watch</h3>
                        <form action="https://api.web3forms.com/submit" method="POST">
                            <input type="hidden" name="access_key" value="4ecbdce6-d462-4e39-b39d-8c11e0095f46">
                            <input type="hidden" name="Product" value="${ora.brand} ${ora.model}">
                            <input type="text" name="Full Name" placeholder="Full Name" required>
                            <input type="email" name="Email" placeholder="Email" required>
                            <button type="submit">Send Request</button>
                        </form>
                        <div class="buy-row" data-ref="${ora.id}">
                            <a href="${ora.paypal_link}" class="buy-btn" target="_blank">Buy Now</a>
                            <a href="https://wa.me/355692408065" class="whatsapp-btn">WhatsApp</a>
                            <button class="like-btn" data-id="${ora.id}">♥️ Like</button>
                        </div>
                    </div>
                    <div class="product-info">
                        <h3>${ora.brand} - ${ora.model}</h3>
                        <p><strong>Reference:</strong> ${ora.reference}</p>
                        <p><strong>Price:</strong> €${ora.price}</p>
                    </div>
                </div>
            </article>
        `).join('');

        initFeatures();
    }

    function initFeatures() {
        // Funksioni i Kërkimit
        window.searchProducts = function() {
            const val = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('.product').forEach(p => {
                p.style.display = p.innerText.toLowerCase().includes(val) ? '' : 'none';
            });
        };

        // Funksioni Like (LocalStorage)
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                alert('U ruajt te Favorites ❤️');
            });
        });
    }

    loadProducts();
</script>

</body>
</html>
