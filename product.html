<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Detajet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
        .product-card { background: #111; border: 1px solid #333; padding: 20px; max-width: 500px; margin: auto; border-radius: 10px; }
        /* Shto këtu stilet e tjera që ke... */
    </style>
</head>
<body>

    <div id="container">Duke ngarkuar...</div>

    <script>
        // Inicializimi i Supabase
// Inicializimi i Supabase
const supabase = window.supabase.createClient(
    "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
    "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"
);

async function loadProduct() {
    const id = new URLSearchParams(window.location.search).get('id');
    const container = document.getElementById("container");

    if (!id) {
        container.innerHTML = "Asnjë ID u gjet.";
        return;
    }

    try {
        // 1. Merr të dhënat e produktit
        const { data, error } = await supabase.from('oras').select('*').eq('id', id).single();
        if (error) throw error;

        // 2. Merr user-in aktual për të kontrolluar pronësinë
        const { data: { user } } = await supabase.auth.getUser();

        // 3. Përgatit butonat e Admin-it (shfaqen vetëm nëse është pronari)
        let adminButtons = '';
        if (user && user.id === data.user_id) {
            adminButtons = `
                <div style="margin-top: 20px; padding: 15px; border: 1px solid #444; border-radius: 8px;">
                    <h4 style="margin: 0 0 10px 0;">Admin Controls</h4>
                    <button onclick="window.location.href='edit.html?id=${data.id}'" style="padding: 10px; cursor: pointer;">Modifiko</button>
                    <button onclick="deleteProduct('${data.id}')" style="padding: 10px; cursor: pointer; background: #ff4d4d; color: white; border: none;">Fshi Produktin</button>
                </div>
            `;
        }

        // 4. Shfaq produktin në kontejner
        container.innerHTML = `
            <div class="product-card">
                <h1>${data.brand} - ${data.model}</h1>
                <p><strong>Çmimi:</strong> ${data.price || 'N/A'} €</p>
                <p><strong>Përshkrimi:</strong> ${data.description || 'N/A'}</p>
                ${adminButtons}
            </div>
        `;
    } catch (err) {
        container.innerHTML = "Gabim gjatë ngarkimit: " + err.message;
    }
}

// Funksioni për fshirje
async function deleteProduct(id) {
    const konfirmo = confirm("A jeni i sigurt që doni ta fshini këtë produkt?");
    if (!konfirmo) return;

    const { error } = await supabase.from('oras').delete().eq('id', id);
    
    if (error) {
        alert("Gabim gjatë fshirjes: " + error.message);
    } else {
        alert("Produkti u fshi me sukses!");
        window.location.href = 'index.html'; 
    }
}

// Thirr funksionin sapo faqja të jetë gati
loadProduct();
    </script>
</body>
</html>
