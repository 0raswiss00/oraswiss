<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Luxury</title>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .btn { display: inline-block; background: #25d366; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">Koleksioni Luxury</h1>
    <div id="oras-list" class="grid">Duke ngarkuar...</div>

    <script>
        const supabase = window.supabase.createClient(
            "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
            "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"
        );

async function loadData() {
            const container = document.getElementById("oras-list");
            console.log("Po tentoj lidhjen me Supabase...");

            try {
                const { data, error } = await supabase
                    .from('oras')
                    .select('*')
                    .eq('category', 'luxury');

                if (error) {
                    console.error("Gabim nga Supabase:", error);
                    container.innerHTML = "Gabim: " + error.message;
                    return;
                }

                console.log("Te dhenat e marra:", data);
                if (data.length === 0) {
                    container.innerHTML = "Nuk u gjet asnje ore.";
                } else {
                    container.innerHTML = data.map(ora => <div>${ora.brand}</div>).join('');
                }
            } catch (err) {
                console.error("Gabim fatal:", err);
                container.innerHTML = "Gabim fatal: " + err.message;
            }
        }


            container.innerHTML = data.map(ora => `
                <div class="card">
                    <h3>${ora.brand} ${ora.model}</h3>
                    <p>Çmimi: <b>${ora.price} €</b></p>
                    <a href="https://wa.me/35569XXXXXXX?text=Dua te porosis oren ${ora.brand} ${ora.model}" class="btn">WhatsApp</a>
                </div>
            `).join('');
        }

        loadData();
    </script>
</body>
</html>
