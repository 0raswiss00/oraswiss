<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sell Your Watch</title>
  <style>
    body { font-family: Arial; background: #000; color: #fff; padding: 20px; }
    form { max-width: 600px; margin: 0 auto; background: #111; padding: 20px; border-radius: 10px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    input, select, textarea { width: 100%; padding: 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; box-sizing: border-box;}
    button { width: 100%; padding: 15px; background: gold; color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>

<form id="sellForm">
 <h2>Shto orë të re</h2>
 <label>Kategoria:</label>
  <select id="category" style="width: 100%; margin-bottom: 15px;">
    <option value="luxury">Luxury</option>
    <option value="vintage">Vintage</option>
    <option value="parts">Parts</option>
  </select>
  <div class="row">
    <input type="text" id="brand" placeholder="Brand" required>
    <input type="text" id="model" placeholder="Model" required>
  </div>
   <label>Çmimi:</label>
   <input type="number" id="price" placeholder="Çmimi në €" style="width: 100%; margin-bottom: 15px; padding: 10px;">   
  <div class="row">
    <input type="text" id="reference" placeholder="Reference">
    <input type="text" id="material" placeholder="Material">
  </div>
  <div class="row">
    <input type="text" id="case_size" placeholder="Case Size (e.g. 41mm)">
    <input type="number" id="year" placeholder="Year">
  </div>

  <select id="movement" style="margin-bottom: 15px; width: 100%; padding: 10px; background: #222; color: #fff; border: 1px solid #444;">
    <option value="Automatic">Automatic</option>
    <option value="Manual">Manual</option>
    <option value="Quartz">Quartz</option>
  </select>

  <select id="function" style="margin-bottom: 15px; width: 100%; padding: 10px; background: #222; color: #fff; border: 1px solid #444;">
    <option value="Date">Date</option>
    <option value="Chronometer">Chronometer</option>
    <option value="Chronograph">Chronograph</option>
    <option value="Turbillon">Turbillon</option>
    <option value="No Date">No Date</option>
  </select>

  <div class="row" style="margin-top:15px">
    <label><input type="checkbox" id="service"> Service kryer</label>
    <label><input type="checkbox" id="box_papers"> Box / Papers</label>
  </div>

  <textarea id="description" placeholder="Description..." rows="4" style="width: 100%; padding: 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; box-sizing: border-box;"></textarea>
  
  <div style="margin-top:15px">
    <label style="color:#aaa; font-size:14px;">Ngarko Foton e Orës:</label>
    <input type="file" id="fileInput" accept="image/*" style="margin-top: 5px;">
  </div>
  
  <button type="button" onclick="handleUploadAndSubmit()">Shto orën</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
<script>
  async function handleUploadAndSubmit() {
    const fileInput = document.getElementById('fileInput');
    const file = fileInput.files[0];
    let imageUrl = null;

    // 1. Ngarko foton nëse është zgjedhur
    if (file) {
      const fileName = ${Date.now()}_${file.name};
      const { data, error } = await supabase.storage
        .from('images') // Sigurohu që emri i bucket-it është 'images'
        .upload(fileName, file);
      
      if (error) {
        alert('Gabim gjatë ngarkimit të fotos: ' + error.message);
        return;
      }
      imageUrl = fileName; // Ky është emri që do të ruhet në bazën e të dhënave
    }

    // 2. Merr të dhënat nga formulari
    const model = document.getElementById('model').value;
    const reference = document.getElementById('reference').value;
    const description = document.getElementById('description').value;

    // 3. Ruaj gjithçka në tabelën 'ora'
    const { data, error } = await supabase
      .from('ora')
      .insert([
        { 
          model: model,
          reference: reference,
          description: description,
          image_url: imageUrl // Këtu do të jetë emri i fotos, jo më NULL
        }
      ]);

    if (error) {
      alert('Gabim gjatë ruajtjes: ' + error.message);
    } else {
      alert('Ora u shtua me sukses!');
      location.reload(); // Rifresko faqen pasi të shtohet
    }
  }
</script>
</body>
</html>
