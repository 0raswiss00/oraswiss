<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Detajet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="app-container">Duke ngarkuar...</div>

    <script>
        const supabase = window.supabase.createClient(
            "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ"
        );

        async function init() {
            const container = document.getElementById("app-container");
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');

            try {
                // Nëse kemi ID, kërkojmë produktin specifik
                if (productId) {
                    const { data, error } = await supabase.from('oras').select('*').eq('id', productId).single();
                    if (error) throw error;
                    container.innerHTML = <h1>${data.brand}</h1><p>Çmimi: ${data.price} €</p>;
                } else {
                    // Nëse jemi në faqe kategorie, kërkojmë sipas kategorisë
                    const category = window.location.pathname.includes('luxury') ? 'luxury' : 'vintage';
                    const { data, error } = await supabase.from('oras').select('*').eq('category', category);
                    if (error) throw error;
                    container.innerHTML = data.map(item => <p>${item.brand}</p>).join('');
                }
            } catch (err) {
                container.innerHTML = "Gabim: " + err.message;
            }
        }
        init();
    </script>
</body>
</html>
