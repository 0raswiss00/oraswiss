<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="debug" style="padding: 20px; font-family: monospace;">Duke filluar...</div>

    <script>
        const div = document.getElementById('debug');
        const URL = 'URL_JOTE_KETU';
        const KEY = 'KEY_JOTE_KETU';

        div.innerText = "Duke u lidhur...";
        
        try {
            const supabase = supabase.createClient(URL, KEY);
            
            // Kontrollojmë ID-në
            const id = new URLSearchParams(window.location.search).get('id');
            if(!id) {
                div.innerText = "GABIM: Nuk ka ID në URL (p.sh. product.html?id=11)";
            } else {
                div.innerText = "Duke kërkuar ID: " + id;
                
                supabase.from('oras').select('*').eq('id', id).single()
                .then(({data, error}) => {
                    if(error) {
                        div.innerText = "GABIM SUPABASE: " + JSON.stringify(error);
                    } else if (!data) {
                        div.innerText = "Nuk u gjet asnjë rresht me këtë ID.";
                    } else {
                        div.innerText = "SUKSES! Marka: " + data.brand + " | Modeli: " + data.model;
                    }
                });
            }
        } catch(e) {
            div.innerText = "GABIM KRITIK: " + e.message;
        }
    </script>
</body>
</html>
