<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Detajet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
        .product-card { background: #111; border: 1px solid #333; padding: 20px; max-width: 500px; margin: auto; border-radius: 10px; }
        .product-img { width: 100%; height: auto; border-radius: 10px; margin-bottom: 15px; object-fit: cover; }
        .price { color: #25D366; font-weight: bold; font-size: 1.4em; margin: 10px 0; }
        hr { border: 0; border-top: 1px solid #333; margin: 15px 0; }
        .btn { display: block; text-align: center; text-decoration: none; font-weight: bold; border-radius: 5px; padding: 15px; margin-top: 10px; }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-paypal { background: #ffeb00; color: black; } /* Bërë i verdhë si te lista kryesore */
    </style>
</head>
<body>

    <div id="container">Duke ngarkuar...</div>

    <script>
        if (typeof window.supabaseClient === 'undefined') {
            window.supabaseClient = window.supabase.createClient(
                "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ"
            );
        }
        var supabase = window.supabaseClient;
        const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";

        async function loadProduct() {
            const id = new URLSearchParams(window.location.search).get('id');
            const container = document.getElementById("container");

            if (!id) {
                container.innerHTML = "Asnjë ID u gjet.";
                return;
            }

            try {
                const { data, error } = await supabase.from('oras').select('*').eq('id', id).single();
                if (error) throw error;

           // 1. Krijojmë listën e të gjitha fotove që ka kjo orë
            let imageArray = [];
            if (data.image_url && data.image_url.length > 0) {
                let urls = Array.isArray(data.image_url) ? data.image_url : [data.image_url];
                imageArray = urls.map(img => {
                    if (img.startsWith('http')) return img;
                    return SUPABASE_URL + "/storage/v1/object/public/or-images/" + img;
                });
            } else {
                imageArray = ["https://placeholder.co/600x400/222/fff?text=No+Image"];
            }

            // 2. Ndërtojmë HTML-në e slider-it me butona majtas/djathtas
            let imagesHtml = imageArray.map((url, index) => 
                <img src="${url}" class="product-slider-img" style="width:100%; display: ${index === 0 ? 'block' : 'none'}; border-radius: 12px; max-height: 500px; object-fit: contain;">
            ).join('');

            let buttonsHtml = '';
            if (imageArray.length > 1) {
                buttonsHtml = `
                    <button type="button" onclick="changeProductImage(-1)" style="position:absolute; left:15px; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.7); color:white; border:none; padding:12px 16px; cursor:pointer; border-radius:50%; font-size:18px; z-index:10;">&#10094;</button>
                    <button type="button" onclick="changeProductImage(1)" style="position:absolute; right:15px; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.7); color:white; border:none; padding:12px 16px; cursor:pointer; border-radius:50%; font-size:18px; z-index:10;">&#10095;</button>
                `;
            }

            // Kjo zëvendëson imgUrl e vjetër me një bllok të plotë Slider-i HTML
            let imgUrl = `
                <div style="position:relative; width:100%; overflow:hidden; background:#111; border-radius:12px; min-height:300px; display:flex; align-items:center; justify-content:center;">
                    ${imagesHtml}
                    ${buttonsHtml}
                </div>
            `;

                // Kushti për butonin PayPal (shfaqet vetëm nëse ka çmim dhe link)
                const paypalButton = (data.price && data.paypal_link) 
                    ? `<a href="${data.paypal_link}" target="_blank" class="btn btn-paypal">
                           🛒 BUY NOW (PayPal)
                       </a>` 
                    : '';
                
               container.innerHTML = `
                   <div class="product-card">
                       <img src="${imgUrl}" class="product-img" alt="${data.brand}">
                       
                       <h1>${data.brand} - ${data.model}</h1>
                       <div class="price">Price: ${data.price ? data.price + ' €' : 'Contact'}</div>
        
                       <hr>
                       <p><strong>Reference:</strong> ${data.reference || 'N/A'}</p>
                       <p><strong>Case Size:</strong> ${data.case_size || 'N/A'}</p>
                       <p><strong>Movement:</strong> ${data.movement || 'N/A'}</p>
                       <p><strong>Function:</strong> ${data.function || 'N/A'}</p>
                       <p><strong>Service:</strong> ${data.service ? 'Yes (Serviced)' : 'No'}</p>
                       <p><strong>Box & Papers:</strong> ${data.box_papers ? 'Full Set' : 'Watch Only'}</p>
                       <p><strong>Description:</strong> ${data.description || 'N/A'}</p>
        
                       <br>
                       <a href="https://wa.me/35569XXXXXXX?text=I%20am%20interested%20in:%20${encodeURIComponent(data.brand + ' ' + data.model)}" class="btn btn-whatsapp">
                          💬 ORDER ON WHATSAPP
                       </a>

                       ${paypalButton}
                    </div>
               `;
            } catch (err) {
                container.innerHTML = "GABIM: " + err.message;
            }
        }

        // Funksioni që ndërron fotot te faqja e produktit
window.changeProductImage = function(direction) {
    const images = document.getElementsByClassName('product-slider-img');
    if (images.length <= 1) return;
    
    let currentIndex = 0;
    
    // Gjejmë foton që po shfaqet aktualisht
    for (let i = 0; i < images.length; i++) {
        if (images[i].style.display === 'block') {
            currentIndex = i;
            break;
        }
    }
    
          // Fshehim foton aktuale
          images[currentIndex].style.display = 'none';
    
          // Llogarisim indeksin e fotos së re
          let newIndex = currentIndex + direction;
          if (newIndex >= images.length) newIndex = 0;
          if (newIndex < 0) newIndex = images.length - 1;
    
          // Shfaqim foton e re
          images[newIndex].style.display = 'block';
      }
        loadProduct();
     </script>
</body>
</html>
