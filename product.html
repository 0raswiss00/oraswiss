  async function shfaqOra() {
    const params = new URLSearchParams(window.location.search);

    const { data, error } = await client.from('oras').select('*').eq('id', id).single();

    if (error) {
      document.body.innerHTML = "Gabim: Nuk gjendet ora. " + error.message;
      return;
    }

    // Shfaqim detajet thjesht
    document.body.innerHTML = `
      <h1>${data.brand} ${data.model}</h1>
      <p>Çmimi: ${data.price} €</p>
      <img src="https://gnwsrmelmeqduhhmfmoa.supabase.co/storage/v1/object/public/or-images/${data.image}" style="width:300px;">
    `;
  }

  shfaqOra();
</script>
