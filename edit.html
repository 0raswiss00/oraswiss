<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="container">Duke u ngarkuar...</div>

    <script>
        console.log("Skripti ka filluar!"); // Kontrollo Console-in, duhet ta shfaqë këtë!
        
        const supabaseUrl = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
        const supabaseKey = "VENDOS_KETU_CELESIN_ANON_PUBLIC";
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function init() {
            const container = document.getElementById("container");
            container.innerText = "Po lidhem me bazën e të dhënave...";
            
            // Test i thjeshtë
            const { data, error } = await supabase.from('oras').select('*').limit(1);
            if (error) {
                container.innerText = "Gabim: " + error.message;
            } else {
                container.innerText = "Lidhja u bë me sukses! Baza po punon.";
            }
        }
        
        init();
    </script>
</body>
</html>
