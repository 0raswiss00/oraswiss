<!doctype html>
<html lang="sq">
<head>
  <meta charset="utf-8"/>
  <title>Luxury - Ora Swiss</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; padding: 20px; }
    /* Stili për butonat si te image_19.png */
    .nav-filters { margin-bottom: 30px; }
    .nav-filters a { background: #2a2a8e; color: #fff; padding: 8px 15px; border-radius: 20px; text-decoration: none; margin-right: 10px; font-weight: bold; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .card { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
    .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
    .price { color: #25D366; font-weight: bold; margin-top: 10px; font-size: 1.2em; }
  </style>
</head>
<body>

  <!-- Butonat e navigimit -->
  <div class="nav-filters">
    <a href="luxury.html">Luxury 3</a>
    <a href="vintage.html">Vintage 2</a>
    <a href="parts.html">Parts 1</a>
  </div>

  <h1>Vintage Collection</h1>
  <div id="oras-container" class="grid">Duke ngarkuar koleksionin...</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
<script>
  // Inicializo Supabase vetëm një herë
  const SUPABASE_URL = "https://gnwsrmelmeqduhhmfmoa.supabase.co";
  const SUPABASE_KEY = "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"; 

  // Përdor 'window.supabase' për të shmangur konfliktin me librarinë
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function loadOras() {
    const container = document.getElementById("oras-container");
    
// Kërkesa e re që merr edhe të dhënat, edhe numërimin (count)
    const { data, error, count } = await client
      .from('oras')
      .select('*', { count: 'exact' })
      .eq('category', 'luxury');
if (error) {
      container.innerHTML = "Gabim: " + error.message;
      return;
    }

    // Përditëso tekstin e linkut "Luxury 0" me numrin real
    // 53: Kërkojmë linkun për luxury.html
    const luxuryLink = document.querySelector('a[href="luxury.html"]');

    // 54: (Këtë lëre siç është)
    if (luxuryLink && count !== null) {

    // 55: Përditësojmë tekstin
      luxuryLink.innerText = "Luxury " + count;
    }


    container.innerHTML = "";
    data.forEach(ora => {
      const img = ora.image_url ? SUPABASE_URL + "/storage/v1/object/public/" + ora.image_url : '';
      container.innerHTML += `
        <div class="card">
          <img src="${img}" alt="${ora.model}">
          <h3>${ora.brand} - ${ora.model}</h3>
          <div class="price">${ora.price ? ora.price + ' €' : 'Contact'}</div>
          
          <form action="https://api.web3forms.com/submit" method="POST" style="margin-top:10px;">
            <input type="hidden" name="access_key" value="4ecbdce6-d462-4e39-b39d-8c11e0095f46">
            <input type="email" name="email" placeholder="Emaili yt" required style="width:90%">
            <button type="submit" style="width:100%; margin-top:5px;">Send Request</button>
          </form>

<a href="${ora.paypal_link}" target="_blank" style="display:block; width:100%; margin-top:5px; padding:8px; background:#0070ba; color:white; border:none; border-radius:5px; text-align:center; text-decoration:none;">
    🛒 Buy Now
</a>
          <button onclick="alert('Liked!')" style="width:100%; margin-top:5px;">❤️ Like</button>
          <button onclick="navigator.clipboard.writeText(window.location.href); alert('Linku u kopjua!')" style="width:100%; margin-top:5px;">🔗 Share</button>
        </div>
      `;
    });
  }

  loadOras();
</script>

</body>
</html>
