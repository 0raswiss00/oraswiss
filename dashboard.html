<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>Orët e mia</h1>
    <ul id="myWatchesList"></ul>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

async function test() {
    const { data, error } = await supabase.from('watches').select('*');
    
    if (error) {
      console.error("Gabim:", error);
      return;
    }

    // Gjejmë listën (ul) ku duam të shfaqim orët
    const list = document.getElementById("myWatchesList");
    
    // Pastrojmë listën nëse ka ndonjë gjë brenda
    list.innerHTML = "";

    // Krijojmë elementet për çdo orë që kemi në bazë
    data.forEach(watch => {
      const li = document.createElement("li");
      
      // ZËVENDËSONI 'name' me emrin e saktë të kolonës suaj në Supabase
      // Psh: nëse kolona quhet 'model', përdorni watch.model
      li.innerHTML = `
        <div class="watch-item">
            <h3>${watch.name}</h3>
            <button onclick="alert('Po shesim: ${watch.name}')">Sell Now</button>
        </div>
      `;
      list.appendChild(li);
    });
  }
  
  test();

</script
</body>
</html>
