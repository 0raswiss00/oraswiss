<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h1 id="status">Duke u lidhur...</h1>
    <div id="container"></div>

    <script>
        // 1. Deklarimi i Supabase
        const supabase = window.supabase.createClient(
            "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ"
        );

        async function start() {
            try {
                document.getElementById('status').innerText = "Duke kërkuar të dhëna...";
                
                const { data, error } = await supabase.from('oras').select('*').limit(5);

                if (error) {
                    document.getElementById('status').innerText = "GABIM: " + error.message;
                    console.error(error);
                } else {
                    document.getElementById('status').innerText = "Sukses! U gjetën: " + data.length + " ora.";
                    document.getElementById('container').innerHTML = JSON.stringify(data);
                }
            } catch (err) {
                document.getElementById('status').innerText = "FATAL ERROR: " + err.message;
            }
        }

        // Kjo siguron që kodi fillon vetëm kur faqja është gati
        window.onload = start;
    </script>
</body>
</html>
