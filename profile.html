<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile - Ora Swiss</title>

  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#000;color:#fff}
    .wrap{max-width:520px;margin:30px auto;padding:0 16px}
    button{padding:10px 14px;border-radius:10px;border:1px solid #777;background:#111;color:#fff;cursor:pointer}
  </style>
</head>

<body>
  <div class="wrap">
    <h2>Profili</h2>

<div class="wrap">
    <h1 id="sellerTitle">Dyqani i Shitësit</h1>
    
    <h3>Orët në shitje:</h3>
    <ul id="sellerWatches"></ul>

    <h3>Feedback-u i blerësve:</h3>
    <ul id="feedbackList"></ul>
</div>
   
    <p>Email: <b id="userEmail"></b></p>
    <p>Emri: <b id="userName">-</b></p>

    <p>Te regjistruar gjithsej: <b id="userCount">0</b></p>

    <button id="btnLogout" type="button">Logout</button>
    <p id="msg" style="margin-top:12px;"></p>
  </div>
 
<!-- ✅ VETËM 1 SCRIPT MODULE -->
 import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'; 
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

// KONFIGURIMI
const firebaseConfig = { /* config yt */ };
const supabase = createClient('URL_YT_SUPABASE', 'KEY_YT_SUPABASE');

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ELEMENTET
const nameEl = document.getElementById("userName");
const countEl = document.getElementById("userCount");
const msgEl = document.getElementById("msg");
const logoutBtn = document.getElementById("btnLogout"); // U rregullua ID

// FUNKSIONI I SUPABASE
async function loadData(uid) {
    const { data: watches } = await supabase.from('oras').select('*').eq('user_id', uid);
    const watchList = document.getElementById('sellerWatches');
    watchList.innerHTML = "";
    watches?.forEach(w => {
        let li = document.createElement('li');
        li.innerHTML = <b>${w.brand}</b> - ${w.price}€;
        watchList.appendChild(li);
    });
}

// LOGJIKA KRYESORE
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  msgEl.textContent = user.email;
  
  // Ngarko emrin dhe numrin
  const snap = await getDoc(doc(db, "users", user.uid));
  if (snap.exists()) nameEl.textContent = snap.data().name;
  
  const countSnap = await getCountFromServer(collection(db, "users"));
  countEl.innerText = countSnap.data().count;

  // Ngarko orët nga Supabase
  await loadData(user.uid); 
});

logoutBtn.addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "index.html";
});
</script>
</body>  
</html>
