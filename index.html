<h2>Luxury Collection</h2>

<div id="vintage-container" class="grid">Loading...</div>

<h2>Parts Collection</h2>
<div id="parts-container" class="grid">Loading...</div>

<script>
  const supabase = window.supabase.createClient(
    "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdud3NybWVsbWVxZHVoaG1mbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU2MDE2NjIsImV4cCI6MjA4MTE3NzY2Mn0.M_KMTq9SDvd6mWe7uK53fQK7ssVu9_ltRMfoxrQq-nQ"
  );


  async function loadCategory(cat, containerId) {
    const { data } = await supabase.from('oras').select('*').eq('category', cat);
    const container = document.getElementById(containerId);
    if (!data || data.length === 0) {
      container.innerHTML = "No items in this category.";
      return;
    }
    container.innerHTML = data.map(ora => `
          <div class="card" onclick="window.location.href='product.html?id=${ora.id}'" style="cursor:pointer;">
            <img src="https://gnwsrmelmeqduhhmfmoa.supabase.co/storage/v1/object/public/${ora.image_url}" ...>
            <h3>${ora.brand || 'No Brand'} - ${ora.model || 'No Model'}</h3>
            <p>Ref: ${ora.reference || 'N/A'}</p>
            <p>Material: ${ora.material || 'N/A'}</p>
          <div class="price">${ora.price ? ora.price + ' €' : 'Contact for price'}</div>
        </div>
    `).join('');
  }

  loadCategory('luxury', 'luxury-container');
  loadCategory('vintage', 'vintage-container');
  loadCategory('parts', 'parts-container');
</script>
