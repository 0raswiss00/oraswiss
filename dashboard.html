<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
</head>

<body>

<h1>Orët e mia</h1>

<button id="btnSellNow" style="display:none;">
    Sell Now
</button>

<ul id="myWatchesList"></ul>

<script type="module">

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
    'https://xyunmtvysqwonelecudf.supabase.co',
    'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx'
);

// Kontrollon nëse përdoruesi është i loguar
async function kontrolloLogin() {

    const {
        data: { session }
    } = await supabase.auth.getSession();

    const btnSell = document.getElementById("btnSellNow");

    if (session) {
        btnSell.style.display = "inline-block";
    } else {
        btnSell.style.display = "none";
    }
}

// Ngarkon orët e përdoruesit
async function ngarkoArtikujt() {

    try {

         const { data: { user }, error: userError } = await supabase.auth.getUser();

         // Përditësoni kontrollin tuaj (rreshti 52):
         if (userError || !user) {
           alert("Duhet të jesh i loguar!");
           return;
         }

        if (!user) {
            lista.innerHTML =
                "<li>Duhet të logohesh për të parë orët e tua.</li>";
            return;
        }

        const { data, error } = await supabase
            .from("watches")
            .select("*")
            .eq("user_id", user.id);

        if (error) {
            console.error(error);
            lista.innerHTML =
                "<li>Gabim gjatë marrjes së të dhënave.</li>";
            return;
        }

        lista.innerHTML = "";

        if (data.length === 0) {
            lista.innerHTML =
                "<li>Nuk keni asnjë orë të regjistruar.</li>";
            return;
        }

        data.forEach(watch => {

            const li = document.createElement("li");

            li.innerHTML = `
                ${watch.name}
                <button onclick="window.location.href='sellnow.html?id=${watch.id}'">
                    Sell Now
                </button>
            `;

            lista.appendChild(li);

        });

    } catch (err) {
        console.error(err);
    }
}

// Butoni lart
document
    .getElementById("btnSellNow")
    .addEventListener("click", () => {

        window.location.href = "sellnow.html";

    });

// Dëgjon login/logout
supabase.auth.onAuthStateChange(() => {

    kontrolloLogin();
    ngarkoArtikujt();

});

// Kur faqja hapet
document.addEventListener("DOMContentLoaded", async () => {

    await kontrolloLogin();
    await ngarkoArtikujt();

});

</script>

</body>
</html>
