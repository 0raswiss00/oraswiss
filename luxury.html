<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ora Swiss - Luxury Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="oras-container">Duke ngarkuar koleksionin...</div>

    <script>
        // Inicializimi i Supabase
        const supabase = window.supabase.createClient(
            "https://gnwsrmelmeqduhhmfmoa.supabase.co", 
            "sb_publishable__AkK_Z7lhtkvukN6Fy1cAQ_KBTXIcY9"
        );

        async function loadLuxury() {
            const container = document.getElementById("oras-container");
            
            const { data, error } = await supabase
                .from('oras')
                .select('*')
                .eq('category', 'luxury');

            if (error) {
                container.innerHTML = "Gabim gjatë lidhjes: " + error.message;
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = "Nuk ka produkte në këtë kategori.";
                return;
            }

            // Gjenerimi i listës pa shkaktuar gabime sintaksore
            container.innerHTML = data.map(function(ora) {
                return `
                <div class="card" style="border:1px solid #ccc; padding:10px; margin:10px;">
                    <h3>${ora.brand || 'N/A'} ${ora.model || ''}</h3>
                    <p>Çmimi: ${ora.price || 0} €</p>
                </div>`;
            }).join('');
        }

        loadLuxury();
        console.log("Kodi u ekzekutua me sukses!");
    </script>
</body>
</html>
