<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>Orët e mia</h1>
    <ul id="myWatchesList"></ul>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const supabase = createClient(
    'https://xyunmtvysqwonelecudf.supabase.co',
    'sb_publishable_tk6dO6UWVlRrVWOfrX4m_w_ZAoduHhx'
  );

  async function ngarkoArtikujt() {
    try {
      const { data: { session } } = await supabase.auth.getSession();

      const { data, error } = await supabase.from('watches').select('*');
      if (error) throw error;

      const lista = document.getElementById("myWatchesList");
      lista.innerHTML = "";

      data.forEach(watch => {
        const li = document.createElement("li");

        const sellButton = session 
          ? <button onclick="window.location.href='sellnow.html?id=${watch.id}'">Sell Now</button>
          : '';

        li.innerHTML = ${watch.name} ${sellButton};
        lista.appendChild(li);
      });

    } catch (err) {
      console.error("Gabim gjatë ngarkimit:", err);
    }
  }

  supabase.auth.onAuthStateChange(() => {
    ngarkoArtikujt();
  });

  ngarkoArtikujt();
</script>
</body>
</html>
